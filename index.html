國家（2023年超越中國，約14.4億人）。總統為國家元首（儀式性），總理為政府首腦（莫迪，2014年就任）。聯邦制賦予各邦較大自治權——語言和文化多樣性（22種官方語言、數百種方言）是其政治的突出特徵。世界上最大的議會選舉（約9.7億合格選民，2019年大選投票率約67%）。"},{"id":"in2","title":"經濟崛起","content":"全球第五大經濟體和增長最快的主要經濟體之一。IT和軟件服務業最具國際競爭力（班加羅爾為「印度矽谷」）——Infosys、TCS、Wipro等是全球最大的IT外包服務公司。製藥業（「世界藥房」——仿製藥產量全球領先，供應全球約60%的疫苗）。太空計劃ISRO取得顯著成就——2014年成功完成火星探測（Mangalyaan，成本僅約7400萬美元，比好萊塢電影《地心引力》的製作成本還低），2023年成功登陸月球南極（Chandrayaan-3，成為第四個在月球軟著陸的國家）。面臨的挑戰包括基礎設施不足、貧富差距、空氣污染和性別不平等。"}]},{"id":"brazil","title":"巴西","category":"countries","description":"南美最大經濟體，足球王國與亞馬遜雨林守護者","icon":"🇧🇷","sections":[{"id":"br1","title":"政治與經濟","content":"聯邦制總統制共和國，拉丁美洲面積最大和人口最多的國家（約2.15億人），首都巴西利亞（1960年從里約熱內盧遷都至此的現代主義規劃城市）。經濟依賴農產品出口——全球最大的咖啡、大豆、牛肉和糖出口國之一。擁有豐富礦產資源（鐵礦石——淡水河谷公司是全球最大的鐵礦石生產商之一）。金磚國家（BRICS）創始成員國之一。面臨的挑戰包括：收入不平等（基尼係數約0.53，世界上最高的之一）、政治腐敗、暴力犯罪率高。"},{"id":"br2","title":"文化與環境","content":"足球王國——五次世界盃冠軍（全球最多），球王比利和內馬爾的文化象徵地位。每年一度的里約狂歡節（Carnival）是世界最盛大節慶之一——桑巴舞遊行、華麗服裝和街頭派對吸引數百萬人參與。亞馬遜雨林（約60%在巴西境內）被稱為「地球之肺」——面積約550萬平方公里，蘊含全球約10%的已知物種。森林砍伐（主要為養牛和大豆種植開闢土地）是巴西和全球面臨的重大環境挑戰——博索納羅時期（2019–2022年）砍伐速度急劇加速，盧拉政府（2023年上任）承諾到2030年實現亞馬遜「零非法砍伐」。"}]},{"id":"canada","title":"加拿大","category":"countries","description":"世界第二大國土面積，多元文化、自然資源與科技創新","icon":"🇨🇦","sections":[{"id":"ca1","title":"政治與社會","content":"聯邦制君主立憲議會民主國家，君主為英國國王（國家元首，儀式性），總理為政府首腦。世界面積第二大國（約998萬平方公里），僅次於俄羅斯。官方雙語政策（英語和法語）——魁北克省以法語為主要語言，魁北克獨立運動曾是加拿大政治核心議題（1995年獨立公投以50.58%比49.42%險些通過）。多元文化主義是加拿大的國策——移民佔人口增長絕大部分（每年約接納40萬新移民），多倫多（約50%人口出生於國外）和溫哥華是全球最具多元文化特色的城市。"},{"id":"ca2","title":"經濟與科技","content":"豐富自然資源——石油（油砂儲量全球第三，僅次於委內瑞拉和沙烏地阿拉伯，主要集中在亞伯達省）、天然氣、礦產、木材和水資源。發達的高科技產業：AI研究實力雄厚（多倫多大學的Geoffrey Hinton被譽為「深度學習之父」之一，2018年圖靈獎）、蒙特婁是視頻遊戲產業中心。全民醫療保健系統（Medicare）是加拿大社會福利體系的核心。教育水平在發達國家中名列前茅——多倫多大學、麥基爾大學、不列顛哥倫比亞大學（UBC）是全球頂尖研究型大學。"}]},{"id":"southeast-asia","title":"東南亞國家","category":"countries","description":"東協核心成員國——越南、泰國、印尼、馬來西亞、新加坡、菲律賓","icon":"🌴","sections":[{"id":"sea1","title":"越南","content":"社會主義共和國，首都河內，最大城市胡志明市（前西貢）。1986年革新開放（Đổi Mới）仿效中國改革開放——家庭承包制取代集體農業、允許私營企業、歡迎外國直接投資。當今東南亞增長最快的經濟體之一——三星約一半智能手機在越南組裝，近年得益於全球供應鏈從中國「多元化」（China+1策略）。年輕人口結構（中位數年齡約31歲）和具競爭力的勞動力成本是核心優勢。越南戰爭（1955–1975年）留下深刻歷史印記——統一的越南如今是東南亞政治最穩定的國家之一。"},{"id":"sea2","title":"泰國","content":"君主立憲制國家，唯一從未被歐洲殖民的東南亞國家（英法以泰國為殖民地之間的緩衝國）。首都曼谷連續多年為全球接待國際遊客最多的城市。旅遊業是經濟支柱（年約3500–4000萬遊客——普吉島、蘇梅島、清邁為國際知名度假勝地）。泰國文化以佛教為核心（上座部佛教約95%人口信奉），泰式按摩、泰拳和泰國料理（冬蔭功湯、綠咖哩、泰式炒河粉Pad Thai）全球聞名。近年政治經歷了軍方政變（2014年）和民主選舉（2023年）的動盪循環。"},{"id":"sea3","title":"印度尼西亞","content":"世界最大的群島國家（超過17000個島嶼）和最大穆斯林人口國家（約87%人口信奉伊斯蘭教）。東南亞最大經濟體和G20成員國。首都正在從雅加達（面臨嚴重地層下陷和擁堵）遷往努山塔拉（位於婆羅洲島東加里曼丹省的新規劃首都，預計2045年完成）。豐富礦產資源——全球最大鎳生產國之一（電動車電池關鍵原料，政府禁止出口未加工鎳礦以強制建設下游冶煉產能）、最大動力煤出口國、最大棕櫚油生產國。旅遊勝地——峇里島（印度教文化島嶼，全球最受歡迎度假目的地之一）。"},{"id":"sea4","title":"馬來西亞","content":"聯邦制君主立憲國家，由馬來半島和婆羅洲島北部（沙巴和砂拉越）組成。首都吉隆坡，行政中心在布城（Putrajaya）。經濟從橡膠和錫礦出口轉向電子製造、石油天然氣和服務業。雙子塔（國油雙峰塔，452米，1998–2004年為世界最高建築）是現代馬來西亞的標誌。多元種族社會——馬來人約70%、華裔約23%、印度裔約7%——相對和諧共處，但種族政治仍是社會結構的核心特徵。「馬來西亞真是亞洲」（Malaysia Truly Asia）的旅遊口號反映了其文化多樣性。"},{"id":"sea5","title":"菲律賓","content":"群島國家（約7641個島嶼，主要三大島：呂宋、維薩亞斯、棉蘭老），首都馬尼拉。亞洲最大的天主教國家（約80%人口信奉天主教，西班牙殖民333年的遺產）。海外勞工匯款（每年超過300億美元，約佔GDP的10%）是經濟重要支柱。英語普及率高（得益於美國殖民時期1898–1946年的影響）和年輕勞動力（中位數年齡約25歲）使菲律賓成為全球業務流程外包BPO行業的中心之一——許多跨國公司的客服中心設在馬尼拉和宿霧。南中國海（菲律賓稱西菲律賓海）領土爭端（特別是2016年海牙常設仲裁法院裁決支持菲律賓對中國「九段線」主張的異議）是主要外交安全議題。"},{"id":"sea6","title":"新加坡","content":"位於馬來半島南端的城市國家（城邦），面積僅728.6平方公里（約為香港的2/3），人口約564萬。1965年8月9日被逐出馬來西亞聯邦被迫獨立——李光耀在宣布獨立的新聞發布會上泣不成聲。在李光耀（1959–1990年總理）和繼任者領導下，用一代人時間從缺乏自然資源（甚至淡水都需從馬來西亞進口）的貧困漁村轉變為全球金融中心、航運樞紐（全球第二大集裝箱港口）和技術創新城市——「新加坡奇蹟」。公積金CPF制度（強制儲蓄用於退休、醫療和住房）使約80%國民居住並擁有政府組屋HDB。以嚴格的法治、極低腐敗率（貪污調查局CPIB獨立調查權直接向總理報告）、高效政府和精英教育體系聞名於世。"}]}]},{"id":"lifestyle","title":"日常品味","icon":"🍷","color":"#C4B5FD","description":"提升生活品質的品味修養——品酒、茗茶、咖啡鑑賞與世界精品品牌完全指南","topics":[{"id":"wine","title":"品酒","category":"lifestyle","description":"葡萄酒與威士忌的完整世界——產區、釀造工藝與專業品鑑體系","icon":"🍷","sections":[{"id":"w1","title":"法國經典產區","content":"波爾多：以紅酒為主（約89%產量）。左岸（梅多克、格拉夫）以卡本內蘇維濃為主——強勁單寧、黑醋栗和雪松風味。1855年分級將梅多克酒莊分為五級：拉菲、拉圖、瑪歌、木桐（1973年由二級升一級，是分級設立以來唯一一次級別調整）、侯伯王位列一級莊。右岸（聖艾美濃、波美侯）以梅洛為主，較柔和圓潤——波美侯的帕圖斯（Pétrus）雖無正式列級，卻因極度稀有和高昂價格被公認為波爾多乃至全球最頂尖酒款之一。布根地：以對風土Terroir（土壤、微氣候、坡度、日照和釀酒傳統的綜合體）的最極致推崇聞名——以葡萄園地塊Climat而非酒莊分級。33個特級園Grand Cru中，羅曼尼·康帝（Romanée-Conti，葡萄園僅1.81公頃，年產約450箱）被認為是世界最好和最昂貴的葡萄酒——一瓶超過2萬美元。核心品種：黑皮諾（全世界最難伺候的葡萄品種）和夏多內。","subs":[{"id":"w1a","title":"香檳區與其他重要產區","content":"香檳區以傳統法（瓶中二次發酵）釀造氣泡酒——酩悅Moët & Chandon、凱歌Veuve Clicquot、庫克Krug、水晶香檳Louis Roederer Cristal等品牌地位卓著。阿爾薩斯（Alsace）：以芳香型白葡萄品種（麗絲玲Riesling、瓊瑤漿Gewürztraminer）聞名。羅亞爾河谷（Loire Valley）：多樣風格——從Muscadet的清爽礦物感到Sancerre的白蘇維濃。隆河谷（Rhône Valley）：北隆以Syrah為主（如Côte-Rôtie和Hermitage），南隆以Grenache為主的混釀（如Châteauneuf-du-Pape）。"}]},{"id":"w2","title":"專業品鑑方法論","content":"WSET（葡萄酒與烈酒教育信託基金）系統性品鑑法SAT：視覺（傾斜45度觀察澄清度、色調——年輕紅酒紫紅轉寶石紅，陳年後石榴紅→磚紅→褐色；白酒從淺檸檬綠到琥珀色）、嗅覺（靜止→旋轉酒杯釋放香氣——一類品種香（果味）、二類發酵香（橡木桶的香草/烤麵包）、三類陳年香（蘑菇/皮革/蜂蜜/汽油（陳年麗絲玲典型特徵））、味覺（酸度/單寧澀感/酒體輕盈至豐滿/餘味持續時間——長於15秒為高品質標誌）、整體平衡感——優秀葡萄酒如同優秀交響樂，沒有元素過於突兀，所有聲音服務於整體和諧。"},{"id":"w3","title":"威士忌世界","content":"蘇格蘭威士忌法規定義嚴格：必須在蘇格蘭蒸餾、使用水和發芽大麥（可添加其他穀物）、在橡木桶中陳年至少三年、裝瓶酒精度不得低於40%。五大產區：斯貝賽Speyside（優雅甜美果香，麥卡倫為拍賣市場最昂貴威士忌瓶裝記錄保持者之一）、高地Highlands（風格多樣從北高地的石楠花蜜到南高地的水果蛋糕）、低地Lowlands（最輕柔，草香和花香）、艾雷島Islay（強烈泥煤煙燻——Ardbeg和Laphroaig可達40–55 ppm酚含量，碘/海藻風味，因當地以富含泥煤的火烘乾麥芽）、坎貝爾鎮Campbeltown（曾經30多家蒸餾廠的「世界威士忌之都」，今僅存三家，以Springbank雲頂最知名）。"}]},{"id":"tea","title":"品茶","category":"lifestyle","description":"中國六大茶類與日本茶道的完整鑑賞體系","icon":"🍵","sections":[{"id":"t1","title":"中國六大茶類","content":"按發酵程度從低到高：1）綠茶（不發酵——龍井（以80℃水沖泡，十大手工炒製手法）、碧螺春（康熙賜名）、黃山毛峰），保留最多天然物質、滋味鮮爽。2）白茶（微發酵5–10%——白毫銀針（僅採肥壯茶芽滿披白絨毛）、白牡丹），製作最簡單（萎凋→乾燥），越陳越香。3）黃茶（輕發酵——君山銀針，獨特的「悶黃」工藝），產量極稀少。4）烏龍茶/青茶（半發酵15–70%——大紅袍（武夷岩茶之王，母樹僅六株已有360餘年歷史，2006年起禁止採摘）、鐵觀音（福建安溪，「觀音韻」蘭花香）、凍頂烏龍（台灣南投），「綠葉紅鑲邊」形成於做青工序（搖青和晾青交替進行）。5）紅茶（全發酵——正山小種（約1568年明朝，世界紅茶鼻祖，無意中以松木明火烘乾創造了獨特煙燻風味Lapsang Souchong。）、祁門紅茶（三大高香紅茶之一，獨特的「祁門香」）。6）黑茶（後發酵——普洱茶，微生物（主要是黑麴黴Aspergillus niger）的渥堆發酵，生茶在適宜條件下陳化數十年價值可達數十萬至數百萬元）。"},{"id":"t2","title":"工夫茶藝與日本茶道","content":"工夫茶盛行於福建、廣東潮汕及台灣——紫砂壺/蓋碗、茶水比1:20–1:30、水溫因茶而異（綠茶80℃、烏龍100℃）、沖泡時間精確控制（第一泡約20秒，好的烏龍可泡7–10次）。品茶講究「觀色、聞香、品味」三步。日本茶道由千利休（1522–1591）集大成——核心理念「和敬清寂」：和（和睦）、敬（尊重）、清（清淨）、寂（靜寂）。茶道中的「一期一會」概念——每一次茶會都是獨一無二、不可重現的相遇——深刻影響了日本美學和人生哲學。"}]},{"id":"coffee","title":"咖啡","category":"lifestyle","description":"從阿拉比卡豆產地到九種沖煮方式的完整知識體系","icon":"☕","sections":[{"id":"co1","title":"咖啡豆品種與產地風味","content":"兩大主要品種：阿拉比卡Arabica（約佔全球70%產量，生長於中高海拔600–2000米，風味複雜、酸度明亮，是精品咖啡基礎）和羅布斯塔Robusta（低海拔，咖啡因含量為阿拉比卡約兩倍，苦味較重，常用於義式濃縮拼配以增加Crema和口感）。精品咖啡主要產地風味特徵：衣索比亞（咖啡起源地——耶加雪菲Yirgacheffe產區最著名，茉莉花香、柑橘類水果風味、茶感）、哥倫比亞（平衡典範——焦糖甜、堅果味、中等酸度）、巴西（巧克力、堅果、低酸——經典義式基底）、肯亞（強烈黑醋栗和莓果風味，酸度明亮如葡萄酒）、印尼蘇門答臘（曼特寧——草本、香料、醇厚度極高、極低酸度，以獨特的濕刨法Giling Basah處理）、巴拿馬（翡翠莊園藝伎Geisha品種——花香爆炸、茉莉花和佛手柑，拍賣價格屢創紀錄——2023年最佳巴拿馬拍賣會中藝伎咖啡以每磅超過1萬美元的價格成交）。"},{"id":"co2","title":"沖煮方法與義式飲品","content":"手沖Pour Over（V60濾杯/Kalita Wave/Chemex，水溫92–96℃最佳，粉水比約1:15–1:17，研磨度中等偏細如海鹽）。法壓壺French Press（浸泡式萃取、研磨最粗、萃取4分鐘——能保留咖啡油脂產生更醇厚口感）。愛樂壓AeroPress（結合浸泡和壓力，萃取時間短僅1–2分鐘，便攜且容錯率高——甚至有世界愛樂壓錦標賽）。虹吸壺Siphon（利用蒸汽壓力和真空原理，視覺效果極具觀賞性——像化學實驗的咖啡儀式）。冷萃Cold Brew（冷水浸泡12–24小時，酸度極低、口感絲滑，咖啡因含量高）。義式濃縮Espresso（以9巴壓力將92℃水壓過極細研磨咖啡粉，25–30秒萃取約30ml——Crema金黃色泡沫為萃取良好標誌）。義式飲品家族：美式Americano（濃縮+熱水稀釋）、拿鐵Latte（濃縮+蒸牛奶+少量奶泡）、卡布奇諾Cappuccino（濃縮+蒸牛奶+厚奶泡，傳統比例1:1:1）、Flat White（起源於澳洲/紐西蘭，濃縮+絲絨般微泡牛奶，咖啡味更突出）、瑪琪雅朵Macchiato（濃縮+一小勺奶泡標記）。"}]},{"id":"fashion","title":"服裝與時尚","category":"lifestyle","description":"高級訂製工藝、經典品牌譜系與時尚產業生態","icon":"👗","sections":[{"id":"f1","title":"高級訂製（Haute Couture）","content":"高級訂製是受法國法律保護的專有名詞——只有獲得法國工業部認證並符合嚴格標準的品牌才能使用：必須在巴黎擁有工作室（Atelier）、至少僱用15名全職工匠、每季展示至少25套原創設計、全部手工製作並為客戶量身訂製。一件高級訂製禮服可能需要數百甚至數千小時手工（刺繡由Lesage刺繡工坊完成、羽飾由Lemarié工坊製作、褶襉和蕾絲等極精細工藝）。目前僅約十餘個品牌持有一級高級訂製會員資格——Chanel、Dior、Givenchy、Jean Paul Gaultier等。全球僅約2000名客戶（其中相當部分來自中東和海灣地區），是時尚體系中創意和工藝的最高燈塔。","subs":[{"id":"f1a","title":"經典品牌：Chanel與Dior","content":"香奈兒Chanel（可可·香奈兒，1883–1971）：以簡約優雅解放女性身體——將男裝元素引入女裝、以Jersey針織面料製作舒適服裝、1926年推出小黑裙Little Black Dress（黑色此前僅為喪服顏色）、香奈兒2.55手袋和No.5香水成為永恆經典。老佛爺卡爾·拉格斐自1983年起掌舵36年至2019年去世。迪奧Dior（克里斯汀·迪奧）：1947年推出「新風貌」New Look——圓肩、極纖細腰身、蓬大長裙（有些裙子面料超20米），在戰後物資短缺年代引發爭議同時重新喚起女性對優雅和美的渴望。歷任創意總監——伊夫·聖羅蘭、約翰·加利亞諾、拉夫·西蒙等都在品牌歷史上留下深刻印記。"}]},{"id":"f2","title":"其他經典品牌","content":"愛馬仕Hermès（1837年創立於巴黎馬具作坊）：以極致工匠精神（一個柏金包Birkin Bag由一位工匠耗時18–24小時手工製作、使用鞍針縫法Saddle Stitch雙針交叉縫合）、稀有材料和嚴格產量控制著稱。凱莉包Kelly Bag因葛蕾絲·凱莉王妃得名。路易威登Louis Vuitton（1854年）：Monogram帆布（1896年設計，品牌縮寫LV和花卉圖案）是世界最為人知的奢侈品圖案。1997年馬克·雅各布斯擔任首位創意總監將品牌從旅行箱製造商轉型為全面時尚品牌，開創高端品牌與當代藝術家合作先河（村上隆、草間彌生等）。Gucci（佛羅倫斯，1921年）：以雙G標誌、紅綠織帶（Web Stripe，靈感來自馬鞍腹帶）和馬銜扣樂福鞋（Horsebit Loafer）為標誌性設計元素。Prada（米蘭，1913年）：以黑色尼龍面料（原為軍用帳篷材料）顛覆了奢侈品必須使用天然材料的傳統認知。Bottega Veneta（1966年，維琴察）：以Intrecciato皮革編織工藝聞名——「當你的標誌足夠獨特時，你不需要Logo」。"}]},{"id":"cars","title":"汽車品牌","category":"lifestyle","description":"頂級豪華與性能汽車的造車藝術——從勞斯萊斯到法拉利","icon":"🏎️","sections":[{"id":"car1","title":"終極豪華：勞斯萊斯","content":"勞斯萊斯（1906年查爾斯·勞斯和亨利·萊斯創立於英國，2003年被BMW收購）被認為是世界上最精緻的汽車品牌。Phantom幻影旗艦車型的極致手工工藝：車身44,000多種漆色選項全部人工手動噴塗（約45公斤油漆、五層噴塗和手工打磨拋光、耗時約7天完成）。車內皮革來自約8–10張阿爾卑斯山區高海拔牧場的上等牛皮（高海拔=較少蚊蟲叮咬、幾乎無瑕疵），約18天鞣製和染色。標誌性Starlight Headliner星空頂篷——工匠手工在皮革車頂內襯穿入約800–1,600根光纖以模擬夜空繁星，甚至可按客戶要求定製特定日期和地點（如結婚日/生日）的真實星空排列。車頭的歡慶女神Spirit of Ecstasy立標是最具標誌性的汽車符號之一——浪漫起源故事（可能為傳說）：雕塑家查爾斯·賽克斯以貴族約翰·蒙塔古勳爵的秘書（也是情人）埃莉諾·桑頓為原型創作。賓利Bentley（1919年創立，現屬福斯集團）更強調運動性能與奢華的結合——Continental GT是品牌最成功的車型系列。"},{"id":"car2","title":"超級跑車：法拉利與藍寶堅尼","content":"法拉利Ferrari（1947年恩佐·法拉利創立於義大利馬拉內羅）：賽車（特別是F1——法拉利是唯一參加了F1全部賽季的車隊）和量產超跑的傳奇品牌。躍馬標誌（原為一戰義大利王牌飛行員弗朗西斯科·巴拉卡的個人標誌）、標誌性紅色Rosso Corsa賽車紅和獨特的V12自然進氣引擎聲浪組成汽車文化的經典符號。藍寶堅尼Lamborghini（1963年費魯喬·藍寶堅尼創立）：起源故事——拖拉機製造商費魯喬因不滿自己法拉利離合器的品質而向恩佐·法拉利投訴，被恩佐傲慢回絕後決心創立自己的超跑品牌。Countach（1974–1990）以極具未來感的楔形設計和鍘刀門定義了1970–80年代超跑美學。Aventador（2011–2022）標誌性V12引擎和鍘刀門成為全球最暢銷的V12超跑之一。布加迪Bugatti（1909年創立於法國Molsheim，現屬福斯集團）：以極致工程技術聞名——Chiron Super Sport 300+（2019年）成為首款突破300英里/小時（483公里/小時）的量產車。"}]},{"id":"watches","title":"鐘錶鑑賞","category":"lifestyle","description":"高級製錶的終極藝術——機芯工藝、複雜功能與頂級品牌","icon":"⌚","sections":[{"id":"wa1","title":"三大複雜功能","content":"陀飛輪Tourbillon（寶璣1801年獲得專利）：將整個擒縱機構放置在旋轉框架中（通常每分鐘旋轉一圈），以抵消地心引力對擺輪和遊絲的誤差——陀飛輪框架通常包含約40個組件，總重量不到1克，製作所要求的極致微機械工藝使其成為高級製錶工藝的終極展示。三問報時Minute Repeater（最難最考驗工藝的複雜功能）：推動滑桿後腕錶以不同音調的敲擊在微型音簧上報出小時（低音）、刻鐘（高-低交替音）和分鐘（高音）——每個三問腕錶聲音都獨一無二（音簧長度/厚度/材質/硬化處理工藝、錘子大小/形狀和錶殼聲學特性共同決定音質）。百達翡麗每枚三問腕錶出廠前都必須由總裁親自試聽確認音質。萬年曆Perpetual Calendar：能自動識別每月不同天數（28/29/30/31天）和閏年週期，機械記憶程序基於為期四年（48個月/1461天）的凸輪程序——理論上在2100年前不需調校（2100年雖可被4整除但非閏年——因世紀年只有能被400整除的才是閏年，而大多數萬年曆機械程序無法處理此例外）。"},{"id":"wa2","title":"頂級品牌譜系","content":"百達翡麗Patek Philippe（1839年創立於日內瓦，由斯登家族自1932年私有經營至今）：被公認為腕錶世界王者——核心價值在於極致傳統手工工藝，每個零件（包括看不見的內部零件）都經精細手工打磨修飾（倒角Anglage、日內瓦波紋Côtes de Genève、圓形打磨Perlage和黑色拋光Black Polish——鋼製零件的鏡面級拋光，特定角度下呈現完全黑色而非反射光線）——被稱為「隱形之美」Invisible Beauty。百達翡麗日內瓦印記（自2009年取代Geneva Seal，涵蓋整枚腕錶而非僅機芯）。拍賣市場絕對統治者——2014年為小亨利·格雷夫斯定製的超級複雜功能懷錶（24項複雜功能、八年製作）以約2400萬瑞士法郎創時計拍賣世界紀錄。愛彼Audemars Piguet（1875年創立於瑞士汝山谷）：皇家橡樹Royal Oak（1972年，傳奇設計師杰拉德·尊達在一天內設計完成——靈感來自老式潛水頭盔的八角形舷窗和暴露的螺絲）開創了奢華不鏽鋼運動腕錶的全新品類——在1972年前不鏽鋼被認為是廉價材質，皇家橡樹售價比許多金錶還貴，大膽挑戰傳統認知並取得巨大商業成功。"}]},{"id":"jewelry","title":"珠寶與皮具","category":"lifestyle","description":"頂級珠寶工藝、經典設計與皮革藝術的終極指南","icon":"💎","sections":[{"id":"jw1","title":"頂級珠寶品牌","content":"卡地亞Cartier（1847年創立於巴黎）：被英王愛德華七世譽為「皇帝的珠寶商，珠寶商的皇帝」。Tank坦克腕錶（1917年，靈感來自一戰雷諾坦克的俯視形狀）是最經典腕錶設計之一——從戴安娜王妃到安迪·沃霍爾都是其佩戴者。Love手環（1969年Aldo Cipullo設計，以螺絲鎖扣為標誌——寓意鎖住愛情，需要專用螺絲刀打開）是最為人知的珠寶設計之一。蒂芙尼Tiffany & Co.（1837年創立於紐約）：以標誌性「知更鳥蛋藍」Tiffany Blue（Pantone 1837，Tiffany專屬顏色，其他品牌禁止使用）和珍稀鑽石（包括128.54克拉的Tiffany Diamond黃鑽，僅有四位女性佩戴過——奧黛麗·赫本在《蒂芙尼的早餐》宣傳中最為著名）聞名全球。寶格麗Bulgari（1884年創立於羅馬）：以古羅馬和希臘文化為靈感、大膽的色彩組合和獨特的Serpenti蛇形設計聞名。"},{"id":"jw2","title":"頂級皮具品牌","content":"愛馬仕Hermès皮具工藝：使用頂級皮革——Box小牛皮（光滑硬挺、標誌性光澤）、Togo小牛皮（柔軟、粒面紋理，柏金包最受歡迎皮質）、Clemence（比Togo更柔軟垂墜）、Epsom（壓紋牛皮、輕便抗刮）以及極其稀有的Porosus灣鱷、Niloticus尼羅鱷等珍稀皮。鞍針縫法Saddle Stitch是愛馬仕標誌性手工縫線——雙針交叉縫合，即使一處斷線也不會全部散開。每位皮具工匠都需經數年培訓才能獨立製作高端手袋。戈雅Goyard（1853年創立於巴黎，比LV早一年）：以低調奢華定位聞名——從不打廣告、不線上銷售、標誌性Goyardine帆布（三維立體人字紋圖案）是手工逐點繪製而成。戴爾沃Delvaux（1829年創立於比利時，全球最古老的奢華皮具品牌）：比利時皇家供應商，以Le Brillant手袋（1958年設計，建築感十足的馬鞍形扣環）最為著名。"}]}]}];
// ── RENDER ──
function renderCategories() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = categories.map(c => `
    <div class="cat-card" onclick="openCategory('${c.id}')">
      <div class="cat-icon" style="background:${c.color}15">${c.icon}</div>
      <div class="cat-title">${c.title}</div>
      <div class="cat-count">${c.topics.length} 個主題</div>
    </div>
  `).join('');
}

function openCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const topicView = document.getElementById('topicView');
  const homeView = document.getElementById('homeView');

  topicView.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="breadcrumb" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${cat.title}</div>
    </div>
    <div class="section-title">主題列表（${cat.topics.length}）</div>
    ${cat.topics.map(t => `
      <div class="cat-card" style="text-align:left;padding:16px;margin-bottom:10px" onclick="openTopic('${cat.id}','${t.id}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px">${t.icon}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:15px;color:var(--text)">${t.title}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.4">${t.desc}</div>
          </div>
          <span style="font-size:20px;color:var(--primary-pale)">›</span>
        </div>
      </div>
    `).join('')}
  `;

  homeView.classList.add('hidden');
  topicView.classList.add('active');
  document.getElementById('contentArea').scrollTop = 0;
}

function openTopic(catId, topicId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const topic = cat.topics.find(t => t.id === topicId);
  if (!topic) return;

  const topicView = document.getElementById('topicView');
  topicView.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="openCategory('${catId}')">←</button>
      <div class="breadcrumb" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${cat.title}</div>
    </div>
    <div class="topic-header">
      <div class="topic-h1">${topic.icon} ${topic.title}</div>
      <div class="topic-desc">${topic.desc}</div>
      <div class="topic-actions">
        <button class="action-btn" id="bookmarkBtn" onclick="toggleBookmark(this, '${topicId}')">☆ 收藏</button>
        <button class="action-btn" onclick="showToast('📥 文章已儲存為離線閱讀')">📂 離線閱讀</button>
      </div>
    </div>
    <div class="accordion" id="accordionRoot">
      ${topic.sections.map((s, i) => renderSection(s, 0, i)).join('')}
    </div>
  `;
  document.getElementById('contentArea').scrollTop = 0;

  // Open first level by default
  document.querySelectorAll('.accordion-item.depth-0').forEach(item => item.classList.add('open'));
}

function renderSection(section, depth, index) {
  const hasSubs = section.subs && section.subs.length > 0;
  const depthClass = `depth-${Math.min(depth, 3)}`;
  return `
    <div class="accordion-item ${depthClass} ${depth === 0 ? 'open' : ''}">
      <div class="accordion-header" onclick="toggleSection(this.parentElement)">
        ${hasSubs
          ? `<span class="arrow">▶</span>`
          : `<span class="dot"></span>`
        }
        <span class="accordion-title">${section.title}</span>
      </div>
      <div class="accordion-body">
        ${section.content ? `<div class="accordion-content">${section.content}</div>` : ''}
        ${hasSubs ? section.subs.map((sub, i) => renderSection(sub, depth + 1, i)).join('') : ''}
      </div>
    </div>
  `;
}

function toggleSection(item) {
  item.classList.toggle('open');
}

function goHome() {
  const topicView = document.getElementById('topicView');
  const homeView = document.getElementById('homeView');
  topicView.classList.remove('active');
  homeView.classList.remove('hidden');
  document.getElementById('contentArea').scrollTop = 0;
}

function toggleBookmark(btn, topicId) {
  btn.classList.toggle('bookmarked');
  if (btn.classList.contains('bookmarked')) {
    btn.innerHTML = '⭐ 已收藏';
    showToast('⭐ 已加入收藏');
  } else {
    btn.innerHTML = '☆ 收藏';
    showToast('已取消收藏');
  }
}

function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('searchResults');
  const homeView = document.getElementById('homeView');

  if (!query) {
    if (resultsDiv) resultsDiv.remove();
    return;
  }

  const results = [];
  categories.forEach(cat => {
    cat.topics.forEach(topic => {
      if (topic.title.toLowerCase().includes(query) || topic.desc.toLowerCase().includes(query)) {
        results.push({ topic, cat });
      }
    });
  });

  let existing = document.getElementById('searchResults');
  if (existing) existing.remove();

  if (results.length === 0) return;

  const div = document.createElement('div');
  div.id = 'searchResults';
  div.style.cssText = 'margin-bottom:16px;animation:fadeSlideIn 0.3s ease';
  div.innerHTML = `
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">找到 ${results.length} 個相關主題</div>
    ${results.map(r => `
      <div class="cat-card" style="text-align:left;padding:14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between" onclick="openTopic('${r.cat.id}','${r.topic.id}')">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">${r.topic.icon}</span>
          <div>
            <div style="font-weight:600;font-size:14px">${r.topic.title}</div>
            <span style="font-size:11px;padding:2px 8px;border-radius:6px;background:${r.cat.color}15;color:${r.cat.color}">${r.cat.title}</span>
          </div>
        </div>
        <span style="font-size:18px;color:var(--primary-pale)">›</span>
      </div>
    `).join('')}
  `;
  homeView.insertBefore(div, homeView.firstChild);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// Init
renderCategories();
</script>
</body>
</html>
