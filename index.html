多數國家卡特爾是非法的，但OPEC因涉及國家主權而受到國際法的特殊對待）。天然氣是化石燃料中碳排放最低的發電燃料（約為煤的一半），被視為能源轉型中的「過渡燃料」。液化天然氣（LNG——將天然氣冷卻至-162°C變為液態、體積縮小至原來的1/600）使得天然氣可以通過專用LNG輪船跨越大洋運輸（而不僅僅依賴管道），從根本上改變了天然氣市場的全球化和地緣政治格局。"},{"id":"energy-renewable","title":"可再生能源革命","content":"太陽能光伏（PV）的成本在過去15年中下降了約90%——從2010年的約0.38美元/千瓦時下降到2023年的約0.03美元/千瓦時（在陽光資源豐富的地區），這使得太陽能在許多地區已經成為最便宜的發電方式（即使在無補貼條件下）。這驚人的成本下降主要得益於規模效應（中國大規模擴張太陽能板製造產能——2023年中國生產了全球約80%的太陽能多晶矽、約95%以上的矽片和約80%的太陽能電池組件）和技術進步（PERC電池、異質結（HJT）和鈣鈦礦串聯電池——實驗室效率已突破33%）。風力發電是另一個成功案例——現代風力發電機的葉片長度可超過100米（相當於一個足球場的長度），單颱風機的發電容量已達到15MW（兆瓦）級別——一台15MW的離岸風機在良好風況下每年可為約2萬戶家庭供電。核能的爭議在於其風險—收益的極端不對稱性：正常運行時核電是一種近乎零碳排放且出力穩定（基載電力）的清潔能源——法國約70%的電力來自核能，是全球核電佔比最高的國家之一。然而一旦發生重大事故（車諾比（1986年，烏克蘭，設計缺陷加上人為操作失誤導致爆炸和火災，放射性物質擴散到整個歐洲）、福島（2011年，日本，9級地震引發的海嘯導致冷卻系統失靈和三個反應堆的爐心熔毀）），後果是災難性的——廣大地區在數十年甚至數世紀內不適合居住，公眾對核電安全的信任被徹底動搖。此外核廢料的長期安全處置（高放射性廢料的半衰期可達數萬年——如何確保在如此漫長的時間尺度上不會對未來的人類和環境造成危害？）至今沒有令所有人滿意的解決方案（芬蘭的翁卡洛（Onkalo）深層地質處置庫是全球第一個獲得營運許可的最終處置設施——廢料將被封存在地下約450米深的基岩中，設計壽命為10萬年）。"}]}]},{"id":"lifestyle","title":"日常品味","icon":"🍷","color":"#C4B5FD","description":"提升生活品質的品味修養——從品酒茗茶到世界精品品牌的鑑賞指南","topics":[{"id":"wine-appreciation","title":"品酒","category":"lifestyle","description":"葡萄酒、威士忌的世界——產區、釀造、品鑑與投資收藏","icon":"🍷","sections":[{"id":"wine-wine","title":"葡萄酒","content":"葡萄酒是全球最複雜、最具文化內涵的酒精飲料。一瓶優質的葡萄酒是人類、自然和時間的協作產物。","subsections":[{"id":"wa-france","title":"法國經典產區","content":"法國是葡萄酒世界的基準和參照系。波爾多（Bordeaux）：以紅葡萄酒為主（約佔產量的89%）。左岸產區（梅多克Médoc和格拉夫Graves）以卡本內蘇維濃（Cabernet Sauvignon）為主要品種——強勁的單寧結構、黑醋栗和雪松的風味、極佳的陳年潛力。1855年分級制度應拿破崙三世的要求（用於1855年巴黎世界博覽會展示法國最好的葡萄酒），將梅多克產區酒莊分為五個級別（一級莊至五級莊）加上蘇玳（Sauternes，貴腐甜白酒產區）的甜白酒分類——拉菲（Château Lafite Rothschild）、拉圖（Latour）、瑪歌（Margaux）、木桐（Mouton Rothschild，1973年由二級莊升為一級莊——是1855年分級制度設立以來唯一一次級別調整）和侯伯王（Haut-Brion，唯一一個不在梅多克產區（位於格拉夫產區）卻被列入梅多克分級的一級莊）位列一級莊（Premier Cru）。右岸產區（聖艾美濃Saint-Émilion和波美侯Pomerol）以梅洛（Merlot）和卡本內弗朗（Cabernet Franc）為主要品種——風格較柔和圓潤、更早適飲。波美侯的帕圖斯（Pétrus）雖然沒有正式列級（波美侯產區沒有官方分級制度），但因其極度稀有和高昂的價格（一瓶頂級年份的帕圖斯售價可達數千至數萬美元）被公認為波爾多（乃至全球）最頂尖的葡萄酒之一。布根地（Bourgogne/Burgundy）：以對風土（Terroir——土壤、微氣候、坡度、日照和釀酒傳統的綜合體）的最極致推崇而聞名。不同於波爾多的酒莊（Château，圍繞一個物理建築和品牌）分級，布根地以葡萄園地塊（Climat）為分級單位，同一塊葡萄園可能被多個生產者分割擁有。分級金字塔從頂到底：特級園（Grand Cru，33個，如羅曼尼·康帝（Romanée-Conti）——被廣泛認為是世界上最好和最昂貴的葡萄酒，一瓶羅曼尼·康帝的價格可能超過2萬美元）、一級園（Premier Cru）、村莊級和地區級。布根地的核心品種為黑皮諾（Pinot Noir，紅）——世界上最「難伺候」的葡萄品種之一（皮薄、易腐爛、對氣候極度敏感），但在布根地的特定風土條件下能釀造出地球上最優雅、複雜和具有靈性的紅葡萄酒——和夏多內（Chardonnay，白）——風格跨度極大（從夏布利（Chablis）的礦物感和鋒利酸度到蒙哈榭（Montrachet）的豐富飽滿和令人難以置信的複雜度）。"},{"id":"wa-tasting","title":"葡萄酒品鑑方法論","content":"專業的系統性品鑑方法（如WSET（葡萄酒與烈酒教育信託基金）的系統性品鑑法SAT、葡萄酒大師（Master of Wine，全球僅約420人通過，是酒界最難獲得的資格認證之一，考試包括三天盲品和大量論文和論文答辯）的品鑑體系）要求品鑑者關注葡萄酒的外觀、香氣、口感和整體評估四個維度。視覺（Appearance）：將酒杯傾斜約45度對著白色背景（如白紙或白桌布），觀察酒液的澄清度、顏色深度和色調（年輕紅酒為紫紅色，隨著陳年逐漸變為寶石紅→石榴紅→磚紅→褐色；年輕白酒從淺檸檬綠到金黃，陳年後可能發展為琥珀色甚至棕色——顏色的變化提示了酒的發展階段和可能的品質）。嗅覺（Nose）：先在靜止狀態下嗅聞（檢測最易揮發和微妙的香氣——如還原味（硫磺味）、TCA軟木塞污染（濕紙板/發霉的地下室氣味，約2–5%的葡萄酒受其影響）等缺陷通常在此時被首先察覺），然後輕輕旋轉酒杯（使酒液與空氣接觸、釋放更多香氣分子後再次嗅聞）。香氣的分類：一類香氣（Primary Aromas，源自葡萄品種本身——如黑皮諾的草莓/覆盆子、白蘇維濃（Sauvignon Blanc）的百香果/青草/貓尿味（黑醋栗苞芽的甲氧基吡嗪化合物——有些人非常厭惡、有些人則認為是其品種特徵）; 二類香氣（Secondary Aromas，來自發酵和釀酒過程——如橡木桶帶來的香草（香草醛）、椰子、烤麵包、煙燻、丁香等香氣; 三類香氣（Tertiary Aromas，來自瓶中或橡木桶中的陳年——如蘑菇、森林地表、皮革、煙草、乾果、蜂蜜、汽油（高品質陳年麗絲玲Riesling的典型香氣））。味覺（Palate）：含一小口酒液（約5–10毫升）讓其佈滿整個口腔——不同的味蕾區域（甜（舌尖）、酸（舌側）、鹹（舌側靠前）、苦（舌根））在不同的時間點感知不同的味覺元素。專業的品鑑詞彙要求精確而非模糊的主觀感受——描述酸度（低→中→高，如檸檬般令人流口水的尖銳感）、單寧（澀感，僅存在於紅酒中，來自葡萄皮、籽和橡木桶——低（如牛奶般柔滑）→中→高（如喝濃茶後口腔的乾澀收斂感）、質地（如絲絨、如天鵝絨、如砂紙）、成熟度（生青/粗糙→成熟/精細））、酒體（Alcohol和萃取物的綜合感受——輕盈如脫脂牛奶→中等如全脂牛奶→豐滿如奶油）、餘味（Finish——吞下或吐出酒液後正面風味在口腔中持續的時間——短（少於5秒）→中等→長（超過15秒甚至數分鐘，是高品質葡萄酒的標誌之一））和整體平衡感（酸度、單寧、酒精、果味濃度和甜度（如果是甜酒）之間的和諧程度——優秀的葡萄酒就像優秀的交響樂，沒有哪個元素過於突兀或嘈雜，所有聲音都服務於整體的和諧）。"}]},{"id":"wa-whisky","title":"威士忌的完整世界","content":"威士忌（Whisky/Whiskey，蘇格蘭、加拿大和日本的拼法為Whisky，愛爾蘭和美國通常拼作Whiskey）是將穀物（大麥、玉米、黑麥、小麥等）發芽、糖化、發酵、蒸餾後的酒精溶液在橡木桶中陳釀至少三年（大多數國家和產區的法律要求）而製成的烈酒。","subsections":[{"id":"wa-scotch","title":"蘇格蘭威士忌（Scotch）","content":"蘇格蘭法律對「蘇格蘭威士忌」有嚴格的定義：必須在蘇格蘭的蒸餾廠中使用水和發芽大麥（可添加其他穀物的全穀）製成、蒸餾至酒精度不超過94.8%、在容量不超過700公升的橡木桶中在蘇格蘭陳年至少三年、不得添加除水和焦糖色素（E150a）以外的任何物質、裝瓶酒精度不得低於40%。蘇格蘭威士忌的主要類型：單一麥芽威士忌（Single Malt Scotch Whisky）——來自單一蒸餾廠、僅使用水、100%發芽大麥和酵母經由壺式蒸餾器（Pot Still）蒸餾的威士忌。這是威士忌世界的最高品質代表——每一款單一麥芽都體現了其蒸餾廠獨特的風格（「蒸餾廠DNA」）。蘇格蘭官方劃分的五大產區：斯貝賽（Speyside，位於蘇格蘭東北部的斯佩河流域——擁有蘇格蘭約一半的蒸餾廠，風格通常優雅、甜美、果香豐富（蘋果、梨、蜂蜜），以麥卡倫（Macallan，在拍賣市場上許多最昂貴的威士忌瓶裝記錄）、格蘭菲迪（Glenfiddich，全球銷量最大的單一麥芽品牌）和格蘭利威（Glenlivet）為代表）、高地（Highlands，風格多樣——從北高地的石楠花蜜和香料到南高地的豐富水果蛋糕風味）、低地（Lowlands，通常最輕柔、以草香和花香為特色，因歷史原因低地蒸餾廠數量最少但近年正在復甦）、艾雷島（Islay，位於蘇格蘭西海岸的小島，只有約3,200名居民卻擁有9家蒸餾廠——以強烈的泥煤煙燻（Phenol含量以ppm/百萬分率計量——Ardbeg（雅柏）和Laphroaig（拉弗格）可達40–55 ppm）、碘、海藻和藥材的煙燻風味聞名於世——這是因為艾雷島盛產泥煤（Peat，植物在缺氧的沼澤環境中經過數千年不完全分解而形成的褐色有機沉積層），島上的麥芽在發芽過程中用泥煤火烘乾，泥煤燃燒的煙霧滲透到發芽的麥粒中）和坎貝爾鎮（Campbeltown，曾經有30多家蒸餾廠的「世界威士忌之都」，如今僅剩三家——以Springbank（雲頂）最為知名，風格豐富而海洋氣息濃重）。調和威士忌（Blended Scotch Whisky）——將來自不同蒸餾廠的單一麥芽威士忌和穀物威士忌（以連續式蒸餾器（Coffey Still/Column Still）生產，較為中性）按調配大師（Master Blender）的秘密配方進行調合——是銷量最大的蘇格蘭威士忌類別，以尊尼獲加（Johnnie Walker——其紅牌（Red Label）、黑牌（Black Label）、藍牌（Blue Label）等分級是威士忌市場營銷的經典案例）、芝華士（Chivas Regal）和百齡罈（Ballantine's）為代表。"}]}]},{"id":"tea-appreciation","title":"品茶","category":"lifestyle","description":"中國茶文化、日本茶道與世界名茶的完整鑑賞體系","icon":"🍵","sections":[{"id":"ta-chinese","title":"中國茶文化","content":"中國是茶的原產地和茶文化的發源地。據傳神農氏（約前2737年）在煮水時幾片茶葉偶然落入鍋中，從此人類發現了茶——這當然是傳說，但茶確實是最早被中國人馴化和利用的飲料植物之一（最早的可靠文字記錄可追溯到西漢時期（約前59年王褒的《僮約》中提到了「烹茶盡具」和「武陽買茶」）。唐代陸羽（733–804）的《茶經》（約760年）是全世界第一本茶學專著——系統性地論述了茶的起源、品種、種植、採摘、製茶、烹茶、品飲和茶器，被尊為「茶聖」。","subsections":[{"id":"ta-types","title":"六大茶類的完整體系","content":"中國茶按發酵程度從低到高劃分為六大茶類。1）綠茶（不發酵）——製作工序為殺青（以高溫快速破壞茶葉中的多酚氧化酶活性，阻止發酵，保留茶葉的翠綠色和鮮爽風味）→揉捻→乾燥。龍井（浙江杭州西湖產區，以「色翠、香郁、味醇、形美」四絕著稱，扁平挺直的獨特外形源於手工在熱鍋中的獨特炒製手法——「抓、抖、搭、拓、捺、推、扣、甩、磨、壓」十大手法）、碧螺春（江蘇蘇州太湖洞庭山，外形捲曲如螺——其名源於康熙皇帝南巡時品嚐後的賜名）、黃山毛峰、信陽毛尖等同為名優綠茶。綠茶最適合以約80℃的水沖泡（沸水會燙熟茶葉產生「熟味」），使用玻璃杯可以欣賞茶葉在水中舒展的過程。2）烏龍茶（青茶，半發酵）——製作中最關鍵的步驟是「做青」（搖青和晾青交替進行的工序——茶葉在輕微的機械損傷下邊緣開始氧化（發酵），形成「綠葉紅鑲邊」的特徵）。發酵度從約15%（文山包種茶，極輕度發酵，接近綠茶的清香）到約70%（東方美人茶/白毫烏龍，又名「膨風茶」——因小綠葉蟬（一種會叮咬茶葉嫩芽的小蟲子）的叮咬引發茶樹的防禦反應產生特殊的蜜香和果香而聞名）。大紅袍（產於福建武夷山，岩茶之王，獨特的「岩韻」（礦物質感和岩石氣息）源於武夷山獨特的丹霞地貌和岩石風化的土壤——共有六株母樹，已有360餘年歷史，自2006年起為保護母樹已禁止採摘）是烏龍茶中最具傳奇色彩的品種。鐵觀音（福建安溪，介於綠茶和紅茶之間，以獨特的「觀音韻」（蘭花香和甘醇的喉韻）著稱）和凍頂烏龍（台灣南投，起源於清朝咸豐年間台灣鹿谷鄉舉人林鳳池從福建武夷山帶回茶苗在凍頂山種植）。3）紅茶（全發酵）——正山小種（福建武夷山桐木關，世界紅茶的鼻祖——約1568年左右（明朝）因一支軍隊路過佔用了茶農的住所，茶農為加快茶葉乾燥速度以松木明火烘乾茶葉，無意中創造了獨特的松木煙燻風味——Lapsang Souchong至今在西方市場上以濃郁的煙燻風味聞名，很多人又愛又恨），祁門紅茶（安徽祁門，三大高香紅茶之一（與印度的大吉嶺紅茶、斯里蘭卡的烏瓦紅茶齊名），獨特的「祁門香」）。4）白茶（微發酵，約5–10%）——製作最為簡單（萎凋→乾燥，不經過殺青和揉捻），最大限度地保留了茶葉的原始風味。白毫銀針（僅採摘肥壯的茶芽，滿披白色絨毛如銀針狀）和白牡丹（一芽一葉或一芽二葉，形似牡丹花）。高品質白茶的價值在於其「越陳越香」的特性——不同於綠茶需要趁鮮飲用，白茶在適宜條件下儲存數年後會轉化出更加複雜的香氣（類似於中藥的香氣、乾果的甜香）和醇和的口感。5）黑茶（後發酵）——區別於其他茶類的關鍵在於「渥堆」（Wet Piling，人為控制溫度和濕度促進微生物（如黑麴黴Aspergillus niger等）對茶葉的發酵——這不是茶葉自身的酶促氧化而是微生物的發酵作用。普洱茶（產於雲南，以大葉種茶樹（Camellia sinensis var. assamica）的鮮葉為原料，分為生茶和熟茶——生普洱隨著時間的自然陳化逐漸從帶苦澀的高刺激性轉化為醇和甘甜（在適宜條件下陳化數十年的生普洱價值可達數十萬至數百萬元人民幣））是黑茶中最為著名的品種。"}]}]},{"id":"watches","title":"鐘錶鑑賞","category":"lifestyle","description":"高級製錶的藝術——從機芯工藝到經典品牌的完整指南","icon":"⌚","sections":[{"id":"watch-complications","title":"複雜功能（Complications）","content":"在鐘錶學中任何腕錶除了顯示時、分、秒之外的功能都被稱為「複雜功能」（Complication）。高級製錶的巔峰是「大複雜功能」（Grande Complication）——集多種複雜功能於一身的超級腕錶。陀飛輪（Tourbillon）——由亞伯拉罕—路易·寶璣（Abraham-Louis Breguet，1747–1823）於1801年獲得專利（法國共和曆9年獲月27日——寶璣是製錶史上最重要的發明家，他的發明還包括自動上鍊（Perpetuelle）、降落傘防震裝置（Parachute）、寶璣式雙層遊絲（Breguet Overcoil）和三問報時的簧片機制等）。陀飛輪的設計意圖是抵消地心引力對擺輪和遊絲造成的誤差：將整個擒縱機構（擒縱輪、擒縱叉、擺輪和遊絲）放置在一個旋轉的框架中（通常每分鐘旋轉一圈）。當陀飛輪框架旋轉時，地心引力對擺輪的所有方位角的影響被平均化了。然而在現代腕錶（佩戴在手腕上不斷變換位置）中這一功能的實際效用被許多專家質疑（在固定位置的懷錶中它更有價值），但製作陀飛輪所要求的極致微機械工藝（陀飛輪框架通常包含約40個組件，總重量不到1克）使其成為高級製錶中工藝的終極展示。三問報時（Minute Repeater）——被認為是所有複雜功能中最難、最考驗工藝的一種。使用者推動滑桿後腕錶會以不同音調的敲擊在微型音簧（Gong，圍繞機芯的超薄鋼製線圈）上報出當前的小時（低音）、刻鐘（高-低交替音）和分鐘（高音）。製作三問報時的挑戰在於兩個微型錘子必須以恰到好處的力度和速度敲擊音簧以產生清晰、悅耳且足夠響亮的聲音（而需要的能量全部來自使用者推動滑桿所壓縮的彈簧）——每個三問報時腕錶的聲音都是獨一無二的（音簧的長度、厚度、材質和硬化處理工藝、錘子的大小和形狀、以及錶殼的聲學特性都影響著最終的音質）。百達翡麗的每一枚三問報時腕錶在出廠前都必須由品牌的總裁（蒂埃里·斯登，Thierry Stern）親自試聽確認聲音品質——這種對品質的執著是高級製錶文化的核心體現。萬年曆（Perpetual Calendar）——能夠自動識別每個月的不同天數（28/29（閏年2月）/30/31天）和閏年週期（無需在非閏年的2月末手動調校日期），其機械記憶程序基於一個為期四年（48個月/1461天）的凸輪程序。理論上萬年曆在2100年之前都不需要調校（2100年雖然能被4整除卻不是閏年——因為世紀年只有能被400整除的才是閏年，而大多數萬年曆的機械程序無法處理這一例外）。"},{"id":"watch-brands","title":"瑞士高級製錶品牌譜系","content":"百達翡麗（Patek Philippe，1839年創立於日內瓦，安東尼·百達（波蘭流亡貴族和鐘錶商人）和弗朗索瓦·沙柏（法國製錶師）創立，後阿德里安·翡麗加盟——至今仍由斯登家族（1932年收購公司）私有經營，是日內瓦最後一家家族擁有的獨立高級製錶品牌之一）被廣泛認為是腕錶世界毫無爭議的王者。其核心價值在於極致的傳統手工工藝——每一枚百達翡麗機芯（即使是基本款）的每一個零件（包括看不見的部分）都經過精細的手工打磨和修飾（倒角（Chamfering/Anglage）、日內瓦波紋（Côtes de Genève）、圓形打磨（Perlage）和黑色拋光（Black Polish——對鋼製零件的鏡面級拋光，以至於當以特定角度觀看時它呈現為完全的黑色而非反射光線）——這種對肉眼難以察覺的細節的執著被稱為「隱形之美」（Invisible Beauty）。百達翡麗日內瓦印記（Patek Philippe Seal，自2009年起取代了日內瓦印記（Geneva Seal），百達翡麗認為日內瓦印記的標準不夠嚴格而創立了更加全面的自有品質標準——涵蓋整枚腕錶（包括錶殼、錶盤、指針、錶帶和所有功能的運作以及精確度）而非僅限於機芯）。在拍賣市場上，百達翡麗壟斷了最昂貴腕錶排行榜的前列——保羅·紐曼（好萊塢傳奇演員和賽車手）本人佩戴的勞力士Daytona Ref. 6239（2017年在富藝斯拍賣行以約1,775萬美元成交）是最昂貴的勞力士（但百達翡麗的Ref. 1518不鏽鋼萬年曆計時腕錶在2016年以約1,100萬瑞士法郎成交——這是全球僅四枚的不鏽鋼版本之一；而百達翡麗為美國銀行家和收藏家小亨利·格雷夫斯（Henry Graves Jr.）定製的「超級複雜功能」（Supercomplication，1933年交貨，花費了八年時間製作，擁有24項複雜功能）懷錶在2014年蘇富比拍賣中以約2,400萬瑞士法郎成交——創造了當時所有鐘錶的拍賣世界紀錄）。愛彼（Audemars Piguet，1875年創立於瑞士汝山谷Le Brassus，至今仍由創始人家族後代管理和部分持股——是唯一一個至今仍由創始家族參與管理的高級製錶品牌之一）以皇家橡樹（Royal Oak，1972年由鐘錶設計傳奇人物Gérald Genta（杰拉德·尊達，1931–2011，他還設計了百達翡麗的Nautilus鸚鵡螺、萬國（IWC）的工程師Ingenieur和歐米茄的星座Constellation等諸多經典）在一天內設計完成——靈感來自老式潛水頭盔的八角形舷窗和暴露的螺絲）開創了奢華不鏽鋼運動腕錶的全新品類。在1972年之前不鏽鋼被認為是廉價的「工具錶」材質，奢華腕錶必須是黃金或鉑金的——皇家橡樹的推出（當時售價比許多黃金腕錶還貴）大膽地挑戰了這個傳統認知並取得了巨大的商業成功（迅速從最初的爭議和商業失敗轉變為品牌的標誌性產品線）。"}]},{"id":"luxury-cars","title":"頂級汽車品牌","category":"lifestyle","description":"豪華與性能的終極造車藝術","icon":"🏎️","sections":[{"id":"cars-rolls-royce","title":"勞斯萊斯（Rolls-Royce）","content":"勞斯萊斯（1906年由查爾斯·勞斯（Charles Rolls，貴族出身的汽車經銷商和熱氣球/飛行愛好者）和亨利·萊斯（Henry Royce，出身貧寒、自學成才的工程師和完美的工匠——他對完美的執著被總結為「取最優之物，使其更優；若不存在，則設計之」）在英國創立）被認為是世界上最精緻的汽車品牌。2003年勞斯萊斯汽車被BMW集團收購（此前勞斯萊斯的汽車業務和飛機引擎業務已經分家——飛機引擎業務（勞斯萊斯控股公司，Rolls-Royce Holdings plc）至今仍是全球三大航空引擎製造商之一，為空中巴士A350、波音787等機型提供引擎），在英國西薩塞克斯郡的古德伍德（Goodwood）建立了全新的總部和製造工廠。Phantom（幻影系列）是勞斯萊斯的旗艦車型。幻影的製造過程展示了現代奢華汽車中可能達到的最極致的手工水準——車身的44,000多種漆色選項全部由人工手動噴塗（約45公斤的油漆經過五層噴塗和手工打磨拋光、耗時約7天才能完成）。車內的皮革來自約8–10張完整的上等牛皮（全部來自阿爾卑斯山區高海拔牧場的牛群——高海拔意味著較少蚊蟲叮咬、皮革上幾乎沒有瑕疵），經過約18天的鞣製和染色工藝。標誌性的Starlight Headliner（星空頂篷）由工匠手工在皮革車頂內襯上穿入數千根（約800–1,600根）光纖，以模擬夜空的繁星——甚至可以根據客戶的要求定製為客戶選擇的特定日期和地點（如結婚日、生日）的真實星空排列。車頭的歡慶女神（Spirit of Ecstasy）立標是勞斯萊斯最具標誌性的設計元素之一——有一個浪漫（雖然可能是傳說）的起源故事：英國貴族約翰·蒙塔古勳爵（汽車先驅和《汽車》雜誌的創始編輯，同時也是勞斯萊斯品牌的早期擁護者）委託雕塑家查爾斯·賽克斯（Charles Sykes）以勳爵的秘書（也是情人）埃莉諾·桑頓（Eleanor Thornton）為原型創作了這個雕像。現代的歡慶女神以不鏽鋼或鍍金材質手工鑄造和拋光。"}]}]}];
// ── RENDER ──
function renderCategories() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = categories.map(c => `
    <div class="cat-card" onclick="openCategory('${c.id}')">
      <div class="cat-icon" style="background:${c.color}15">${c.icon}</div>
      <div class="cat-title">${c.title}</div>
      <div class="cat-count">${c.topics.length} 個主題</div>
    </div>
  `).join('');
}

function openCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const topicView = document.getElementById('topicView');
  const homeView = document.getElementById('homeView');

  topicView.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="breadcrumb" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${cat.title}</div>
    </div>
    <div class="section-title">主題列表（${cat.topics.length}）</div>
    ${cat.topics.map(t => `
      <div class="cat-card" style="text-align:left;padding:16px;margin-bottom:10px" onclick="openTopic('${cat.id}','${t.id}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px">${t.icon}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:15px;color:var(--text)">${t.title}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.4">${t.desc}</div>
          </div>
          <span style="font-size:20px;color:var(--primary-pale)">›</span>
        </div>
      </div>
    `).join('')}
  `;

  homeView.classList.add('hidden');
  topicView.classList.add('active');
  document.getElementById('contentArea').scrollTop = 0;
}

function openTopic(catId, topicId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const topic = cat.topics.find(t => t.id === topicId);
  if (!topic) return;

  const topicView = document.getElementById('topicView');
  topicView.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="openCategory('${catId}')">←</button>
      <div class="breadcrumb" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${cat.title}</div>
    </div>
    <div class="topic-header">
      <div class="topic-h1">${topic.icon} ${topic.title}</div>
      <div class="topic-desc">${topic.desc}</div>
      <div class="topic-actions">
        <button class="action-btn" id="bookmarkBtn" onclick="toggleBookmark(this, '${topicId}')">☆ 收藏</button>
        <button class="action-btn" onclick="showToast('📥 文章已儲存為離線閱讀')">📂 離線閱讀</button>
      </div>
    </div>
    <div class="accordion" id="accordionRoot">
      ${topic.sections.map((s, i) => renderSection(s, 0, i)).join('')}
    </div>
  `;
  document.getElementById('contentArea').scrollTop = 0;

  // Open first level by default
  document.querySelectorAll('.accordion-item.depth-0').forEach(item => item.classList.add('open'));
}

function renderSection(section, depth, index) {
  const hasSubs = section.subs && section.subs.length > 0;
  const depthClass = `depth-${Math.min(depth, 3)}`;
  return `
    <div class="accordion-item ${depthClass} ${depth === 0 ? 'open' : ''}">
      <div class="accordion-header" onclick="toggleSection(this.parentElement)">
        ${hasSubs
          ? `<span class="arrow">▶</span>`
          : `<span class="dot"></span>`
        }
        <span class="accordion-title">${section.title}</span>
      </div>
      <div class="accordion-body">
        ${section.content ? `<div class="accordion-content">${section.content}</div>` : ''}
        ${hasSubs ? section.subs.map((sub, i) => renderSection(sub, depth + 1, i)).join('') : ''}
      </div>
    </div>
  `;
}

function toggleSection(item) {
  item.classList.toggle('open');
}

function goHome() {
  const topicView = document.getElementById('topicView');
  const homeView = document.getElementById('homeView');
  topicView.classList.remove('active');
  homeView.classList.remove('hidden');
  document.getElementById('contentArea').scrollTop = 0;
}

function toggleBookmark(btn, topicId) {
  btn.classList.toggle('bookmarked');
  if (btn.classList.contains('bookmarked')) {
    btn.innerHTML = '⭐ 已收藏';
    showToast('⭐ 已加入收藏');
  } else {
    btn.innerHTML = '☆ 收藏';
    showToast('已取消收藏');
  }
}

function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('searchResults');
  const homeView = document.getElementById('homeView');

  if (!query) {
    if (resultsDiv) resultsDiv.remove();
    return;
  }

  const results = [];
  categories.forEach(cat => {
    cat.topics.forEach(topic => {
      if (topic.title.toLowerCase().includes(query) || topic.desc.toLowerCase().includes(query)) {
        results.push({ topic, cat });
      }
    });
  });

  let existing = document.getElementById('searchResults');
  if (existing) existing.remove();

  if (results.length === 0) return;

  const div = document.createElement('div');
  div.id = 'searchResults';
  div.style.cssText = 'margin-bottom:16px;animation:fadeSlideIn 0.3s ease';
  div.innerHTML = `
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">找到 ${results.length} 個相關主題</div>
    ${results.map(r => `
      <div class="cat-card" style="text-align:left;padding:14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between" onclick="openTopic('${r.cat.id}','${r.topic.id}')">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">${r.topic.icon}</span>
          <div>
            <div style="font-weight:600;font-size:14px">${r.topic.title}</div>
            <span style="font-size:11px;padding:2px 8px;border-radius:6px;background:${r.cat.color}15;color:${r.cat.color}">${r.cat.title}</span>
          </div>
        </div>
        <span style="font-size:18px;color:var(--primary-pale)">›</span>
      </div>
    `).join('')}
  `;
  homeView.insertBefore(div, homeView.firstChild);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// Init
renderCategories();
</script>
</body>
</html>
