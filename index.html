<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mikipedia — 探索知識的世界</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #5B21B6;
  --primary-dark: #4C1D95;
  --primary-light: #7C3AED;
  --primary-pale: #A78BFA;
  --primary-ghost: #C4B5FD;
  --bg: #F5F3FF;
  --bg-light: #FAFAFE;
  --surface: #FFFFFF;
  --surface-alt: #F8F7FF;
  --text: #1F2937;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --border: #E9D5FF;
  --border-light: #F3E8FF;
  --shadow: rgba(91, 33, 182, 0.08);
  --shadow-md: rgba(91, 33, 182, 0.12);
  --gold: #B7942E;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-serif: 'Noto Serif TC', 'Times New Roman', serif;
  --font-sans: 'Noto Sans TC', -apple-system, sans-serif;
  --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Subtle texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(124, 58, 237, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(167, 139, 250, 0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  background: rgba(245, 243, 255, 0.7);
  backdrop-filter: blur(20px);
  border-left: 1px solid var(--border-light);
  border-right: 1px solid var(--border-light);
  box-shadow: 0 0 60px var(--shadow), 0 0 120px rgba(91, 33, 182, 0.03);
}

/* ── Header ── */
.header {
  padding: 48px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(245, 243, 255, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-light);
}

.header-left { display: flex; flex-direction: column; }

.logo {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 900;
  color: var(--primary-dark);
  letter-spacing: -0.5px;
  line-height: 1;
}

.logo-accent {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--primary-light);
  border-radius: 2px;
  margin-left: 2px;
  vertical-align: super;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.8); }
}

.subtitle {
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-style: italic;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.header-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: var(--surface);
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.header-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(91, 33, 182, 0.25);
}

/* ── Search ── */
.search-wrapper {
  padding: 12px 24px;
  position: sticky;
  top: 100px;
  z-index: 99;
  background: rgba(245, 243, 255, 0.85);
  backdrop-filter: blur(16px);
}

.search-bar {
  display: flex;
  align-items: center;
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 0 16px;
  border: 1px solid var(--border-light);
  transition: all var(--transition);
  cursor: text;
  box-shadow: 0 1px 3px var(--shadow);
}
.search-bar:focus-within {
  border-color: var(--primary-pale);
  box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15), 0 2px 8px var(--shadow-md);
}
.search-bar input {
  flex: 1;
  border: none;
  background: none;
  padding: 14px 0;
  font-size: 15px;
  font-family: var(--font-sans);
  color: var(--text);
  outline: none;
}
.search-bar input::placeholder { color: var(--text-tertiary); }
.search-icon { font-size: 16px; margin-right: 10px; opacity: 0.6; }

/* ── Content ── */
.content {
  padding: 8px 24px 120px;
}

.section-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Category Cards ── */
.categories-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.cat-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 18px 14px;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border-light);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.cat-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(167, 139, 250, 0.06), transparent);
  opacity: 0;
  transition: opacity var(--transition);
}
.cat-card:hover::before { opacity: 1; }
.cat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px var(--shadow-md);
  border-color: var(--primary-pale);
}
.cat-card:active { transform: scale(0.97); }

.cat-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin: 0 auto 10px;
}

.cat-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.cat-count {
  font-size: 11px;
  color: var(--text-tertiary);
}

/* ── Topic Detail View ── */
.topic-view {
  display: none;
  animation: fadeSlideIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.topic-view.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.back-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-top: 4px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: all var(--transition);
  color: var(--primary-light);
  font-weight: 700;
}
.back-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

.breadcrumb {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
}

.topic-header { margin-bottom: 20px; }
.topic-h1 {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 6px;
  line-height: 1.3;
}
.topic-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.topic-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border-light);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
  color: var(--text-secondary);
}
.action-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(91, 33, 182, 0.2);
}
.action-btn.bookmarked { background: #FEF3C7; border-color: #F59E0B; color: #B45309; }

/* ── Collapsible Accordion ── */
.accordion { margin-top: 4px; }

.accordion-item { margin-bottom: 2px; }

.accordion-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  position: relative;
  user-select: none;
}
.accordion-header:hover { background: rgba(167, 139, 250, 0.06); }

.accordion-header .arrow {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  transition: transform var(--transition);
  font-size: 10px;
  color: var(--primary-light);
  flex-shrink: 0;
}
.accordion-item.open > .accordion-header .arrow { transform: rotate(90deg); }

.accordion-header .dot {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  flex-shrink: 0;
}
.accordion-header .dot::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--primary-ghost);
}

.accordion-title {
  font-weight: 500;
  color: var(--text);
  flex: 1;
  line-height: 1.4;
}

/* Depth styles */
.depth-0 .accordion-title { font-family: var(--font-serif); font-size: 18px; font-weight: 700; color: var(--primary-dark); }
.depth-1 .accordion-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--primary); }
.depth-2 .accordion-title { font-size: 14px; font-weight: 500; }
.depth-3 .accordion-title { font-size: 13px; font-weight: 400; color: var(--text-secondary); }

.depth-1 > .accordion-header { border-left: 3px solid var(--primary-light); padding-left: 28px; background: var(--surface); }
.depth-2 > .accordion-header { border-left: 3px solid var(--primary-pale); padding-left: 42px; background: var(--surface-alt); }
.depth-3 > .accordion-header { border-left: 2px solid var(--border); padding-left: 56px; }

.accordion-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s cubic-bezier(0.22, 0.61, 0.36, 1), padding 0.4s ease;
}
.accordion-item.open > .accordion-body {
  max-height: 2000px;
}

.accordion-content {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-secondary);
  padding: 10px 16px 16px;
}
.depth-0 > .accordion-body .accordion-content { padding-left: 28px; }
.depth-1 > .accordion-body .accordion-content { padding-left: 42px; }
.depth-2 > .accordion-body .accordion-content { padding-left: 56px; }

/* ── Home View Transitions ── */
.home-view { display: block; }
.home-view.hidden { display: none; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--primary-dark);
  color: white;
  padding: 14px 24px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-family: var(--font-sans);
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
  box-shadow: 0 12px 32px rgba(76, 29, 149, 0.35);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Footer ── */
.app-footer {
  text-align: center;
  padding: 32px 24px 48px;
}
.app-footer p { font-size: 12px; color: var(--text-tertiary); }
.app-footer .divider {
  width: 40px;
  height: 1px;
  background: var(--border);
  margin: 14px auto;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .app { max-width: 100%; border: none; }
  .header { padding: 40px 16px 12px; }
  .search-wrapper { padding: 10px 16px; }
  .content { padding: 8px 16px 100px; }
  .categories-grid { gap: 8px; }
  .cat-card { padding: 14px 10px; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">Mikipedia<span class="logo-accent"></span></div>
      <div class="subtitle">探索知識的世界</div>
    </div>
    <div class="header-actions">
      <button class="header-btn" title="收藏" onclick="showToast('⭐ 已加入收藏')">⭐</button>
      <button class="header-btn" title="離線文章" onclick="showToast('📥 已儲存為離線閱讀')">📥</button>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-wrapper">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="搜索主題..." id="searchInput" oninput="handleSearch()">
    </div>
  </div>

  <!-- Content Area -->
  <div class="content" id="contentArea">
    <!-- Home View -->
    <div class="home-view" id="homeView">
      <div class="section-title">知識分類</div>
      <div class="categories-grid" id="categoriesGrid"></div>
      <div class="app-footer">
        <div class="divider"></div>
        <p>涵蓋 7 大分類 · 42+ 個主題</p>
        <p style="margin-top:4px">層層深入 · 大學入門級深度</p>
      </div>
    </div>
    <!-- Topic Detail View -->
    <div class="topic-view" id="topicView"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

const categories = [{"id":"culture","title":"文化","icon":"🎨","color":"#8B5CF6","description":"探索藝術、音樂、服飾、體育等多元文化領域的精華","topics":[{"id":"art-styles","title":"藝術風格","category":"culture","description":"從古典到當代，世界各大藝術流派的演變、技法與代表作品","icon":"🖼️","sections":[{"id":"as-western","title":"西方藝術風格演變","content":"西方藝術從中世紀到現代經歷了巨大的變革——從服務於宗教的功能性裝飾，到文藝復興時期的科學化再現，再到現代的觀念和抽象表達。每一種藝術風格都反映了其時代的世界觀和審美取向。","subsections":[{"id":"as-renaissance","title":"文藝復興藝術（14–16世紀）","content":"文藝復興的核心是重新發現古典時代的人文主義精神和對人的價值的肯定。透視法（布魯內萊斯基，約1415年）、解剖學研究、明暗法（Chiaroscuro）的運用，使藝術家能夠在平面上創造出令人信服的三維空間和真實的人體。","subsections":[{"id":"as-italian-ren","title":"義大利文藝復興","content":"義大利文藝復興分為早期和盛期。早期代表人物波提切利的《春》（Primavera）和《維納斯的誕生》以優美的線條和神話主題為特色。盛期三傑將藝術推向了頂峰：達文西是文藝復興「全能人」的理想典範——畫家、雕塑家、建築師、科學家、發明家。《蒙娜麗莎》（約1503–1519）以其神秘的微笑、Sfumato（暈塗法，以極其細膩的光影過渡消除輪廓線）和大氣透視而聞名。《最後的晚餐》（1495–1498）則以其精確的透視構圖和對門徒在聽到耶穌預言背叛時不同反應的戲劇性呈現被認為是文藝復興藝術的至高傑作。米開朗基羅認為雕塑是最高藝術形式——大衛雕像（1501–1504）展現了理想化的人體美和英雄氣概；西斯廷教堂天頂壁畫《創世紀》（1508–1512）是單人完成的壁畫奇蹟，其中《創造亞當》中上帝與亞當手指相接的畫面成為西方藝術最著名的圖像之一。拉斐爾以和諧典雅的構圖和溫柔的人文主義精神著稱，《雅典學院》（1509–1511）以建築透視為框架，將古希臘不同時代的哲學家和科學家聚集在同一場景中，完美體現了文藝復興對古典文化的崇尚。"},{"id":"as-northern-ren","title":"北歐文藝復興","content":"北歐文藝復興（尼德蘭和德意志地區）以對細節的極致追求而聞名。楊·凡·艾克被認為是油畫技法的完善者——油彩的慢乾特性使藝術家得以反覆修改和疊加透明色層，創造出前所未有的光澤感和精細度。《阿爾諾芬尼夫婦像》（1434年）的每個細節——吊燈、鏡子（反射出畫家本人的小像）、小狗、木鞋——都精緻入微，充滿了象徵意義。杜勒（德國，1471–1528）將義大利文藝復興對人體比例的科學研究帶入了北歐。他對自畫像的探索（從13歲到老年）是西方藝術史上最完整的自我形象記錄之一。他的版畫（《啟示錄四騎士》，1498年）通過新的印刷技術（木刻版畫和銅版畫）將藝術作品普及到更廣泛的受眾。"}]},{"id":"as-baroque-rococo","title":"巴洛克與洛可可（17–18世紀）","content":"巴洛克藝術（約1600–1750）是天主教會反宗教改革運動的視覺武器，以戲劇性、動感、華麗和強烈的情感為特徵。卡拉瓦喬以極端的明暗對比（Tenebrism）將聖經故事從天堂拉回人間——畫中人物如同當時羅馬街頭的普通人。《聖馬太蒙召》（1599–1600）中一道強光照入黑暗的房間，照亮了稅吏馬太被耶穌呼召的那一刻。在荷蘭（新教國家），世俗題材取代宗教成為主流：林布蘭的《夜巡》（1642年）以複雜的光影安排和對人物個性的深刻描繪超越了傳統集體肖像的刻板模式；維梅爾的《戴珍珠耳環的少女》（約1665年）被稱為「北方的蒙娜麗莎」，以對光線的極致敏感捕捉了一個永恆的瞬間。洛可可（約1730–1770年代）則是法國貴族優雅享樂生活的折射：華托的「雅宴畫」（Fête Galante）描繪了貴族在田園詩般的環境中的浪漫聚會；布雪和弗拉戈納爾則以更為甜美和情色的風格聞名，《鞦韆》（弗拉戈納爾，1767年）中少女盪鞦韆時故意踢飛高跟鞋的輕佻姿態是洛可可精神的完美體現。"},{"id":"as-impressionism","title":"印象派與後印象派（19世紀後期）","content":"印象派（1860s–1880s）是現代藝術的開端。1874年，一群被巴黎沙龍拒之門外的年輕藝術家在攝影師納達爾的工作室舉辦了第一次獨立展覽，批評家路易·勒魯瓦以莫內的《印象·日出》為由稱他們為「印象主義者」。印象派藝術家走出畫室到戶外（En Plein Air）捕捉光線和色彩的瞬間印象——莫內在不同光線下反覆描繪同一對象（乾草堆系列、盧昂大教堂系列），以短小而分離的純色筆觸表現光線的變化本質；雷諾瓦擅長於描繪陽光下的人群和歡樂場景（《煎餅磨坊的舞會》，1876年）；德加則以獨特的視角（如從上方俯視）和對動態的捕捉記錄了芭蕾舞演員和賽馬場景。後印象派的三位巨匠各自走向了不同的方向：塞尚被稱為「現代藝術之父」，他以圓柱體、球體和圓錐體來理解和描繪自然界（「以圓柱體、球體和圓錐體處理自然」），其對物體結構的分析直接影響了立體主義的誕生；梵谷以火焰般的旋轉筆觸和強烈的情感色彩（向日葵的明黃、星夜的渦卷天空、麥田的群鴉）表達了一種痛苦的激情——他一生只賣出了一張畫，卻在身後成為世界上最有知名度的藝術家之一；高更放棄了巴黎的資產階級生活遠赴大溪地，以平塗的色彩和象徵性的主題（《我們從哪裡來？我們是什麼？我們到哪裡去？》）探索生命的原始和精神維度。"},{"id":"as-modern-contemporary","title":"現代與當代藝術（20–21世紀）","content":"20世紀是藝術史上最為激盪的時期，藝術的邊界被不斷突破和重新定義。","subsections":[{"id":"as-cubism","title":"立體主義與抽象先驅","content":"畢卡索和布拉克於1907–1914年創立了立體主義，徹底打破了自文藝復興以來主宰西方藝術的單點透視法則。分析立體主義將物體分解為多個視角的碎片化幾何形狀同時呈現在畫布上；綜合立體主義則將報紙、壁紙等現成物拼貼（Collage）到畫面上。畢卡索的《亞威農少女》（1907年）以非洲面具般的面孔和破碎的幾何形體震驚了藝術界，被視為現代藝術的開山之作。《格爾尼卡》（1937年）是畢卡索對納粹德國轟炸西班牙小鎮格爾尼卡（Guernica）的強烈抗議——黑白的色調、扭曲的形體、尖叫的母親和死去的嬰兒，以立體主義的視覺語言將戰爭的恐怖凝結為永恆的控訴。康丁斯基被認為是純抽象繪畫的開創者——他相信色彩和形狀本身就具有「內在的聲音」和精神力量，能夠繞過物質世界的再現而直接觸動觀者的靈魂。馬列維奇的至上主義（《白底上的黑色方塊》，1915年）則將藝術推向了純粹幾何抽象的極限。蒙德里安以垂直和水平線條、紅黃藍三原色和黑白構成的新造型主義（De Stijl風格派），追求一種普世的、客觀的和諧秩序。"},{"id":"as-dada-surrealism","title":"達達與超現實主義","content":"達達主義（1916–1920s）誕生於第一次世界大戰期間的中立國瑞士蘇黎世，是對戰爭所暴露的理性文明幻滅的虛無主義回應。杜象以《噴泉》（1917年，一個署名「R. Mutt」、倒置在基座上的小便斗）挑戰了藝術的本體論問題——什麼是藝術？如果藝術家選擇了一個現成品並賦予它一個名稱，它是否就變成了藝術？這件作品對整個20世紀後半葉的觀念藝術產生了深遠的影響。超現實主義（1920s–）受佛洛伊德潛意識理論的啟發，致力於釋放被理性壓抑的潛意識和夢境世界。達利以精確寫實的技法（他稱之為「手繪的夢境照片」）描繪荒誕的夢境場景——軟塌塌的鐘錶（《記憶的永恆》，1931年）、燃燒的長頸鹿、從石榴中跳出的老虎和魚。馬格利特則以日常物品的悖論性組合（《形象的叛逆》中畫有一隻精緻的煙斗，卻寫著「Ceci n'est pas une pipe」——「這不是一個煙斗」）來挑戰語言與圖像、現實與再現之間的關係。"},{"id":"as-post-war","title":"戰後至當代","content":"二戰後藝術中心從巴黎轉移到紐約。抽象表現主義（又稱紐約畫派，1940s–1950s）以波洛克（滴畫法——將顏料以滴灑和潑濺的方式鋪滿鋪在地上的巨大畫布，身體的運動軌跡直接變成了畫面的構成）和羅斯科（大面積的彩色矩形漂浮在色域之上，追求一種冥想的、精神性的觀看體驗——觀者被鼓勵站在畫作近前，讓色彩「包圍」自己）為代表。普普藝術（1950s–1960s）將大眾消費文化的廉價圖像——可樂瓶、坎貝爾湯罐頭（安迪·沃荷）、漫畫（李奇登斯坦的Ben-Day點狀印刷效果）——提升到藝術殿堂，模糊了「高雅藝術」和「低俗文化」之間的界限。極簡主義（1960s–）以最簡化的幾何形式和工業材料（鋼板、霓虹燈管、磚塊）消除了藝術家個人情感的痕跡。當代藝術（1980s至今）進入了徹底多元化的時代——裝置藝術、行為藝術、錄像藝術、數位藝術、NFT藝術等層出不窮，任何媒介和主題都可以成為藝術的表達方式。艾未未的裝置作品以日常物品（葵花籽、自行車、背包）承載對歷史、政治和個人命運的深刻反思；草間彌生以無限鏡像空間和「波點」構建了一個跨越內在幻覺和外在宇宙的個人烏托邦。"}]}]},{"id":"as-chinese","title":"中國藝術風格","content":"中國藝術自成獨立的體系，以筆墨為核心語言，講究「氣韻生動」（謝赫六法論的第一要義），追求「外師造化，中得心源」的創作原則。","subsections":[{"id":"as-chinese-painting","title":"中國繪畫的發展脈絡","content":"中國畫分為人物畫（最早成熟）、山水畫（最高成就）和花鳥畫三大科。山水畫在魏晉時期開始獨立發展，但真正成熟是在五代和宋代。北宋時期的山水畫以全景式構圖為特徵：范寬的《谿山行旅圖》（約1000年，台北故宮博物院藏）以一座巨大的山峰佔據畫面的三分之二，山腳下渺小的騾馬商隊襯托出自然的崇高和人類的卑微——這幅畫是中國山水畫乃至世界繪畫史上最重要的作品之一。南宋時期馬遠和夏圭開創了「一角構圖」和「半邊構圖」——大面積留白暗示著無限的空間和水面，以有限的畫面引發觀者對無限的聯想。元代（1271–1368）因蒙古統治下漢族士人的政治疏離，山水畫轉向更加個人化和內省的表達：黃公望的《富春山居圖》（1350年）以瀟灑鬆動的筆墨描繪浙江富春江的山水景色，被譽為「畫中之蘭亭」。明代董其昌（1555–1636）提出了南北宗論——以禪宗的南頓北漸來類比中國繪畫的兩種傳統，「南宗」（王維為始祖，文人畫傳統）重視筆墨趣味和精神性表達，「北宗」（李思訓為始祖，院體畫傳統）重視技巧和裝飾性，這一理論深刻影響了此後三百年的中國畫批評和創作。近現代中國畫經歷了中西融合的變革：徐悲鴻將西方寫實主義融入中國畫（《愚公移山》）；齊白石以簡率天真的大寫意花鳥蟲魚聞名（「似與不似之間」是他的美學主張）；張大千晚年以潑墨潑彩技法在西方抽象表現主義和中國傳統之間找到了獨特的融合路徑。"},{"id":"as-calligraphy","title":"中國書法藝術","content":"書法被譽為中國藝術之首，是基於漢字書寫而發展出來的獨特視覺藝術。書法的演變與漢字形體的演變同步：甲骨文（殷商）是已知最早的成熟漢字，刻寫於龜甲獸骨之上，以尖銳的刻劃線條為特徵。金文（鐘鼎文）鑄造或刻於青銅器上，筆劃渾厚圓潤。篆書分為大篆（籀文，秦統一前各國文字）和小篆——秦始皇統一文字後李斯以秦國文字為基礎創製的小篆，筆劃均勻、結構對稱。隸書是漢代（前206–220）的主流書體，由篆書簡化演變而來，其標誌性的「蠶頭燕尾」（起筆如蠶頭圓潤，收筆如燕尾上揚）使書寫速度大大加快。楷書（又稱真書、正書）在漢末形成，至唐代達到極盛——歐陽詢（歐體，險峻嚴謹）、顏真卿（顏體，雄渾寬博）、柳公權（柳體，骨力勁健）各創一體，影響至今。行書是介於楷書和草書之間的流暢書體。王羲之（303–361）被尊為「書聖」，其《蘭亭序》（353年，永和九年暮春之初於會稽山陰之蘭亭所書）被譽為「天下第一行書」——通篇324字，「之」字出現了21次，每個都寫法不同，體現了書法在規矩和自由之間的完美平衡。顏真卿的《祭姪文稿》則被譽為「天下第二行書」——在極度悲憤的情緒下（為祭奠在安史之亂中犧牲的姪子顏季明而作），不經意間寫出了書法史上前無古人的傑作，滿紙塗抹修改的痕跡反而真實記錄了書寫者情感的波動。草書是書寫速度和情感表達的極致：張旭（「顛張」）醉酒後狂奔呼喊而後落筆成書；懷素（「醉素」）自稱「忽然絕叫三五聲，滿壁縱橫千萬字」。他們的狂草突破了文字的可讀性限制，是漢字的純粹視覺抽象和情感的即興噴發。"}]}]},{"id":"music-genres","title":"音樂風格","category":"culture","description":"從古典交響樂到現代電子音樂——音樂風格的完整發展脈絡與鑑賞指南","icon":"🎵","sections":[{"id":"mg-western-classical","title":"西方古典音樂","content":"西方古典音樂是根基於歐洲文化傳統的「藝術音樂」，以其複雜的結構、豐富的和聲語言和系統化的記譜法為特徵。","subsections":[{"id":"mg-baroque","title":"巴洛克時期（1600–1750）","content":"巴洛克音樂以複調織體（多個獨立的旋律線同時進行的對位法）、數字低音（Basso Continuo——由低音旋律線和數字標記的和聲體系）為核心特徵。巴赫（1685–1750）是巴洛克音樂的集大成者，將對位法藝術推向了後人難以企及的高度——《布蘭登堡協奏曲》（6首，1721年）是協奏曲形式的典範；《馬太受難曲》（1727年）以雙合唱、雙樂隊和獨唱的形式講述耶穌受難的故事，被門德爾松在1829年重新發掘和演出後引發了巴赫音樂的全球復興；《平均律鋼琴曲集》（兩卷，各24首前奏曲與賦格，涵蓋全部24個大小調）證明了平均律調音體系的可行性（在平均律下，所有的調聽起來都一樣好），被譽為鋼琴音樂的「舊約聖經」。韓德爾（1685–1759）以歌劇和清唱劇聞名（《彌賽亞》，1741年，其中「哈利路亞」大合唱已成為西方音樂最著名的片段——英國國王喬治二世在首次聽到這段音樂時感動得站了起來，從此全場起立聆聽「哈利路亞」的傳統延續至今）。韋瓦第（1678–1741）的《四季》（1725年）是早期標題音樂（Program Music）的傑作——四首小提琴協奏曲分別以十四行詩描述春夏秋冬的景象（如「春」中的鳥鳴和小溪潺潺、「冬」中的牙齒打顫和爐邊取暖）。"},{"id":"mg-classical","title":"古典主義時期（1750–1820）","content":"古典主義音樂追求均衡、清晰、優雅的形式美。交響曲和弦樂四重奏在這一時期定型。海頓（1732–1809）被尊為「交響曲之父」和「弦樂四重奏之父」——他創作了104首交響曲和68首弦樂四重奏，奠定了這些體裁的經典結構。莫扎特（1756–1791）是音樂史上最令人驚嘆的神童——4歲開始作曲，6歲在歐洲巡迴演出，雖然僅活了35年，卻留下了626部作品。他的歌劇（《費加洛的婚禮》、《唐·喬望尼》、《魔笛》）將音樂和戲劇完美融合；他的鋼琴協奏曲（27首）是這一體裁的巔峰。《安魂曲》（K. 626，1791年）是莫扎特的最後一部作品——據傳一位匿名委託人（實際是一位伯爵想將作品冒充成自己的創作以悼念亡妻）委託莫扎特創作安魂曲，莫扎特在生命的最後日子裡（可能是腎衰竭或風濕熱）深信自己正在為自己的葬禮譜寫彌撒——作品未完成他便去世了，由他的學生弗朗茨·蘇斯邁爾續成。貝多芬（1770–1827）是連接古典主義和浪漫主義的橋樑。他在約30歲時開始逐漸失去聽力（可能由鉛中毒、佩吉特氏病或免疫系統疾病引起），到晚年完全失聰，但仍在內心「聽見」音樂並寫下了許多最偉大的作品。第三交響曲《英雄》（1803–1804）原題獻給拿破崙，但當拿破崙稱帝的消息傳來後，貝多芬憤怒地撕去了題獻頁，重新命名為「為紀念一位偉人而作」。第五交響曲《命運》（1804–1808）的開篇四音動機（短—短—短—長，dada-da-DAA）是音樂史上最著名的旋律片段之一。第九交響曲《合唱》（1824年）首次在交響曲的終樂章引入了人聲（席勒的詩《歡樂頌》），具有人類大同的博愛精神——1985年歐盟將其選定為歐盟盟歌。"},{"id":"mg-romantic","title":"浪漫主義時期（1820–1900）","content":"浪漫主義音樂強調個人情感的表現、對自然的熱愛和對超自然題材的迷戀。舒伯特（1797–1828）被譽為「藝術歌曲之王」，在短短31年的生命中創作了超過600首藝術歌曲（Lieder），以鋼琴和人聲的親密對話將德語詩歌的意境提升到了新的高度。《魔王》以疾速的鋼琴伴奏描繪父親策馬飛奔的場景，一人分飾敘事者、父親、兒子和魔王四個角色。白遼士的《幻想交響曲》（1830年）開創了固定樂思（Idée Fixe）的音樂敘事手法——一個代表「所愛之人」的旋律主題貫穿整部交響曲的各個樂章。蕭邦（1810–1849）幾乎畢生只為鋼琴作曲。他的夜曲（21首）以歌唱性的旋律（受義大利美聲歌劇的啟發）和精緻的裝飾音為特色；練習曲（27首）將技術練習的體裁提升到藝術傑作的地位（「革命練習曲」Op. 10 No. 12據說創作於俄羅斯鎮壓波蘭十一月起義的悲憤之中）。李斯特以其炫目的鋼琴技巧成為19世紀的超級明星——他的鋼琴獨奏會（他發明了「Recital」這個詞）引發了「李斯特狂熱」現象。柴可夫斯基（1840–1893）的芭蕾舞劇（《天鵝湖》、《睡美人》、《胡桃鉗》）至今仍是全球芭蕾舞團的核心劇目；《1812序曲》（1880年）以真實的加農炮和教堂鐘聲重現了俄羅斯抵禦拿破崙入侵的勝利。華格納（1813–1883）將歌劇改革為「樂劇」（Music Drama）——「總體藝術作品」（Gesamtkunstwerk）的理念要求音樂、詩歌、戲劇、舞台設計融為一體。《尼伯龍根的指環》（Der Ring des Nibelungen）四聯劇（《萊茵的黃金》、《女武神》、《齊格菲》、《諸神的黃昏》）歷時26年創作（1848–1874），演出時間總長約15小時，以主導動機（Leitmotif）貫穿整部作品——每個人物、物品或概念都有其特定的音樂主題。"},{"id":"mg-20th-century","title":"20世紀古典音樂","content":"20世紀的古典音樂經歷了前所未有的多樣化發展。德布西的印象主義音樂以全音階和平行和弦營造朦朧的音響畫面（《牧神午後前奏曲》，1894年，被認為是現代音樂的開端）。斯特拉文斯基的《春之祭》（1913年）在巴黎首演時引發了音樂史上最著名的騷亂——不規則的重音、複調性的衝突和原始主義的暴力節奏徹底顛覆了傳統芭蕾音樂的審美。勳伯格在1920年代發明了十二音技法（廢除傳統調性中心的序列主義作曲法），影響了整個世紀的嚴肅音樂創作。極簡主義音樂（Minimalism，1960s–）以反覆的簡短音樂模式和漸進的變化為核心——菲利普·格拉斯的歌劇《愛因斯坦在海灘上》（1976年）以長時間的重複和微妙的變化挑戰了聽眾對時間和音樂結構的感知。"}]},{"id":"mg-popular","title":"流行音樂的發展","content":"20世紀以來流行音樂成為全球性的文化現象，以多元的風格、商業化的運作和大眾傳播的方式深刻地影響了人們的生活。","subsections":[{"id":"mg-jazz","title":"爵士樂（Jazz）","content":"爵士樂於20世紀初在新奧爾良誕生，是非洲節奏傳統與歐洲和聲體系在美洲土壤上的融合結晶。新奧爾良爵士（Dixieland）以集體即興為特色——小號、長號和單簧管同時即興演奏不同的旋律線。路易斯·阿姆斯壯（1901–1971）將爵士樂從集體即興轉向獨奏家的藝術——他獨特的小號演奏和沙啞的嗓音（以及他開創的「擬聲唱法」——Scat Singing，以「doo-bee-doo-bah」等無意義音節進行即興演唱）重新定義了爵士樂的可能。搖擺樂時代（Swing Era，1930s）以艾靈頓公爵和貝西伯爵的大樂隊為代表，是爵士樂作為大眾舞曲的黃金時代。Bebop革命（1940s）由查理·帕克和迪齊·吉萊斯皮等人發起——極快的速度、複雜的和聲替換和技巧性的即興將爵士樂從舞曲轉變為強調藝術性的聆聽音樂。邁爾士·戴維斯（1926–1991）是爵士樂不停革新的推動者——《Kind of Blue》（1959年）以調式爵士（基於音階而非和弦進行來即興）創造了爵士史上最暢銷的專輯，也是公認的傑作。約翰·柯川（1926–1967）的《A Love Supreme》（1965年）是爵士靈歌（Spiritual Jazz）的里程碑——四樂章的組曲記錄了柯川個人從迷失到靈性覺醒的旅程，將爵士樂提升到純粹的精神修行層面。"},{"id":"mg-rock","title":"搖滾樂（Rock）","content":"搖滾樂在1950年代誕生於美國，融合了節奏藍調、鄉村音樂和福音音樂。貓王艾維斯·普里斯萊（1935–1977）以充滿爭議的表演風格（旋轉的骨盆）和融合黑白音樂傳統的嗓音引爆了搖滾革命。1960年代披頭四（The Beatles）不僅是搖滾史上最成功的商業組合，更是將流行音樂提升到藝術形式的關鍵力量——從早期的流行搖滾（《Please Please Me》，1963年）轉向《Rubber Soul》（1965年，受大麻和鮑勃·迪倫的影響）、再到革命性的《Sgt. Pepper's Lonely Hearts Club Band》（1967年），這張專輯以概念專輯的形式、運用磁帶循環、倒放錄音和印度音樂元素等實驗技術，模糊了流行音樂和前衛藝術之間的界限。平克·佛洛伊德的《The Dark Side of the Moon》（1973年）以前衛搖滾的複雜結構、哲學性的歌詞和劃時代的錄音技術探索了現代生活中的壓力、瘋狂、死亡和時間流逝——這張專輯在Billboard專輯榜上連續停留了741週（超過14年），是唱片工業最驚人的長銷記錄之一。搖滾樂發展出的分支包括重金屬（Black Sabbath、Led Zeppelin）、龐克搖滾（Sex Pistols、The Clash，以三和弦和反體制的姿態對抗搖滾的「過度複雜化」）、另類搖滾（Nirvana的《Nevermind》1991年將Grunge音樂從西雅圖的地下場景推向全球主流）等。鮑勃·迪倫在2016年獲得了諾貝爾文學獎——「在偉大的美國歌曲傳統中創造了新的詩意表達」——證明了流行音樂的歌詞創作同樣可以達到文學的高度。"}]}]},{"id":"fashion","title":"服裝史與時尚","category":"culture","description":"從古代服飾到現代時裝設計——服裝文化的演變、經典品牌與時尚生態","icon":"👗","sections":[{"id":"fh-evolution","title":"服裝歷史演變","content":"服裝是人類文明最直觀的標誌之一，反映著社會制度、技術水平、審美觀念和身分認同的變遷。","subsections":[{"id":"fh-chinese","title":"中國傳統服飾體系","content":"中國服飾歷史悠久、體系完整。漢服是中國傳統服飾的總稱，其核心特徵為：交領右衽（衣領相交且右襟壓左襟）、寬袍大袖、繫帶隱扣，以平面裁剪為基本方式。主要形制包括衣裳制（上衣下裳，最古老的形制）、深衣制（上下連為一體，象徵「規矩」——上衣的四幅代表四季、下裳的十二幅代表十二月份）和袍服制。周代是服飾制度的奠基期——《周禮》詳細規定了天子、諸侯、大夫、士各等級在祭祀、朝會、喪葬等不同場合的穿戴，服飾成為禮制的重要組成部分。唐代是中國服飾最為華麗開放的時代——女裝出現了大膽的袒胸裝（「慢束羅裙半露胸」），胡服（來自西域和北方民族的服飾）流行，女性甚至可以穿男裝。宋代服飾轉向含蓄典雅——理學的「存天理滅人欲」觀念使服飾趨於保守素淨；褙子（一種長至膝下的直領對襟外套）是宋代最具代表性的女裝。明代恢復了漢族傳統，服飾制度最為完備——補服制度的設立（文官繡禽、武官繡獸，以補子上的圖案區分官階品級，如文官一品繡仙鶴、武官一品繡麒麟）。清代推行「剃髮易服」政策（「留頭不留髮，留髮不留頭」），男子的傳統漢服基本消失。滿族的長袍馬褂成為官定服飾。旗袍源自滿族女性的長袍，在民國時期經過改良（收腰、開衩、立領）後成為最具代表性的中國女性服飾。"},{"id":"fh-western","title":"西方服飾演變","content":"古希臘的Chiton（一塊布料經由別針和腰帶固定而形成的簡約服裝）和古羅馬的Toga（長達5.5米的半圓形羊毛織物，以複雜的折疊方式纏繞於身體）是西方服飾的起點——這些服裝以垂墜感和身體的自然形態為美。中世紀服飾受宗教影響，保守而層次分明。文藝復興時期（15–16世紀）服飾開始展現人體美——男裝以寬肩（以填充物加寬肩部）和緊身褲強調V形體型；女裝以緊身胸衣和寬大的裙撐強調細腰和豐臀。17–18世紀的巴洛克和洛可可時期服飾極盡奢華——法國宮廷（特別是路易十四的凡爾賽宮）成為歐洲時尚的中心。假髮（路易十四因禿頭而開始戴假髮，貴族紛紛效仿，假髮越高地位越高）和鯨骨裙撐（Pannier，使裙子兩側擴張到可達1.5米的寬度）是這一時期的標誌。19世紀維多利亞時代（1837–1901），工業革命和大英帝國的全球擴張使維多利亞女王成為世界上最有權力、最有影響力的時尚指標。女性服飾趨於保守——層層疊疊的襯裙（Crinoline）、緊身的束腰（將腰圍勒至約45–50厘米，造成了無數的健康問題）。20世紀是女性服飾革命性解放的世紀：保羅·波烈（1879–1944）率先廢除了束腰。可可·香奈兒（1883–1971）則將男裝元素引入女裝設計——她以針織面料（Jersey，原來只用於男性內衣）製作舒適簡約的女性服裝，解放了女性的身體。1926年她推出了小黑裙（Little Black Dress）——黑色在此之前主要是喪服的顏色，香奈兒將其轉化為永恆優雅的象徵。1947年，克里斯汀·迪奧推出了「新風貌」（New Look）——圓潤的肩線、極度纖細的腰身和蓬大的長裙（有些裙子的面料用量超過20米），在戰後的物資短缺年代引發了爭議（有些女性在街上撕扯穿著Dior的女人，認為這種奢華是對物資匱乏時期的不尊重），但也重新喚起了女性對優雅和女性美的渴望。1960年代，瑪麗·匡特（Mary Quant）創造了迷你裙——長度在膝蓋以上約10厘米的裙子成為女性解放和青年文化的強烈宣言。伊夫·聖羅蘭（Yves Saint Laurent）在1966年推出了「吸煙裝」（Le Smoking）——女性穿西裝（此前被認為是男性的專屬）從此成為強勢、獨立和性感的象徵。"}]},{"id":"fh-brands","title":"時尚品牌體系","content":"現代時尚產業以巴黎為中心，米蘭、倫敦、紐約為重要節點，形成了高級訂製（Haute Couture）、高級成衣（Prêt-à-Porter）和大眾市場三個層級的金字塔結構。","subsections":[{"id":"fh-haute-couture","title":"高級訂製（Haute Couture）","content":"「高級訂製」（Haute Couture）是一個受法國法律保護的專有名詞——只有獲得法國工業部認證並符合嚴格標準的品牌才能使用。這些標準包括：在巴黎擁有工作室（Atelier），至少僱用15名全職工匠，每季在巴黎展示至少25套原創設計，所有服裝均為手工製作並為客戶量身訂製。高級訂製是時尚工藝的巔峰——一件高級訂製禮服可能需要數百甚至數千小時的手工製作（包括刺繡、珠繡、羽毛處理、打褶等精細工藝，由Lesage刺繡工坊、Lemarié羽飾工坊等專業手工坊完成）。目前僅約有十餘個品牌持有一級高級訂製會員資格，包括Chanel、Dior、Givenchy、Jean Paul Gaultier、Maison Margiela等。高級訂製雖然只服務於全球約2000名客戶（其中相當部分來自中東和海灣地區），但它在時尚體系中扮演著創意燈塔的角色——最高級別的工藝和創意在訂製秀上展示，然後逐級影響高級成衣和大眾市場的設計方向。"}]}]},{"id":"sports","title":"體育文化","category":"culture","description":"全球主要體育運動的歷史、規則演進與文化意義","icon":"⚽","sections":[{"id":"sports-football","title":"足球（Soccer/Football）","content":"現代足球規則於1863年在英國倫敦的共濟會酒館（Freemasons' Tavern）由英格蘭足球總會（The FA）正式確立，將足球與當時流行的欖球（Rugby，允許用手持球）明確區分開來——「足球」和「欖球」從此成為兩個不同的運動項目。國際足球協會（FIFA）於1904年在巴黎成立，最初只有7個會員國（法國、比利時、丹麥、荷蘭、西班牙、瑞典和瑞士），現已發展到211個會員協會，是世界上成員最多的國際體育組織。國際足聯世界盃自1930年（首屆在烏拉圭舉行，東道主奪冠）以來每四年舉辦一屆，是全球收視率最高、商業價值最大的單一體育賽事——2022年卡塔爾世界盃決賽全球觀眾人數約15億。巴西以5次奪冠位居榜首（1958、1962、1970、1994、2002）；「球王」比利（1940–2022）是唯一三次獲得世界盃冠軍（1958、1962、1970）的球員——1958年世界盃時他才17歲，在決賽中攻入了兩球。歐洲五大聯賽（英格蘭超級聯賽、西班牙甲級聯賽、德國甲級聯賽、義大利甲級聯賽、法國甲級聯賽）涵蓋了世界上最好的俱樂部和球星。歐洲冠軍聯賽（UEFA Champions League）是俱樂部層面的最高榮譽——皇家馬德里以15次奪冠位居榜首。美斯（Lionel Messi）和C朗（Cristiano Ronaldo）的雙雄競爭（2008–2022年左右）定義了一個時代——兩人共獲得13次金球獎（Ballon d'Or，美斯8次、C朗5次）。2022年美斯在世界盃決賽中帶領阿根廷擊敗法國奪冠（3–3平局後以12碼4–2獲勝），完成了其職業生涯最重要的一座獎盃的加冕。"},{"id":"sports-olympics","title":"奧林匹克運動會","content":"古希臘奧林匹克競技會始於公元前776年（這一年被認為是古希臘有可靠紀年的開始），每四年在伯羅奔尼撒半島的奧林匹亞聖地舉行，專門獻給眾神之王宙斯。競技會期間全希臘實行「神聖休戰」（Ekecheiria）——各城邦暫停一切戰爭，運動員和觀眾可以安全地往返奧林匹亞。古代奧運會的競賽項目包括賽跑、摔跤、拳擊、戰車賽和五項全能等。獲勝者的獎品是一個用橄欖枝編成的花環（來自宙斯神廟旁的神聖橄欖樹），但回到自己的城邦後他們會得到極大的榮譽和實際的獎勵（如終身免稅）。公元393年，羅馬皇帝狄奧多西一世（以基督教為國教的皇帝）以奧運會是異教節日為由下令禁止，延續了一千多年的古代奧運會從此終結。現代奧運會由法國教育家顧拜旦男爵（Pierre de Coubertin，1863–1937）發起復興——他認為體育教育是培養全面發展的公民的重要途徑，並將古希臘的奧林匹克精神與現代體育相結合。1896年，第一屆現代奧運會在雅典舉行（以向古希臘致敬），共有14個國家的241名運動員參賽。奧運五環（藍、黃、黑、綠、紅）象徵五大洲的團結——這五種顏色加上白色的旗底包括了全世界所有國家國旗的顏色。奧運格言「更快、更高、更強」（Citius, Altius, Fortius）由顧拜旦的朋友、神父迪東提出，2021年國際奧委會加入了「更團結」（Communiter）一詞。冬季奧運會（冬奧）自1924年開始舉辦（首屆在法國夏蒙尼），專門針對冰雪運動項目（滑雪、滑冰、冰球等）。帕拉林匹克運動會（殘奧會，Paralympic Games）自1960年起為身障運動員舉辦，與奧運會使用相同的場館。奧運會不僅是全球最高水平的綜合性體育賽事，更是國際文化交流、城市營銷和軟實力展示的超級平台。"}]}]},{"id":"philosophy","title":"哲學與社會科學","icon":"🧠","color":"#6D28D9","description":"探索人類思想的深層結構——哲學、政治、心理學、社會學、法律與宗教","topics":[{"id":"philosophy-main","title":"哲學","category":"philosophy","description":"東西方哲學思想的核心體系、發展脈絡與當代意義","icon":"💭","sections":[{"id":"phil-what","title":"什麼是哲學？","content":"哲學（Philosophy）一詞源自希臘語 φιλοσοφία（philosophia），由 φιλεῖν（philein，愛）和 σοφία（sophia，智慧）組成，意為「愛智慧」。哲學不同於經驗科學——它不通過實驗和觀察來獲取關於世界的知識，而是通過理性思辨、邏輯分析和概念澄清來追問那些最根本的問題：什麼是真實的？（形而上學/本體論）、我們如何知道？（認識論）、我們應該如何生活？（倫理學）、什麼是美？（美學）、什麼是正義？（政治哲學）、推理和論證的規則是什麼？（邏輯學）。哲學也許不能給出確定的答案（這正是它與科學的區別），但它在不停地提出更深刻的問題，挑戰和檢驗我們自以為理所當然的假設。蘇格拉底說「未經審視的人生不值得活」——這就是哲學的精神。"},{"id":"phil-western","title":"西方哲學","content":"西方哲學始於古希臘，歷經兩千多年的發展，形成了探索存在、知識、價值、理性和語言的系統化思考傳統。","subsections":[{"id":"phil-greek","title":"古希臘哲學","content":"所有西方哲學都是柏拉圖對話錄的註腳——懷海德（Alfred North Whitehead）的這句名言（雖然有些誇張）指出了古希臘哲學對整個西方思想傳統的決定性影響。","subsections":[{"id":"phil-socrates","title":"蘇格拉底（前470–前399）","content":"蘇格拉底是西方哲學的轉折點——西塞羅說他「把哲學從天上帶回人間」。他之前的哲學家（前蘇格拉底哲學家，包括泰勒斯（認為萬物源於水）、赫拉克利特（萬物流變、無物常駐——「人不能兩次踏入同一條河流」）、巴門尼德（區分了真實的存在和虛幻的變化）、德謨克利特（原子論——萬物由不可分割的原子和虛空構成）等）主要關注宇宙的本原和構成問題。蘇格拉底轉而追問倫理問題——什麼是正義？什麼是勇氣？什麼是美德？他以反詰法（Elenchus——又稱蘇格拉底法）不斷追問對話者，使其認識到自己原有觀念中的矛盾和無知。他著名地宣稱「我只知道自己一無所知」（這是人類智慧的最高形態——知道自己不知道）。蘇格拉底自己沒有留下任何著作——我們對他的認識主要來自其追隨者色諾芬的回憶錄和其學生柏拉圖的對話錄。前399年他被雅典法庭以「不敬城邦之神和敗壞青年」的罪名判處死刑。他的朋友安排他越獄逃往他鄉，但蘇格拉底拒絕了——他認為遵守法律（即使是不公正的判決）比逃避懲罰更重要，最終從容飲下毒芹汁赴死。他的犧牲成為西方文化中為真理和原則而殉道的最早和最崇高的象徵之一。"},{"id":"phil-plato","title":"柏拉圖（前427–前347）","content":"柏拉圖深受蘇格拉底之死的震撼，放棄了從政的計劃，轉而投身哲學以探索正義和理想社會的可能。他於約前387年在雅典郊外創立了學園（Academy）——被認為是西方第一所高等教育機構，存在了約900年（直到529年被基督教皇帝查士丁尼一世關閉）。柏拉圖的兩個核心學說：1）理型論（Theory of Forms/Ideas）：我們通過感官感知的物質世界只是流變的、不完美的「影子」，真正的實在存在於永恆的、不變的、完美的「理型」或「形式」（Form/Idea）世界中。比如世間所有具體的馬都是對完美的「馬之理型」的不完美摹本；所有正義的行為都分享了「正義之理型」。在《理想國》（Republic）第七卷的洞穴寓言中，柏拉圖以一個極具想像力的比喻闡述了這一思想——人類就像自小被囚禁在洞穴中的囚徒，被鎖鏈束縛只能看到前方牆上由身後火光投射的影子，他們認為這些影子就是真實世界。哲學家就像是掙脫了鎖鏈、走出了洞穴的人——最初被陽光刺激得什麼也看不清，但逐漸適應後看到了真正的世界（太陽象徵著「善之理型」，一切知識和真理的源泉）。2）哲學家國王（Philosopher King）——在《理想國》中柏拉圖提出只有當哲學家成為國王（或國王變成哲學家）時，正義的社會才有可能實現。柏拉圖的著作幾乎全部以對話體寫成（蘇格拉底通常是主要發言者），這不是偶然的——他認為真理最好通過對話和辯證（而非獨白）來接近。"}]},{"id":"phil-modern","title":"近代哲學：理性主義與經驗主義之爭","content":"近代哲學（17–18世紀）的核心問題是認識論——人類知識的來源和限度是什麼？","subsections":[{"id":"phil-descartes","title":"笛卡兒與理性主義","content":"笛卡兒（René Descartes，1596–1650）被稱為「近代哲學之父」，原因是他在《第一哲學沉思集》（1641年）中進行了一個激進的思想實驗——普遍懷疑（Method of Doubt）：他設想有一個極其強大和狡猾的惡魔，可以使他對外部世界、自己的身體、甚至數學（2+3=5）都產生錯誤的信念。那麼還有什麼是確定的、不可懷疑的？在極端的懷疑中他發現：即使他在懷疑一切，「他在懷疑」這件事本身是無法被懷疑的。而懷疑是一種思維活動，因此「我思故我在」（Cogito, ergo sum / 法語 Je pense, donc je suis）成為了他哲學體系的不可動搖的基石。由此出發他推導出了上帝的存在和外部世界（包括他人心靈和物理物體）的真實性。但他同時建立了心物二元論——心靈（思維實體，Res Cogitans）和物質（廣延實體，Res Extensa）是兩種完全不同的實體，之間的互動（如意志如何使身體運動）成為了哲學上懸而未決的難題。斯賓諾莎（Baruch Spinoza，1632–1677）以幾何學的方式（定義、公理、命題、證明）撰寫了《倫理學》——從對實體（Substance）的定義出發，他嚴格推導出「神即自然」（Deus sive Natura）的一元論結論：只存在一個實體（上帝/自然），心靈和物質只是這唯一實體的兩種屬性（不是兩種不同的實體），萬事萬物（包括人類的思考和行動）都按照嚴格的因果必然性發生——因此自由意志只是一種幻覺。萊布尼茲（Gottfried Wilhelm Leibniz，1646–1716）以單子論（Monadology）聞名——宇宙由無限多個沒有窗戶的、不可分割精神實體「單子」（Monad）組成，每個單子都反映了整個宇宙。他著名的樂觀主義命題——「我們生活在所有可能世界中最好的一個」（被伏爾泰在小說《憨第德》（Candide）中狠狠地諷刺了一番（以里斯本大地震為背景）。"},{"id":"phil-kant","title":"康德與德國觀念論","content":"康德（Immanuel Kant，1724–1804）堪稱近代哲學的分水嶺。他以「批判哲學」試圖調和理性主義和經驗主義的矛盾。他在《純粹理性批判》（1781年，被普遍認為是現代哲學最重要的一部著作——即使對於專業讀者來說，將其從頭讀到尾也是巨大的挑戰）中提出了著名的「哥白尼式革命」命題：我們的認知不是被動地反映外部世界的結構（如鏡子反射），而是人類心靈的先天認知結構（時間和空間是「感性直觀的純形式」、因果關係等十二個範疇是「知性的純概念」）主動地組織和構造了我們感知的經驗世界。因此我們能夠認識的永遠只是現象（Phenomena——已被主觀認知結構組織過的經驗世界），而物自身（Noumena/Ding an sich——事物獨立於人類認知的真實存在）是永遠不可認識的。這是一個令人沮喪又令人釋然的結論：人類理性的能力有邊界——形而上學的論斷（如上帝存在與否、靈魂是否不滅、宇宙是否有開端）超出了人類認知能力，不可能獲得確定性的知識。在道德哲學領域康德提出了自律倫理學——道德法則的權威不是來自外部（如上帝或社會習俗），而是來自理性個體的自律（自我立法）。「定言命令」（Categorical Imperative）的第一表述：「只按照你同時可以意願讓這條準則成為普遍法則的準則去行動」——如果說謊總是錯的，那是因為如果你的行動準則「當符合我的利益時我可以說謊」變成普遍法則，那麼「說謊」這個概念本身就失去了意義（因為沒有人會相信謊言了）。第三表述：「要把人（包括你自己和他人）在任何時候同時當作目的，而不僅僅是手段」——這是對人的尊嚴的強烈肯定。黑格爾（G.W.F. Hegel，1770–1831）的辯證法（正題→反題→合題，合題成為新的正題，推動歷史不斷向前發展）影響了包括馬克思在內的整個後續哲學。他將整個歷史（包括藝術史、宗教史和哲學史）解釋為「絕對精神」逐步實現自我意識的宏大過程。他的《精神現象學》（1807年）的主奴辯證法（主人—奴隸關係的內在矛盾和最終的倒轉）對馬克思的階級分析、女性主義理論和後殖民理論都產生了深遠影響。"}]}]}]},{"id":"psychology","title":"心理學","category":"philosophy","description":"人類行為和心理過程的科學研究——從潛意識到認知神經科學","icon":"🧩","sections":[{"id":"psy-schools","title":"心理學主要流派","content":"心理學作為一門科學，自1879年馮特（Wilhelm Wundt）在德國萊比錫大學建立了世界上第一個心理學實驗室（將心理學從哲學中分離出來成為獨立的實驗科學）以來，形成了多個重要的理論流派。","subsections":[{"id":"psy-freud","title":"精神分析學派","content":"佛洛伊德（Sigmund Freud，1856–1939）是心理學史上最具爭議性也最具影響力的人物之一。他的核心貢獻是發現（或創造）了「潛意識」（Unconscious）這一概念——人的行為並不是由理性意識完全控制的，潛意識中壓抑的慾望、衝突和童年創傷在很大程度上（甚至根本性地）決定了人的思想、情感和行為。佛洛伊德將人格結構分為三個層次：本我（Id）——本能驅力的儲存庫，遵循「快樂原則」（Pleasure Principle），追求即時的滿足（如嬰兒的無節制需求）；自我（Ego）——人格的執行者，遵循「現實原則」（Reality Principle），在本我的衝動和外部世界的限制之間尋求妥協；超我（Superego）——內化了的父母和社會的道德規範和理想標準（良心和理想自我），以罪惡感和羞恥感來約束行為。精神分析的核心治療技術包括：自由聯想（Free Association，患者躺在沙發上說出腦海中浮現的任何想法，不加審查和編輯——這是通往潛意識的「皇家大道」）、夢的解析（Dream Interpretation，《夢的解析》，1899/1900年——佛洛伊德認為夢是潛意識願望的偽裝滿足，「夢是通往潛意識的皇家大道」）。佛洛伊德的許多具體理論（如俄狄浦斯情結——男孩對母親的性慾和對父親的嫉妒和恐懼、陰莖羨慕——女孩因沒有陰莖而產生的自卑感等）今天已不被主流心理學所接受（被批評為缺乏科學證據、過度泛化和性別主義），但他關於潛意識心理過程、童年經驗對成年人格的深遠影響、以及談話治療（Talking Cure，簡單的傾訴可以緩解心理痛苦）等開創性洞見至今仍在影響著心理學和精神醫學。"},{"id":"psy-behaviorism","title":"行為主義與認知革命","content":"行為主義（1910s–1950s）是對精神分析主觀方法論的反叛——華生（John B. Watson，1878–1958）斷言心理學應該只研究可觀察和可測量的行為，而將一切關於「意識」、「心靈」和「潛意識」的主觀內省排除在科學心理學之外。他1913年的「行為主義宣言」（《行為主義者眼中的心理學》）徹底改變了美國心理學的方向。史金納（B.F. Skinner，1904–1990）通過對鴿子和老鼠的系統實驗提出了「操作性條件作用」（Operant Conditioning）理論——行為由其結果（後果）來塑造和維持：正強化（獎勵增加行為頻率，如老鼠按下槓桿後獲得食物）、負強化（移除厭惡刺激增加行為頻率，如老鼠按下槓桿後電擊停止）、正懲罰（施加厭惡刺激減少行為頻率，如不良行為後受到訓斥）和負懲罰（移除愉快刺激減少行為頻率，如超速後被吊銷駕照）。然而1950年代末的「認知革命」揭示了行為主義的局限——人類並非只是被動地對刺激做出反應的有機體，而是擁有複雜的內在心理表徵和信息處理能力的認知主體。喬姆斯基（Noam Chomsky，1928–）對史金納《言語行為》（1957年）的毀滅性批評（1959年評論）是認知革命的里程碑之一——他論證了兒童的語言習得不能僅以行為主義的刺激—反應聯結來解釋（兒童能創造性地產出他們從未聽過的新句子，這表明他們掌握了語言的內在語法規則而不僅僅是模仿）。現代認知心理學將人腦視為複雜的信息處理系統，研究注意、知覺、記憶（感覺記憶→短期/工作記憶→長期記憶的三階段模型）、語言和決策等心理過程，並與神經科學、人工智慧和語言學等領域深度融合。"}]}]},{"id":"politics","title":"政治學","category":"philosophy","description":"政治體制、意識形態與國際關係的核心理論","icon":"🏛️","sections":[{"id":"pol-ideologies","title":"主要政治意識形態","content":"政治意識形態是關於人類社會應當如何組織的系統化信念體系。它們不僅是關於事實的描述，更是關於價值的規範性主張。","subsections":[{"id":"pol-democracy","title":"民主理論","content":"現代民主制度並非單一模式。直接民主（公民對每一項法律和政策進行直接投票）在古代雅典曾短暫實行（伯里克利時代，前461–前429），但僅適用於小規模的城邦——雅典的公民大會理論上可以由約3萬名成年男性公民參加，實際出席者約為6000人。現代國家（數百萬至十幾億人口）無法實行直接民主，因而普遍採用代議民主——公民定期選舉代表來制定法律和管理國家。多數決民主（Majoritarian Democracy）的經典代表是英國的「西敏制」（Westminster System）——選舉採用單一選區相對多數制（First-Past-the-Post），獲勝政黨通常能獲得議會多數席位並單獨組成政府，決策效率高但少數人的意見容易被忽視。共識民主（Consensus Democracy）則通過比例代表制（Proportional Representation）和權力分享機制（如聯合政府）來確保各群體（即使是少數）的意見都得到代表——瑞士、比利時和荷蘭是典型例子，但這類體制可能導致決策低效和政府不穩定（如義大利二戰後平均每屆政府壽命僅約一年）。熊彼得（Joseph Schumpeter，1883–1950）在其經典著作《資本主義、社會主義與民主》（1942年）中提出了一個影響深遠的對民主的「極簡定義」——民主不是人民統治（因為「人民」不是一個單一的行為主體），而是一種制度安排，在這種制度中，個人通過競爭性的選舉獲得做出政治決策的權力。這一「精英競爭」民主理論深刻地影響了戰後政治學對民主的理解。達爾（Robert Dahl，1915–2014）提出了民主的八項制度保障（或「多頭政體」Polyarchy的標準）：選舉產生的官員、自由公平的選舉、普選權、競選公職的權利、言論自由、獲取多元信息的自由、結社自由和包容性的公民身分。"}]}]},{"id":"religion","title":"宗教","category":"philosophy","description":"世界主要宗教的教義、歷史、經典與文化影響","icon":"🕊️","sections":[{"id":"rel-world","title":"世界主要宗教","content":"宗教是人類文化最深層的根基之一。儘管現代化和世俗化的浪潮席捲全球，仍有約84%的世界人口認同於某一宗教。","subsections":[{"id":"rel-christianity","title":"基督教","content":"基督教是世界上信徒最多的宗教（約24億，約佔全球人口的31%）。基督教信仰的核心宣告是：拿撒勒人耶穌是上帝之子（Christ/Messiah——彌賽亞，受膏者/救世主），他的受難、死亡和復活為人類帶來了罪惡的赦免和永生的可能。聖經是基督教最重要的經典，分為舊約（與猶太教的希伯來聖經基本對應，記錄了創世、以色列民族的歷史、律法和先知書）和新約（記錄了耶穌的生平（馬太、馬可、路加、約翰四福音書）、使徒行傳（早期基督教會的發展）、書信（保羅和其他使徒寫給各地教會的信件）和啟示錄（關於末世的預言（啟示文學）），共27卷）。三位一體論（Trinity——聖父、聖子、聖靈三個位格同等同尊、同為永恆、同為上帝）是基督教神學的核心也是最難以用理性理解（甚至被認為是「奧秘」Mystery）的教義之一。基督教內部在1054年發生了東西教會大分裂——以羅馬為中心的天主教會（西方）和以君士坦丁堡為中心的東正教會（東方）正式決裂，分歧點包括：教宗的至高權威（西方堅持，東方否認）、聖靈的來源（Filioque——「和子」爭議，西方在尼西亞信經中加入了聖靈「從父和子」發出，東方僅接受「從父」發出）、在聖餐中使用無酵餅還是有酵餅等禮儀問題。16世紀馬丁·路德（Martin Luther，1483–1546）發起了宗教改革——1517年10月31日他將《九十五條論綱》釘在維滕貝格城堡教堂的大門上（學術辯論的傳統做法），抗議羅馬天主教會兜售「贖罪券」（Indulgences——以金錢換取靈魂在煉獄中懲罰的減免）的行為。宗教改革的核心原則包括「唯獨聖經」（Sola Scriptura——聖經而非教會傳統是信仰的最高權威）、「唯獨信心」（Sola Fide——人是因信稱義而非靠善功得救）和「信徒皆祭司」（Priesthood of All Believers——所有信徒都可以直接親近上帝，不需要通過神職人員的中介）。"},{"id":"rel-islam","title":"伊斯蘭教","content":"伊斯蘭教是世界第二大宗教（約19億穆斯林）。「伊斯蘭」（Islam）一詞意為「順從」（順從真主的意志），穆斯林（Muslim）即「順從者」。穆斯林信仰唯一的真主（Allah——阿拉伯語中的「神/上帝」，與基督教和猶太教崇拜的是同一位獨一神）和先知穆罕默德（Muhammad，570–632）為「封印先知」（最後的先知，真主通過他完成了對人類的完整啟示）。古蘭經（Qur'an/Quran——意為「誦讀」）是伊斯蘭教最神聖的經典，據信是真主通過天使吉卜利勒（加百利）在約23年期間逐節向穆罕默德啟示的阿拉伯語經文。古蘭經共114章（蘇拉 Surah）、約6236節（阿亞 Ayah），按照長度遞減（而非時間順序）排列。伊斯蘭教的核心信仰和實踐被概括為「六信條」（Iman）和「五功」（Pillars of Islam）。六信條：信真主（Tawhid——認主獨一，這是伊斯蘭最核心的教義：除真主外別無神明）、信天使（包括吉卜利勒、米卡伊勒、伊斯拉菲勒等）、信經典（包括古蘭經以及之前降示的討拉特（摩西五經）、宰卜爾（大衛詩篇）和引支勒（福音書），但穆斯林認為這些經典後來被人類篡改，只有古蘭經保持了真主啟示的原貌）、信使者（從阿丹（亞當）、努哈（諾亞）、易卜拉欣（亞伯拉罕）、穆薩（摩西）、達伍德（大衛）、爾撒（耶穌）到穆罕默德——共25位先知在古蘭經中被提名）、信末日（復活日/審判日——所有亡者將復活接受真主的審判，善者入天園，惡者入火獄）、信前定（Qadr——真主預先規定了萬事萬物的命運，但人類仍然有自由意志並要為自己的選擇負責（這是伊斯蘭神學中的一個核心張力））。五功：念（Shahada——作證言：「我作證除真主外別無神明，穆罕默德是真主的使者」——這是成為穆斯林的基本門檻，一個人在兩個成年穆斯林見證下以真誠的信念用阿拉伯語誦讀此言即成為穆斯林）、禮（Salat——每日五次的固定禮拜：晨禮（Fajr，黎明前）、晌禮（Dhuhr，正午後）、晡禮（Asr，下午）、昏禮（Maghrib，日落後）、宵禮（Isha，夜晚），禮拜時必須朝向麥加的克爾白（天房Kaaba）方向——全世界所有穆斯林在禮拜時形成了圍繞麥加天房的同心圓陣列）、齋（Sawm——伊斯蘭曆第九月（萊麥丹月/齋月Ramadan，因伊斯蘭曆是純陰曆（每年約354天），齋月在公曆中每年提前約10–11天，因此每約33年就會循環到公曆中所有季節）期間從日出到日落禁止飲食、飲水、吸煙和性行為，但病人、旅行者、孕婦、哺乳期婦女和經期女性可以暫緩，日後補齋或繳納罰贖）、課（Zakat——天課，每個擁有超過一定最低標準（Nisab）財富的穆斯林每年必須將其財富的2.5%捐獻給貧困者等八類指定人群——這不是「慈善」而是宗教義務，是伊斯蘭經濟體系中的財富再分配機制）、朝（Hajj——朝覲，每個有經濟和身體能力的穆斯林一生中至少應去麥加朝覲一次，時間在伊斯蘭曆十二月（Dhul-Hijjah）的特定日期）。朝覲期間約200–300萬來自世界各地的穆斯林不分膚色、國籍和社會地位，全部穿著兩片簡單的白色布料（男性——Ihram朝覲受戒服），集體繞行克爾白天房七圈，在薩法和麥爾瓦兩山之間奔走七次（紀念易卜拉欣的妻子哈哲爾為兒子伊斯瑪儀尋找水源的故事），在阿拉法特平原站立祈禱（這是朝覲最重要的儀式——「朝覲就是阿拉法特」），這一刻全球的穆斯林（約19億人）在精神和心靈上最緊密地團結在一起。"}]}]}]},{"id":"science","title":"科學","icon":"🔬","color":"#5B21B6","description":"自然科學各領域的核心知識體系——生物、化學、物理、地理、數學、航天、計算機科學","topics":[{"id":"biology","title":"生物學","category":"science","description":"研究生命現象和生命活動規律的科學——從分子層面到生態系統","icon":"🧬","sections":[{"id":"bio-cell","title":"細胞生物學","content":"細胞是生命的基本結構和功能單位。細胞學說（1839年由德國植物學家施萊登和動物學家施旺提出）是生物學的基石理論：所有生物由一個或多個細胞構成；細胞是生命最基本的結構和功能單位；所有細胞都來自先前存在的細胞（魯道夫·菲爾紹，1855年）。","subsections":[{"id":"bio-cell-structure","title":"真核細胞的精細結構","content":"真核細胞擁有由膜包圍的細胞核和多種膜性細胞器，使不同的生化反應可以在分隔的微環境中高效進行。細胞核——遺傳信息的控制中心：由雙層核膜包圍（核膜上有核孔複合體，控制分子進出），內部含有染色質（DNA與組織蛋白的複合物，在細胞分裂時濃縮為可見的染色體）和核仁（核糖體RNA的合成和核糖體亞基的組裝場所）。粒線體——細胞的能量工廠：通過有氧呼吸將葡萄糖等有機物中的化學能轉化為ATP（三磷酸腺苷，細胞的通用能量貨幣）。粒線體擁有自己的DNA（環狀，類似細菌的DNA）和核糖體，這強烈支持了內共生理論——粒線體起源於約15億年前被原始真核細胞吞噬但未被消化的需氧細菌。內質網（ER）：粗糙內質網表面附有核糖體，是蛋白質合成和折疊的場所；平滑內質網則參與脂質合成、肝細胞中的解毒作用和肌肉細胞中的鈣離子儲存。高基氏體——細胞的郵局：接收來自內質網的蛋白質，對其進行修飾（如添加糖基、硫酸基等）、分類、打包，然後發送到細胞內外的目的地。溶酶體——細胞的消化系統：內含約60種酸性水解酶，能分解蛋白質、核酸、脂質和多醣，回收老化或受損的細胞器（自噬作用）。葉綠體（植物和藻類特有）——光合作用的場所：通過光合作用將光能、水和二氧化碳轉化為葡萄糖和氧氣，是地球生態系統中幾乎所有生命能量的最終來源。"},{"id":"bio-dna","title":"DNA與遺傳學","content":"DNA（脫氧核糖核酸）是遺傳信息的化學載體。1953年華生（James Watson，美國，1928–）和克里克（Francis Crick，英國，1916–2004）在《自然》期刊上發表了DNA雙螺旋結構模型（僅一頁紙的短文），這被認為是20世紀生物學最重要的發現。雙螺旋結構由兩條反向平行的多核苷酸鏈通過互補鹼基配對（腺嘌呤A—胸腺嘧啶T之間兩個氫鍵，鳥嘌呤G—胞嘧啶C之間三個氫鍵，因此G≡C配對比A=T配對更穩定）螺旋纏繞形成，其美在於結構本身直接暗示了複製機制——每一條鏈都可以作為合成新鏈的模板。1958年克里克提出了分子生物學的「中心法則」（Central Dogma）：遺傳信息從DNA流向RNA（轉錄），再從RNA流向蛋白質（轉譯），信息不會從蛋白質逆流回核酸。2012年CRISPR-Cas9基因編輯技術的出現是分子生物學的革命性突破——張鋒（美籍華裔科學家，MIT/Broad Institute）和兩位女性科學家夏彭蒂耶（Emmanuelle Charpentier）和多德納（Jennifer Doudna，後兩人2020年獲諾貝爾化學獎）將細菌的免疫防禦系統改造為通用的基因編輯工具，使人類能夠以前所未有的精確度修改幾乎任何生物的基因組。這項技術在遺傳疾病治療（如鐮刀型紅血球疾病）、農業改良和基礎科學研究中具有巨大潛力，但也引發了深刻的倫理爭議——特別是關於人類胚胎基因編輯（2018年賀建奎事件震驚了全球科學界）。"}]},{"id":"bio-evolution","title":"演化生物學","content":"演化是生物學的統一理論——正如杜布贊斯基（Theodosius Dobzhansky，1900–1975）所說：「如果不從演化的角度來看待，生物學中的一切都不make sense。」","subsections":[{"id":"bio-darwin","title":"達爾文的自然選擇理論","content":"查爾斯·達爾文（1809–1882）於1831–1836年乘坐皇家海軍貝格爾號（HMS Beagle）進行了為期五年的環球科學考察。他在加拉巴哥群島（Galápagos Islands，位於厄瓜多以西約1000公里的太平洋中）觀察到每個島嶼上的雀鳥（後來被稱為「達爾文雀」）的喙形狀因食物來源的不同而有明顯變異——以種子為食的雀鳥擁有粗壯的喙，以昆蟲為食的則擁有細長尖銳的喙，以仙人掌為食的則喙較長且彎曲。這一觀察啟發了他對物種起源的思考。然而達爾文極其謹慎，積累了二十多年的證據卻遲遲不發表。1858年，年輕的博物學家華萊士（Alfred Russel Wallace，1823–1913）從馬來群島給達爾文寄來了一篇闡述了幾乎完全相同理論的論文。在朋友們的安排下，達爾文和華萊士的論文於1858年7月1日在倫敦林奈學會同時宣讀（兩人都未親自出席——達爾文因兒子去世而悲痛，華萊士仍在馬來群島）。1859年達爾文出版了《論物種之起源》（On the Origin of Species），第一版1250冊當天銷售一空。自然選擇理論的核心邏輯鏈條：1）個體之間存在可遺傳的變異；2）生物繁殖的後代數量遠超環境資源能支撐的數量（馬爾薩斯人口論的啟發）；3）因此存在生存競爭；4）擁有更適合當前環境特徵的個體更容易存活和繁殖（差異性繁殖成功）；5）有利特徵在種群中的頻率在漫長的世代中逐漸增加（演化）。此演化過程不需要任何「設計者」或「目的」——它是一個盲目的、無意識的算法過程，但卻能在漫長的時間尺度上創造出令人驚嘆的複雜性和適應性（如眼睛、翅膀、回聲定位等）。"},{"id":"bio-modern-synthesis","title":"現代演化綜合理論","content":"達爾文的時代還不知道遺傳的機制（孟德爾的豌豆實驗（1866年）在達爾文生前幾乎完全被忽視，直到1900年才被重新發現）。20世紀30–40年代，羅納德·費雪（R.A. Fisher，1890–1962，統計學家和遺傳學家）、霍爾丹（J.B.S. Haldane，1892–1964）和休厄爾·賴特（Sewall Wright，1889–1988）等人將達爾文的自然選擇學說與孟德爾的顆粒遺傳理論（基因是離散的遺傳單位而非混合液體）結合在一起，建立了「族群遺傳學」（Population Genetics）——用數學方式描述基因頻率在種群中如何因突變、選擇、遺傳漂變和基因流而變化。現代演化綜合理論的核心命題：演化的原材料是突變（DNA複製過程中的隨機錯誤）和基因重組（有性生殖中父母的等位基因重新組合）；自然選擇是主要的（但非唯一的）演化驅動力；演化是一個漸進的過程（微小的變化在長時間中積累為大的改變）；大演化（物種以上的分類階層的形成和滅絕）與小演化（種群內的變化）在機制上是一致的。後續的理論發展——木村資生（Motoo Kimura，1924–1994）的「中性理論」（1968年）論證了分子層面上大多數遺傳變異是選擇中性的（隨機漂變而非自然選擇是主要的演化力量）；古爾德（Stephen Jay Gould，1941–2002）和埃爾德里奇（Niles Eldredge）的「間斷平衡」理論（1972年）則認為演化並非始終緩慢均勻——物種長期保持形態穩定（平衡），然後在短時間內發生快速的形態變化（間斷），這更好地解釋了化石記錄中為什麼常常缺少過渡型。"}]},{"id":"bio-ecology","title":"生態學與環境科學","content":"生態學研究生物與其環境之間的相互關係——從個體層面（生理生態學）到種群、群落、生態系統乃至整個生物圈。食物鏈和食物網描述了生態系統中的能量流動和物質循環。在一個典型的陸地生態系統中：初級生產者（綠色植物和藻類）通過光合作用將約1–3%的太陽能轉化為有機物中的化學能（總初級生產力GPP，除去植物自身呼吸消耗後為淨初級生產力NPP）；初級消費者（植食動物，如鹿、兔、蝗蟲）以植物為食——能量傳遞效率約為10%（即約只有10%的植物能量轉化為植食動物的生物量）；次級消費者（肉食動物，如狼、鷹）和三級消費者（頂級捕食者，如虎、北極熊）依次構成更高的營養級。由於能量在每個營養級的大量散失（主要通過呼吸作用、排泄和未被消化的食物），食物鏈通常不會超過4–5個營養級，這也解釋了為什麼大型捕食者的種群密度遠低於其獵物。分解者（細菌、真菌和腐生無脊椎動物）則將動植物屍體和排泄物中的有機物分解為無機物，使養分得以循環利用。生態系統的穩定性通過負反饋機制維持（如捕食者數量增加→獵物數量減少→捕食者食物不足→捕食者數量下降→獵物數量恢復），但人類活動（棲息地破壞、過度捕撈、污染、外來物種入侵和氣候變化）正在以前所未有的速度和規模破壞全球生態系統的平衡。生物多樣性（Biodiversity）包含三個層次——基因多樣性（種群內部的遺傳變異）、物種多樣性（一個區域中物種的數量和相對豐度）和生態系統多樣性（不同類型的生態系統和其間的相互作用）。據估計，目前人類活動導致的物種滅絕速率是自然背景滅絕速率的100–1000倍，地球可能正在經歷第六次大滅絕事件（上一次是約6600萬年前導致恐龍滅絕的白堊紀—古近紀滅絕事件）。"}]},{"id":"physics","title":"物理學","category":"science","description":"探索物質、能量、空間和時間的基本規律——從亞原子粒子到宇宙尺度","icon":"⚛️","sections":[{"id":"phys-classical","title":"經典物理學（17–19世紀）","content":"經典物理學以伽利略和牛頓為奠基者，以馬克士威為集大成者，其在宏觀低速領域的預測精確度至今令人驚嘆。","subsections":[{"id":"phys-newton","title":"牛頓力學體系","content":"牛頓於1687年出版的《自然哲學的數學原理》（Philosophiæ Naturalis Principia Mathematica，通常簡稱為《原理》或Principia）被公認為科學史上最重要的著作。亞里士多德的物理學主導了西方思想近兩千年——重的物體下落比輕的快、物體的自然狀態是靜止、天體和地上物體遵循不同的物理法則。伽利略（1564–1642）以實驗方法挑戰了這些教條——傳說他在比薩斜塔上同時扔下兩個不同重量的球，證明了自由落體速度與重量無關（這個故事可能只是傳說，但他在斜面實驗中精確測量了小球滾動的時間和距離，證明了勻加速運動定律）。牛頓在前人基礎上建立了一個統一的、以數學形式表達的力學體系——三大運動定律加萬有引力定律，能夠以同一組方程解釋從掉落的蘋果到月球繞地球運行的所有運動現象，這是人類智慧的巔峰成就。萬有引力定律斷言宇宙中任何兩個有質量的物體之間存在吸引力——F = G(m₁m₂)/r²，引力與兩物體質量的乘積成正比、與距離的平方成反比。以這個方程為基礎，人類能夠計算行星軌道、預測彗星的回歸（哈雷彗星，1705年哈雷運用牛頓理論預測它將在1758年回歸——他在1742年去世，未能親眼見證預言的驗證）、發現海王星（1846年，亞當斯和勒維耶分別通過天王星軌道的神秘擾動計算出未知行星的位置——柏林天文台的伽勒當晚就在預測位置附近找到了海王星，這被認為是牛頓力學的最輝煌勝利）。經典力學的決定論世界觀由此確立——拉普拉斯（1749–1827）設想如果有一個全能的智慧（後來被稱為「拉普拉斯惡魔」）知道宇宙中每一個粒子的當前位置和速度以及作用在它們之上的所有力，它就能精確計算出宇宙的全部過去和未來。量子力學和混沌理論的發現後來打破了這種絕對的決定論。"},{"id":"phys-thermodynamics","title":"熱力學","content":"熱力學的四個基本定律從宏觀層面描述了能量轉換的不可逆方向和限制。第零定律（如果A與C達到熱平衡、B與C也達到熱平衡，那麼A與B也處於熱平衡）確立了溫度這一基本概念的測量基礎（使我們能夠建造溫度計）。第一定律——能量守恆定律：能量不能憑空產生也不能消滅，只能從一種形式轉化為另一種形式（∆U = Q - W，系統內能的變化等於加入的熱量減去系統對外做的功）。這意味著任何宣稱不消耗任何能量就能無窮無盡地輸出功的「第一類永動機」是不可能存在的。第二定律——最為深刻和神秘的一條：在一個孤立系統中，熵（Entropy，混亂度或無序度的一種度量）永遠不會減少（∆S ≥ 0）。換句話說，自然的自發過程都具有不可逆的方向性——熱量自發地從高溫物體流向低溫物體（反之則不可能自發發生）、氣體自發地從高壓區擴散到低壓區、墨水在水中的擴散是不可逆的。從更深的層面來看，第二定律定義了時間的箭頭——宏觀世界的不可逆性給出了時間的方向。第三定律（能斯特熱定理，1906–1912年）：當溫度趨近於絕對零度（0 K = -273.15°C）時，完美晶體的熵趨近於零——這意味著永遠無法通過有限步驟達到絕對零度（只能無限接近）。"}]},{"id":"phys-modern","title":"現代物理學（20世紀以來）","content":"19世紀末的物理學家曾認為物理學的大廈已經基本建成——只剩下「天邊的兩朵烏雲」（開爾文勳爵，1900年）：黑體輻射問題和邁克生—莫雷實驗的零結果。誰也沒想到這兩朵烏雲將分別催生出量子力學和相對論，徹底顛覆人類對宇宙的理解。","subsections":[{"id":"phys-relativity","title":"相對論","content":"愛因斯坦的狹義相對論（1905年——愛因斯坦的「奇蹟年」，26歲的他在專利局擔任三等技術員的同時發表了四篇劃時代的論文）基於兩條基本假設：1）相對性原理——物理定律在所有慣性參考系中具有相同的形式；2）光速不變原理——真空中光速（c）對所有慣性觀察者都是常數，與光源的運動無關。由這兩條假設推導出的結果顛覆了牛頓的絕對時空觀：時間膨脹（運動的時鐘變慢——μ子（渺子）在宇宙射線中穿過大氣層時，其以接近光速運動的μ子的壽命（在地面觀察者看來）顯著長於靜止μ子的壽命，這是狹義相對論最直接的實驗證據之一）；長度收縮（物體在運動方向上收縮——但只有外部觀察者能看到，物體自身感受不到）；同時性的相對性（兩個事件是否同時發生取決於觀察者的運動狀態——對一個觀察者是同時的事件對另一個運動中的觀察者可能是一前一後）；以及最著名的質能等價公式 E = mc²——即使靜止的物體也蘊含著與其質量成正比的巨大能量（1克質量完全轉化為能量約等於2萬噸TNT當量——約為廣島原子彈的能量）。1915年，愛因斯坦經過近十年的艱苦努力（「自1907年以來我一直在與引力問題搏鬥」）完成了廣義相對論。其核心革命性思想是：引力不是一種「力」，而是時空彎曲的表現。物質（和能量）告訴時空如何彎曲，彎曲的時空告訴物質如何運動。愛因斯坦場方程（一組十個耦合的非線性偏微分方程）以極其優美的數學形式表達了這一思想。廣義相對論的經典驗證包括：水星近日點進動（每百年43角秒的異常進動被精確解釋）；1919年愛丁頓的日全食觀測（證實了星光在太陽引力場中的彎曲——這一結果使愛因斯坦一夜之間成為了全球媒體的明星）；以及2015年LIGO（雷射干涉重力波天文台）首次直接探測到重力波（來自13億光年外的兩個黑洞合併事件——三個創始人於2017年獲諾貝爾物理學獎）。2019年事件視界望遠鏡（EHT）發布了人類歷史上的第一張黑洞照片——M87星系中心的超大質量黑洞（質量約為太陽的65億倍）。"},{"id":"phys-quantum","title":"量子力學","content":"量子力學是描述微觀世界行為的物理理論，是20世紀物理學最深刻的革命。1900年普朗克在解決黑體輻射問題時被迫假設能量以離散的「量子」形式被吸收和發射（E = hν，h = 6.626×10⁻³⁴ J·s，普朗克常數），量子時代從此開始。1905年愛因斯坦（又是他）以光量子假說解釋了光電效應（光照射金屬表面會釋放電子，但電子的動能只與光的頻率（顏色）有關、與光的強度無關——經典波動理論無法解釋這一現象）——這一工作為他贏得了1921年的諾貝爾物理學獎。1913年波爾提出了氫原子模型——電子只能在特定的「允許軌道」上運行，在這些軌道上電子不輻射能量（違反經典電動力學的預測），只有當電子從一個軌道躍遷到另一個軌道時才會吸收或發射特定頻率的光子——成功解釋了氫原子光譜的離散譜線。1924年德布羅意提出物質波假說——電子（和所有物質粒子）也具有波動性，波長 λ = h/p（普朗克常數除以動量）。1927年戴維森和革末的電子衍射實驗證實了電子的波動性。1925–1927年間現代量子力學的數學形式最終形成：海森堡的矩陣力學（1925年）和薛丁格的波動力學（1926年）在數學上被證明是等價的。薛丁格方程描述了一個量子系統的波函數Ψ如何隨時間演化——iħ∂Ψ/∂t = ĤΨ，其中Ĥ是哈密頓算符（對應於系統的總能量）。波函數本身不具有直接的物理意義，|Ψ|² = 在空間某一點找到粒子的概率密度（波恩的統計解釋，1926年，他的概率解釋為波函數賦予了物理意義並因此獲得1954年諾貝爾獎）。海森堡測不準原理（1927年）揭示了量子世界的根本限制：ΔxΔp ≥ ħ/2——粒子的位置和動量不可能同時被無限定地精確測量（精確知道位置必然導致動量的不確定性增大，反之亦然）。這不是測量儀器的限制，而是自然界的根本性質。愛因斯坦終生難以接受量子力學的概率本質——他的名言「上帝不擲骰子」（God does not play dice）和與波爾之間長達數十年的著名辯論（特別是1935年愛因斯坦—波多爾斯基—羅森的EPR悖論論文和波爾的答覆）是物理學史上最精彩的智力對決。然而1964年約翰·貝爾推導出了貝爾不等式，1980年代阿蘭·阿斯佩的實驗明確證明了量子力學的非局域性和量子糾纏（「鬼魅般的超距作用」——愛因斯坦的用語）是真實存在的——2022年的諾貝爾物理學獎頒給了阿斯佩、克勞澤和塞林格對貝爾不等式的實驗驗證。"}]}]},{"id":"chemistry","title":"化學","category":"science","description":"研究物質的組成、結構、性質和變化的科學","icon":"⚗️","sections":[{"id":"chem-atomic","title":"原子結構與化學鍵","content":"原子的化學行為完全由其電子結構決定——特別是價電子（最外層電子）的數量和排布方式。離子鍵：金屬原子失去一個或多個電子（形成陽離子），非金屬原子獲得電子（形成陰離子），正負離子之間的靜電引力將它們結合在一起（如NaCl——食鹽）。共價鍵：兩個原子共享一對或多對電子以達到更穩定的電子構型（如H₂、O₂、H₂O）。共價鍵具有方向性和飽和性，決定了分子的三維形狀（VSEPR理論——價層電子對互斥理論）。金屬鍵：金屬原子釋放其價電子形成一個「電子海」，金屬陽離子浸入其中——電子可以在整塊金屬中自由移動，這解釋了金屬的導電性、導熱性和延展性。分子間作用力（氫鍵、偶極—偶極力、倫敦分散力）雖然比化學鍵弱得多，但決定了物質的熔點、沸點和溶解度等宏觀性質——氫鍵（約10–40 kJ/mol vs 共價鍵約200–800 kJ/mol）解釋了為什麼水（H₂O，分子量僅18）在室溫下是液體而氧氣（O₂，分子量32）是氣體，以及為什麼冰的密度比水小（冰能在水面上漂浮——這對水生生物在冬季的存活至關重要）。"},{"id":"chem-periodic","title":"元素週期律","content":"俄羅斯化學家門得列夫（1834–1907）於1869年提出了元素週期表的最初版本——按照原子量遞增排列當時已知的63種元素，並將化學性質相似的元素放在同一列（族）中。他的天才在於：1）他為尚未被發現的元素在表中留出了空位（他稱之為「eka-」前綴，如eka-鋁即後來發現的鎵（1875年）、eka-矽即鍺（1886年）），；2）他準確預測了這些未知元素的物理和化學性質（如密度、熔點、氧化態等）——當這些預測被後來的發現一一證實時被視為科學史上最輝煌的預測之一。現代週期表按照原子序數（而非原子量）遞增排列——這解決了門得列夫週期表中原來的一些異常（如碲和碘的排列）。週期表由18個族（豎列）和7個週期（橫行）構成，元素按照電子殼層結構的填充規律排列——同一族的元素具有相同的價電子構型，因此化學性質相似。週期表中的主要趨勢規律（從左到右、從上到下）：原子半徑（從左到右遞減（核電荷增加將電子拉得更緊），從上到下遞增（加入新的電子殼層））、電離能（從左到右遞增，從上到下遞減——移除一個電子所需的能量）、電子親和性（趨勢類似電離能但變化更複雜）、電負度（泡林電負度標度——原子在共價鍵中吸引電子的能力，從左到右遞增，從上到下遞減，氟是電負度最高的元素（3.98）、銫是最低的（0.79））。稀土元素（鑭系和錒系元素，通常置於週期表下方兩個獨立的橫行）因為具有特殊的電子結構（4f和5f軌域的填充）而擁有獨特的磁性（如釹磁鐵）和光學性質。"}]}]},{"id":"countries","title":"國家概況","icon":"🌏","color":"#4C1D95","description":"深入了解世界各國的政治體制、經濟結構與文化特色","topics":[{"id":"china","title":"中國","category":"countries","description":"世界第二大經濟體兼文明古國——五千年不間斷文明史與現代化進程","icon":"🇨🇳","sections":[{"id":"cn-politics","title":"政治體制與治理","content":"中華人民共和國是單一制社會主義共和國，實行人民代表大會制度。全國人民代表大會（全國人大）是最高國家權力機關和立法機關，由省、自治區、直轄市、特別行政區和軍隊選出的代表組成（約3,000名代表），每屆任期五年，每年舉行一次全體會議。中國共產黨（成立於1921年，截至2023年擁有約9,800萬黨員，是世界第二大政黨（僅次於印度人民黨））是唯一執政黨。中國的政治體制是中國共產黨領導下的多黨合作和政治協商制度——除中共外，還有八個民主黨派（如中國民主同盟、中國民主建國會等），它們在法律上享有參政議政的權利，但不具備西方意義上的「反對黨」功能。中國人民政治協商會議（政協）是政治協商、民主監督和參政議政的重要機構——政協委員包括各民主黨派、無黨派人士、各人民團體、少數民族、宗教界、港澳台同胞和海外華僑的代表人物。","subsections":[{"id":"cn-economy","title":"經濟轉型與挑戰","content":"改革開放（1978年至今）是現代中國經濟史的核心敘事。1978年鄧小平復出後，中共十一屆三中全會確立了「以經濟建設為中心」的基本國策，標誌著從階級鬥爭到經濟發展的根本轉向。農業改革率先突破：家庭聯產承包責任制取代了人民公社體制——土地所有權仍屬集體，但農民家庭可以承包土地並自主經營，在繳納農業稅和完成國家統購任務後剩餘產品歸自己所有（這種「交夠國家的、留足集體的、剩下都是自己的」的激勵機制極大地釋放了農業生產力）。1980年代鄉鎮企業（Township and Village Enterprises，TVEs）的蓬勃發展是中國特有的工業化路徑——農村集體以土地和勞動力入股、引進城市技術和管理人才，在體制邊緣開闢出了一條介於計劃和市場之間的工業化道路。1990年代中後期的國有企業改革（「抓大放小」——保留和重組大型國有企業，將中小型國企私有化/關閉）造成了約3,000萬國有企業工人下崗，但同時也為民營企業和市場經濟的發展騰出了空間。2001年加入WTO後中國深度融入全球貿易體系，並受益於全球化價值鏈——低廉的勞動力成本、完善的基礎設施和穩定的宏觀經濟環境使中國成為「世界工廠」。2010年中國GDP超越日本成為世界第二大經濟體。當前中國經濟面臨的結構性挑戰包括：房地產市場的深度調整（2021年恆大債務危機引發的連鎖反應、銷售量持續下降）、地方政府債務風險、人口老齡化和勞動力減少（2022年中國人口出現了60年來的首次負增長——出生人口956萬、死亡人口1041萬）、核心技術的自主創新壓力（特別是在先進晶片和高端軟體領域面對美國的技術出口管制）。"}]}]},{"id":"usa","title":"美國","category":"countries","description":"世界最大經濟體、軍事與科技超級大國","icon":"🇺🇸","sections":[{"id":"us-system","title":"政治體制","content":"美國是聯邦制總統制共和國，以1787年憲法（世界上最古老且仍在運行的成文憲法）為最高法律。三權分立的制度設計深深植根於啟蒙運動的思想（特別是孟德斯鳩的《論法的精神》）：行政權由總統行使，總統既是國家元首也是政府首腦，兼任武裝部隊總司令；立法權歸屬美國國會（由參議院和眾議院組成——參議院每州兩名議員（共100名）、任期六年，眾議院按各州人口比例分配席位（共435名）、任期兩年）；司法權由最高法院（9名大法官，由總統提名、參議院確認、終身任職）及各級聯邦法院行使。總統選舉採用選舉人團制度（Electoral College）而非直接普選——每個州的選舉人票數等於該州參議員（2人）加眾議員（按人口比例）的人數總和，總共538票（哥倫比亞特區有3票但沒有國會投票權）。除緬因州和內布拉斯加州外，大多數州實行「贏者通吃」（Winner-Take-All）規則——在該州獲得相對多數普選票的候選人獲得該州所有的選舉人票。這個體制的一個重要後果是總統候選人有可能贏得普選總票數但輸掉選舉人票而未能當選（2000年戈爾vs小布希、2016年希拉蕊vs川普）。兩黨制（民主黨（象徵為驢，一般認為是1828年安德魯·傑克遜創建）和共和黨（象徵為象，1854年成立，林肯是第一位共和黨總統）是美國政治的基石——雖然法律上不禁止第三黨，但選舉制度和政治文化的高度兩極化使第三黨候選人幾乎不可能在全國層面上勝選。"},{"id":"us-tech","title":"科技創新與矽谷","content":"矽谷（Silicon Valley，位於加州舊金山灣區南部，涵蓋從聖荷西到帕羅奧圖約50公里的狹長地帶）是全球無可爭議的技術創新中心。矽谷的成功是多重因素的獨特結合：世界頂尖的研究型大學（史丹佛大學（Stanford University，1885年由鐵路大亨利蘭·史丹佛夫婦創立，紀念他們早逝的兒子，弗雷德里克·特曼（Frederick Terman）教授在1930–50年代積極鼓勵學生創業——惠普（HP，1939年由史丹佛畢業生威廉·休利特和大衛·帕卡德在帕羅奧圖的一個車庫中創立（這個車庫被認為是矽谷的誕生地））是最早的成功案例）、加州大學柏克萊分校）、充沛的風險投資（Sand Hill Road是風險投資最集中的街道之一——紅杉資本（Sequoia Capital，投資了Apple、Google、WhatsApp、Airbnb等）、安德森·霍洛維茨（Andreessen Horowitz，a16z）等知名風投機構總部設於矽谷）、靈活的勞動力市場（在高科技行業中跳槽不僅不是負面信號、反而是職業發展的常見路徑——缺乏競業限制條款（加州法律不執行競業限制協議）促進了知識和人才的高速流通）和冒險文化（「快速失敗、快速學習」——創業失敗不被視為恥辱而是學習經歷）。矽谷的文化基因——黑客倫理（信息應該自由分享、權力應該去中心化）、開放源碼運動（Linux操作系統，林納斯·托瓦茲，1991年，自願者和公司合作的產物，今天幾乎所有的超級電腦、大多數的智能手機（Android）和網頁伺服器都運行Linux）、極客文化——深刻地影響了全球技術發展、商業模式和數字生活。"}]},{"id":"japan","title":"日本","category":"countries","description":"世界第三大經濟體，傳統與未來感並存的島國","icon":"🇯🇵","sections":[{"id":"jp-miracle","title":"戰後經濟奇蹟","content":"日本在二戰後的廢墟（1945年主要城市大部分被轟炸摧毀、工業基礎被徹底破壞——東京大轟炸（1945年3月9–10日，凝固汽油彈引發的火焰風暴造成約10萬人死亡、約100萬人無家可歸）中崛起為全球第二經濟大國的歷程是經濟史上最引人注目的故事之一。1950–1973年間日本GDP年均增長率約為9.5%（日本經濟奇蹟）。促成奇蹟的因素包括：美國的馬歇爾計劃和韓戰特需（1950–1953年韓戰期間美軍的巨額軍需訂購為日本提供了初始的市場和資金流入）、通產省（MITI，現經濟產業省）的產業政策——通過「護送船團方式」將有限的資源（外匯、技術許可、信貸）引導到戰略性出口產業（鋼鐵、造船、汽車、電子），同時以關稅和行政指導保護國內市場、直到本國企業具備國際競爭力後才逐步開放市場）、高儲蓄率（支撐了高投資率）、高質量的勞動力（教育和職業訓練體系的產出）以及「終身僱傭制」（大企業對其核心員工的長期僱傭保障提高了員工對公司的忠誠度和長期技能投資意願）和「年功序列制」（按年齡和資歷而非業績決定工資和升遷的制度提供了穩定的職業預期）。然而泡沫經濟（1985年廣場協議後日元急劇升值引發的資產價格泡沫——日本股市日經指數在1989年12月29日達到38,915點的歷史高點（今天仍遠未恢復至該水準），東京皇居附近的地價一度足以買下整個美國加州）在1991年破裂後，日本進入了「失落的三十年」——極為緩慢的經濟增長（甚至短期通縮——物價持續下跌）、人口老齡化（65歲以上人口佔比已超過29%，為全球最高之一。日本的「超老齡社會」帶來了勞動力萎縮、社會保障支出膨脹和內需不足的結構性難題）、政府債務GDP比率超過260%（全球最高之一，但因為國債主要由本國公民和日本央行持有，避免了希臘式的債務危機）。"}]},{"id":"southeast-asia","title":"東南亞國家概覽","category":"countries","description":"東協核心成員國——越南、泰國、印尼、馬來西亞、新加坡、菲律賓的全面概覽","icon":"🌴","sections":[{"id":"sea-vietnam","title":"越南","content":"越南是社會主義共和國，首都河內（位於北部紅河三角洲），最大城市胡志明市（前稱西貢——法國殖民時期被稱為「遠東的明珠」，位於南部湄公河三角洲）。1986年越共六大實施的「革新開放」（Đổi Mới）政策借鑑了中國改革開放的經驗——廢除了集體農業（轉向家庭承包制）、允許私營企業、鼓勵外國直接投資——使越南從一個糧食不能自給的國家轉變為世界第二大稻米出口國。如今越南是東南亞增長最快的經濟體之一——以製造業出口（特別是紡織、鞋類和電子產品——三星在越南有大規模的生產基地，約一半的三星智能手機在越南組裝）和旅遊業為主要引擎。越南年輕的人口結構（中位數年齡約31歲，約1億人）和具有競爭力的勞動力成本使其成為全球供應鏈從中國「多元化」的主要受益者之一（「China+1」策略）。"},{"id":"sea-thailand-indonesia","title":"泰國與印尼","content":"泰國是君主立憲制國家，現任國王哇集拉隆功（拉瑪十世，2016年即位）。泰國是唯一從未被歐洲殖民的東南亞國家（英法將泰國作為其在東南亞殖民地之間的「緩衝國」，這種地緣政治博弈的幸運使泰國得以保持形式上的獨立）。旅遊業是核心經濟支柱（每年約3500–4000萬國際遊客，曼谷連續多年是全球接待國際遊客最多的城市、普吉島和蘇梅島是國際知名的度假勝地）。印尼是東南亞最大經濟體（也是唯一的G20成員國），人口約2.75億（世界第四），86.5%信奉伊斯蘭教（世界最大的穆斯林人口國家）。印尼富含自然資源——它曾經是OPEC成員國，儘管現在已成為石油淨進口國，但煤炭（全球最大的動力煤出口國）、天然氣、鎳（電動車電池的關鍵原料——印尼擁有全球最大的鎳礦儲量之一，政府禁止出口未加工的鎳礦以強制外國投資者在印尼建設冶煉廠、建設電池供應鏈的下游環節）、棕櫚油（全球最大的生產國和出口國——用於食品、化妝品和生物柴油等無數產品）等礦產資源豐富。"},{"id":"sea-singapore","title":"新加坡","content":"新加坡是位於馬來半島南端、赤道以北僅約137公里的城市國家（城邦，City-State），面積僅728.6平方公里。1965年8月9日新加坡被逐出馬來西亞聯邦（因種族和政治矛盾，時任總理李光耀在宣布獨立的新聞發布會上泣不成聲——因為他從未想過新加坡會成為獨立的國家）。而後在李光耀（1959–1990年總理）和其繼任者領導的人民行動黨（PAP，自1959年自治以來一直執政至今）統治下，用一代人的時間從一個缺乏自然資源（甚至連淡水都要從馬來西亞進口）、失業率高企、住房短缺的貧困漁村轉變為全球金融中心、航運樞紐和技術創新城市——這個故事被稱為「新加坡奇蹟」。新加坡的公積金制度（CPF，強制性社會保障和住房儲蓄計劃——僱主和僱員各按工資一定比例繳納——是新加坡人能擁有政府組屋（HDB，住房與發展局建設的公共住房——約80%的新加坡人居住在政府組屋中（其中約90%擁有其組屋的產權））的主要原因之一）是發展中國家社會保障制度的獨特典範。新加坡以嚴格的法治、極低的腐敗率（貪污調查局CPIB擁有獨立調查權，直接向總理報告）、高效的政府治理和全球化的精英教育體系聞名於世。"}]}]},{"id":"history","title":"歷史","icon":"📜","color":"#7C3AED","description":"縱覽古今，涵蓋中國與世界歷史，從遠古文明至現代發展","topics":[{"id":"china-ancient","title":"中國古代史","category":"history","description":"從先秦至明清，跨越五千年的中華文明演進","icon":"🏯","sections":[{"id":"ca-pre-qin","title":"先秦時期（約前2070–前221）","content":"先秦時期是中國文明的發軔與奠基階段，涵蓋夏、商、周三代及春秋戰國。這一時期奠定了中國政治制度、哲學思想、文字體系與文化傳統的基礎框架。從部落聯盟到封建王朝，從甲骨卜辭到百家爭鳴，華夏文明的核心基因在此時期全部成形。","subsections":[{"id":"ca-xia","title":"夏朝（約前2070–前1600）","content":"夏朝被認為是中國歷史上第一個世襲王朝。《史記·夏本紀》記載，禹因治水有功，受舜禪讓而為首領，定都陽城（今河南登封）。禹將天下劃分為九州，建立了中國最早的行政區劃體系。禹之子啟打破了禪讓傳統，開啟了「家天下」的世襲制度。夏朝共傳十四代、十七王，歷時約470年。考古學上與夏朝相關的遺址以河南偃師的二里頭文化遺址最為重要——發現了大型宮殿基址、青銅冶鑄作坊和禮器，顯示出成熟的青銅文明和社會分層。由於缺乏同時期的文字記載，夏朝的存在仍有爭議，但二里頭文化的考古發現提供了有力佐證。"},{"id":"ca-shang","title":"商朝（約前1600–前1046）","content":"商朝是中國歷史上第一個有同時期文字（甲骨文）記載的王朝。商族起源於黃河下游，商湯滅夏桀後建立商朝，傳十七世、三十一王，歷時約550年。","subsections":[{"id":"ca-shang-politics","title":"政治與社會結構","content":"商朝政治制度以王權為核心，王被視為神的代表和最高祭司。商王之下設有尹（相當於後世的宰相）和各級官職如小臣、多尹、史、卜等，形成了較為成熟的官僚體系。社會結構分為貴族（王族、諸侯）、平民和奴隸三級。商朝實行內外服制度：內服為王畿直轄區，外服為諸侯領地。商朝軍隊以戰車（由兩匹馬拉動，載三人：馭手、弓箭手、持戈者）為主力，青銅兵器（戈、矛、鉞、刀）廣泛使用。"},{"id":"ca-shang-culture","title":"文化與技術成就","content":"甲骨文是中國已知最早的成熟文字系統，發現於河南安陽殷墟，刻寫於龜甲和獸骨之上。甲骨文已經是具備象形、指事、會意、形聲等六書結構的體系化文字，單字總數約4000–5000個，其中約1500個已被辨識。青銅器的鑄造技術達到頂峰：后母戊鼎（原稱司母戊鼎）高133厘米，重832.84公斤，是世界已出土最重的青銅器。商朝人極度重視祭祀與占卜，祭祀對象包括上帝、祖先神和自然神。天文曆法方面，商朝已使用陰陽合曆，有平年（12個月）和閏年（13個月）之分，並能記錄日食和月食。"}]},{"id":"ca-zhou","title":"周朝（前1046–前256）","content":"周朝是中國歷史上延續時間最長的王朝（約790年），分為西周和東周，東周又分為春秋和戰國兩個時期。周朝建立了對中國影響深遠的宗法封建制度和禮樂文化。","subsections":[{"id":"ca-western-zhou","title":"西周（前1046–前771）","content":"周族起源於陝西渭水流域。周武王姬發在牧野之戰中擊敗商紂王，建立周朝，定都鎬京（今西安附近）。周公姬旦（武王之弟）在武王去世後攝政七年，平定了三監之亂（商朝遺民與周室內部的叛亂），並進行了一系列制度建設——制禮作樂、確立宗法制和分封制。","subsections":[{"id":"ca-wzhou-feudalism","title":"封建制度與宗法制度","content":"周朝的封建制度是基於血緣關係的分封體系：周天子將土地和人民分封給宗室子弟和功臣，建立諸侯國（重要封國包括齊、魯、燕、衛、晉等）。諸侯對天子有朝覲、納貢和從征的義務。宗法制度則以嫡長子繼承制為核心——正妻所生的長子（嫡長子）享有優先繼承權，次子和庶子則降為小宗。大宗與小宗的關係形成了一個嚴密的血緣等級體系。這些制度有效地維持了周朝長期的政治穩定，並深刻影響了此後兩千年中國社會的組織方式——家族、宗族、祠堂和族譜等傳統均根源於此。"}]},{"id":"ca-spring-autumn","title":"春秋時期（前770–前476）","content":"公元前771年，犬戎攻入鎬京，周幽王被殺，西周滅亡。次年周平王東遷洛邑（今洛陽），開啟了東周時代。春秋時期以孔子修訂的魯國史書《春秋》而得名。","subsections":[{"id":"ca-spring-hegemons","title":"五霸爭霸與社會變革","content":"周王室東遷後勢力大衰，諸侯國開始爭奪霸權。「春秋五霸」的具體名單有多種說法，最常見的版本為：齊桓公（首位霸主，尊王攘夷）、晉文公（城濮之戰擊敗楚國）、楚莊王（問鼎中原）、吳王闔閭（破楚入郢）和越王勾踐（臥薪嘗膽滅吳）。爭霸戰爭雖然頻繁，但因「禮」的約束，戰爭規模有限，貴族精神依然濃厚。經濟上，鐵器開始使用，牛耕逐步推廣，井田制開始瓦解。"},{"id":"ca-spring-thought","title":"思想文化的萌芽","content":"春秋末期是中國思想史上最為關鍵的時期之一。孔子（前551–前479）創立儒家學派，提出「仁」和「禮」的核心概念，主張恢復周禮、推行德治。他開創了私人講學的傳統，據說有弟子三千，賢者七十二人。《論語》記錄了孔子及其弟子的言行，是儒家最重要的經典。老子（據傳與孔子同時代）創立了道家學說，《道德經》以「道可道，非常道」開篇，提出了以「無為」為核心的哲學體系。孔子和老子分別代表了中國思想史上入世和出世的兩大傳統。"}]},{"id":"ca-warring-states","title":"戰國時期（前475–前221）","content":"戰國時期是兼併戰爭空前激烈的時代。經過春秋時期的兼併，形成了齊、楚、燕、韓、趙、魏、秦七個大國（「戰國七雄」），各國紛紛變法圖強以在生存競爭中取勝。","subsections":[{"id":"ca-ws-reforms","title":"變法運動","content":"魏國李悝變法是最早的成功改革，頒布《法經》、推行「盡地力之教」。楚國吳起變法削減貴族特權，但因觸動既得利益者而失敗（吳起被射殺）。秦國商鞅變法（前356、前350年兩次）最為徹底和成功——獎勵耕戰、廢除井田制、推行縣制、統一度量衡、實行連坐法。商鞅雖然最終被車裂而死，但其變法徹底改造了秦國的社會結構和國家體制，使秦國從西陲弱國一躍成為超級強國，為後來的統一天下奠定了不可逆轉的基礎。"},{"id":"ca-ws-hundred-schools","title":"百家爭鳴","content":"戰國時期是中國思想史上最為輝煌的時代。儒家經孟子（性善論、仁政）和荀子（性惡論、禮法並重）的發展而更加豐富；墨家（墨子創立）提倡兼愛、非攻、尚賢、節用，組織嚴密如軍事團體；道家在莊子手中發展出汪洋恣肆的哲學想像（《逍遙遊》）；法家（韓非子集大成）主張以法治國、以術馭臣、以勢立威，為專制君主提供了系統化的統治理論；名家（公孫龍的白馬非馬論）探討邏輯和語言問題；陰陽家（鄒衍）提出五德終始說解釋歷史循環；縱橫家（蘇秦、張儀）以外交謀略影響國際格局。各家自由爭鳴、互相辯難，使這一時期成為可以和古希臘哲學黃金時代相媲美的思想大爆發時代。"}]}]}]},{"id":"ca-qin-han","title":"秦漢時期（前221–220）","content":"秦漢時期是中國歷史上第一個大一統時代。秦始皇建立了中國歷史上第一個中央集權帝國，漢朝則在此基礎上發展成為可與羅馬帝國並列的東方超級大國。","subsections":[{"id":"ca-qin","title":"秦朝（前221–前206）","content":"公元前221年，秦王嬴政滅掉最後的對手齊國，完成了統一。他自稱「始皇帝」，意為第一個皇帝，後世以二世、三世以至萬世相傳。秦始皇在短短十餘年間實施了大規模的制度建設，但其暴政也導致了帝國的迅速崩潰。","subsections":[{"id":"ca-qin-reforms","title":"統一措施與制度改革","content":"政治體制：廢除分封制，全面推行郡縣制——全國劃分為36郡（後增至40餘郡），郡下設縣，由中央直接任命官員管理。中央設立三公九卿制度：三公為丞相（行政）、太尉（軍事）、御史大夫（監察）。文化統一：書同文——以小篆為標準字體（後簡化為隸書），統一了此前各國不統一的漢字書寫；車同軌——統一車輛輪距和道路標準；統一度量衡和貨幣（圓形方孔的「秦半兩」銅錢）。思想控制：採納李斯建議實行焚書令（前213年），除醫藥、卜筮、農書外銷毀民間藏書；坑殺460餘名方士和儒生（前212年，坑儒事件）。"},{"id":"ca-qin-projects","title":"大型工程與社會矛盾","content":"修築長城：將原秦、趙、燕三國北部的長城連接起來，西起臨洮、東至遼東，動用數十萬勞工。修建馳道：以咸陽為中心修築通往全國各地的官道，寬50步（約69米）。營建宮殿：阿房宮（僅前殿就可容納萬人）和驪山陵墓（兵馬俑即為其陪葬坑，1974年被農民打井時發現）耗費了大量人力物力。秦朝的暴政——沉重的徭役（全國約2000萬人口中有超過200萬人被徵發服役）、嚴酷的刑法（連坐法、夷三族）和沉重的賦稅——最終導致了陳勝吳廣在大澤鄉的起義（前209年）和全國性的反秦浪潮。公元前206年，劉邦率軍攻入咸陽，秦朝僅存在15年便滅亡了。"}]},{"id":"ca-han","title":"漢朝（前202–220）","content":"漢朝是中國歷史上最輝煌的王朝之一，也是華夏族從此被稱為「漢族」的時代。","subsections":[{"id":"ca-western-han","title":"西漢（前202–9）","content":"劉邦在楚漢戰爭（前206–前202）中擊敗項羽後稱帝，定都長安（今西安）。西漢前期採取與民休息的黃老之學政策。「文景之治」（漢文帝、漢景帝時期，前180–前141）輕徭薄賦（田賦降至三十稅一）、廢除肉刑，社會經濟得到恢復和發展，國庫充實（「太倉之粟陳陳相因，充溢露積於外」）。","subsections":[{"id":"ca-whan-wudi","title":"漢武帝時代（前141–前87）","content":"漢武帝劉徹是漢朝在位時間最長的皇帝（54年），其統治將漢朝推向了鼎盛。政治上：頒布推恩令（允許諸侯王將封地分給非嫡長子的子孫），巧妙地削弱了諸侯國的力量；設立刺史制度監督地方。經濟上：實行鹽鐵官營、均輸平準等國家干預政策，增加財政收入以支持軍事行動。軍事上：派衛青、霍去病多次北擊匈奴，收復河套地區、打通河西走廊。外交上：派張騫兩次出使西域（前138、前119年），開闢了從長安經中亞通往地中海世界的絲綢之路。文化上：採納董仲舒建議「罷黜百家，獨尊儒術」，設立太學培養儒生，儒家從此成為中國兩千年的正統思想。"}]},{"id":"ca-eastern-han","title":"東漢（25–220）","content":"王莽篡位建立新朝（9–23）後推行了一系列激進的改革（恢復井田制、改革幣制等），但很快因執行混亂和社會反對而失敗，死於綠林軍之手。劉秀（光武帝）在戰亂中崛起，重建漢朝，定都洛陽。東漢前期出現了「光武中興」和「明章之治」（明帝、章帝時期）的繁榮局面。科技成就卓著：蔡倫改進造紙術（105年），使用樹皮、麻頭、破布和漁網等原料，使紙張成為方便的書寫材料；張衡發明地動儀（132年）和渾天儀，前者能測定地震方向，後者用以演示天體運行。東漢中後期，宦官和外戚交替專權（發生了兩次「黨錮之禍」，大量正直士大夫被禁錮或殺害），政治日益腐敗。184年，張角領導的黃巾起義爆發，雖然很快被鎮壓，卻揭開了東漢崩潰的序幕，天下從此進入群雄割據、三國鼎立的亂世。"}]}]},{"id":"ca-three-to-tang","title":"三國魏晉南北朝（220–589）","content":"這三百餘年是中國歷史上最為動盪但也極具創造力的分裂時代。戰亂頻繁、政權更迭迅速，但民族融合加速、佛教廣泛傳播、文學藝術綻放異彩。","subsections":[{"id":"ca-three-kingdoms","title":"三國（220–280）","content":"東漢末年，曹操挾天子以令諸侯，統一北方；劉備在諸葛亮的輔助下割據益州（蜀）；孫權據有江東（吳）。赤壁之戰（208年）中，孫劉聯軍以火攻大敗曹操水軍，奠定了天下三分的基本格局。220年曹丕篡漢自立、建立魏國，221年劉備稱帝建蜀漢，229年孫權稱帝建吳國。三國時期雖然僅60年，但因《三國演義》的文學渲染而成為中國人最為熟悉和喜愛的歷史段落。263年魏滅蜀，265年司馬炎篡魏建立西晉，280年晉滅吳統一天下。"},{"id":"ca-jin-southern-northern","title":"兩晉南北朝","content":"西晉（265–316）短暫統一後，因八王之亂（291–306，司馬氏宗室間的殘酷內鬥）和隨之而來的五胡亂華（匈奴、鮮卑、羯、氐、羌等北方少數民族大規模南下）而崩潰。317年司馬睿在建康（今南京）建立東晉，北方則進入五胡十六國時期。420年東晉被劉宋取代，南方先後經歷宋、齊、梁、陳四朝（合稱南朝）。北方在439年由鮮卑拓跋部建立的北魏統一，後分裂為東魏和西魏，再分別被北齊和北周取代（合稱北朝）。北魏孝文帝（471–499在位）推行漢化改革——遷都洛陽、改鮮卑姓氏為漢姓、禁胡服、提倡胡漢通婚——極大地促進了民族融合。這一時期的文化成就包括：陶淵明的田園詩、王羲之的書法（《蘭亭序》被譽為「天下第一行書」）、顧愷之的人物畫、雲岡和龍門石窟的佛教雕刻等。"}]},{"id":"ca-sui-tang","title":"隋唐盛世（581–907）","content":"隋唐時期重新統一了中國，並將中國封建文明推向了最高峰。唐朝的開放、包容和繁榮使其成為當時世界上最強大的帝國。","subsections":[{"id":"ca-sui","title":"隋朝（581–618）","content":"隋文帝楊堅（出身關隴軍事貴族集團）於581年篡北周自立，589年滅南陳統一了分裂近300年的中國。隋朝創立科舉制度（以考試選拔官員，打破了魏晉以來門閥士族壟斷官職的局面），確立了三省六部制（中書省決策、門下省審核、尚書省執行；六部為吏戶禮兵刑工），為唐代政治制度奠定了基礎。大運河以洛陽為中心，南至餘杭（今杭州）、北達涿郡（今北京），全長約2700公里，連接了五大水系，極大促進了南北經濟文化交流。然而隋煬帝楊廣好大喜功——營建東都洛陽、開鑿大運河、三征高句麗（均以失敗告終，損失慘重）——導致民怨沸騰、起義四起。618年，隋煬帝在江都（今揚州）被部將宇文化及所殺，隋朝僅存在37年便滅亡了。"},{"id":"ca-tang","title":"唐朝（618–907）","content":"唐朝延續近300年，堪稱中國封建社會的巔峰。","subsections":[{"id":"ca-tang-golden","title":"貞觀之治與開元盛世","content":"唐太宗李世民（626–649在位）通過玄武門之變奪取皇位，但其統治時期開創了中國歷史上著名的「貞觀之治」。他以隋亡為鑑，虛心納諫（魏徵是最著名的諫臣），任用賢能，輕徭薄賦，民族政策開明（被周邊民族尊為「天可汗」），奠定了唐朝強盛的基礎。唐玄宗李隆基前期（開元年間，713–741）將唐朝推向鼎盛——「開元盛世」時期，長安人口超過百萬，是當時世界上最大的城市，來自波斯、阿拉伯、印度、日本、朝鮮等地的商人、僧侶和留學生雲集於此。詩歌在唐朝達到巔峰——李白（浪漫主義，被譽為「詩仙」）、杜甫（現實主義，被譽為「詩聖」）、白居易（《長恨歌》、《琵琶行》）、王維（詩中有畫，畫中有詩）等詩人的作品至今廣泛傳誦。唐朝的開放性體現在各個方面：景教（基督教聶斯脫里派）、祅教、摩尼教和伊斯蘭教都在唐朝傳入中國；鑒真和尚六次東渡日本弘揚佛法；日本派遣了大量遣唐使學習唐朝的制度和文化（至今日本京都的格局仍然模仿長安）。"},{"id":"ca-tang-decline","title":"安史之亂與唐朝衰亡","content":"安史之亂（755–763）是唐朝乃至整個中國歷史的轉折點。身兼范陽、平盧、河東三鎮節度使的安祿山於755年在范陽（今北京）起兵叛亂，一度攻陷洛陽和長安，唐玄宗倉皇逃往四川，途中在馬嵬坡被迫賜死楊貴妃。雖然叛亂最終被平定，但付出了極其慘重的代價：人口從約5200萬銳減至約1700萬；中央政府對地方的控制力嚴重削弱，形成了藩鎮割據的局面；宦官開始掌握禁軍並干預朝政；牛李黨爭（以牛僧孺和李德裕為首的官僚派系鬥爭）持續了近40年。唐朝後期雖有「元和中興」等短暫的復興，但根本問題始終未能解決。875年黃巢起義爆發（「沖天香陣透長安，滿城盡帶黃金甲」），沉重打擊了唐朝的統治基礎。907年，朱溫篡唐自立，唐朝正式滅亡，中國進入五代十國的分裂時期。"}]}]},{"id":"ca-song-to-qing","title":"宋元明清（960–1912）","content":"這一千年涵蓋了中國封建社會的後半段，經濟重心從北方轉移到南方，商品經濟持續發展，但也經歷了兩次異族統治（元朝和清朝）。","subsections":[{"id":"ca-song","title":"宋朝（960–1279）","content":"宋朝分為北宋（960–1127，定都開封）和南宋（1127–1279，定都臨安即今杭州）。宋朝是中國歷史上經濟、文化和科技最為繁榮的時代之一，GDP總量約佔當時全球的22–25%。","subsections":[{"id":"ca-song-economy","title":"經濟與科技創新","content":"商業革命：打破了唐代坊市分離的限制，開封和臨安成為繁華的商業都市，《清明上河圖》生動描繪了汴京（開封）的繁華景象。世界上最早的紙幣「交子」在北宋四川地區出現（約1023年）。科技發明：畢昇發明活字印刷術（約1040年代），大幅降低了書籍的生產成本；指南針廣泛用於航海（北宋末朱彧《萍洲可談》記載了指南針在航海的應用）；火藥武器開始應用於戰爭（火箭、火炮、火槍等）。沈括的《夢溪筆談》（1088年）記錄了大量科學發現，涵蓋天文、地理、物理、化學等多個領域，被李約瑟譽為「中國科技史上的里程碑」。"},{"id":"ca-song-culture","title":"文化成就與理學","content":"宋詞是宋朝最具代表性的文學形式，與唐詩並稱。蘇軾（東坡）開創了豪放派詞風（「大江東去，浪淘盡，千古風流人物」）；李清照（易安居士）是婉約派詞人的傑出代表（「尋尋覓覓，冷冷清清，淒淒慘慘戚戚」）；辛棄疾以詞言志，風格豪壯。理學（又稱道學、宋明理學）是宋代最重要的思想成就——周敦頤、張載、程顥、程頤為理學的奠基者，朱熹（1130–1200）集理學之大成，構建了以「理」為核心的龐大哲學體系。陸九淵則提出了「心即理」的主張，與朱熹展開辯論（鵝湖之會，1175年），成為後來心學的思想淵源。"}]},{"id":"ca-yuan","title":"元朝（1271–1368）","content":"元朝由蒙古族建立，成吉思汗（鐵木真，1162–1227）統一蒙古各部後開始大規模對外征服。其孫忽必烈於1271年定國號為大元，1279年滅南宋（崖山海戰，陸秀夫背幼帝趙昺跳海殉國），統一了中國。元朝是中國歷史上疆域最遼闊的王朝——北至西伯利亞、南抵南海、東至朝鮮半島、西達東歐。忽必烈推行漢法、定都大都（今北京）、實行行省制度（至今仍是中國省級行政區的基礎）。元朝時期中外交流空前活躍——《馬可波羅遊記》（約1298年）向歐洲介紹了東方的繁榮，激發了歐洲人對東方的嚮往。元曲（散曲和雜劇）是這一時期最具代表性的文學形式——關漢卿的《竇娥冤》、王實甫的《西廂記》、馬致遠的《漢宮秋》都是不朽的經典。但元朝實行民族歧視政策（將人民分為蒙古人、色目人、漢人、南人四等），加上後期政治腐敗和水旱災害，最終被朱元璋領導的紅巾軍起義推翻。"},{"id":"ca-ming","title":"明朝（1368–1644）","content":"朱元璋（明太祖）出身貧農，曾出家為僧，後參加紅巾軍起義並最終奪取天下，是中國歷史上出身最為寒微的皇帝。明朝初期實行嚴厲的集權統治——廢除丞相制度（胡惟庸案，1380年）、設立錦衣衛和東廠等特務機構。明成祖朱棣通過「靖難之役」（1399–1402）奪取皇位後遷都北京，修建了紫禁城（故宮，始建於1406年，1420年完工），並派鄭和七下西洋（1405–1433）——鄭和的寶船艦隊規模宏大（最大的寶船據載長約120米），最遠到達非洲東海岸和紅海沿岸，遠早於歐洲大航海時代的到來。明朝中後期商品經濟繁榮，出現了資本主義萌芽。王陽明（1472–1529）的心學思想影響深遠——他提出「心即理」、「知行合一」和「致良知」的學說，強調道德主體的內在自覺。但明朝中後期的嚴重問題——宦官專權（魏忠賢時期達到頂峰，東林黨人遭受殘酷打壓）、黨爭激烈、土地兼併和財政危機——最終導致了帝國的崩潰。1644年，李自成攻入北京，崇禎帝在煤山自縊，明朝滅亡。"},{"id":"ca-qing","title":"清朝（1644–1912）","content":"清朝由滿族（女真後裔）建立。努爾哈赤統一女真各部後建立後金（1616年），其子皇太極改國號為大清（1636年）。1644年，吳三桂引清兵入關，清朝從李自成手中接管了北京，逐步征服全中國。","subsections":[{"id":"ca-qing-golden","title":"康雍乾盛世（1661–1796）","content":"康熙、雍正、乾隆三朝（共135年）是清朝的鼎盛時期，也是中國封建社會最後的輝煌。康熙帝平定三藩之亂、收復台灣（1683年，施琅攻台，鄭克塽投降）、驅逐沙俄（1689年《尼布楚條約》），奠定了清朝的疆域基礎。雍正帝大力整頓吏治、推行攤丁入畝（將人頭稅併入土地稅）等改革，充實了國庫。乾隆帝時期清朝疆域達到極盛（約1316萬平方公里），但好大喜功的「十全武功」耗盡了國庫，文字獄（如《四庫全書》編纂過程中對「違礙」書籍的大規模銷毀）造成了嚴重的文化摧殘。人口從康熙初年的約9000萬增長到乾隆末年的約3億，成為當時世界上人口最多的國家。但閉關鎖國政策（1757年乾隆下令僅限廣州一口通商）使中國逐漸與正在經歷工業革命的西方世界脫節。"},{"id":"ca-qing-decline","title":"晚清的衰落（1840–1912）","content":"鴉片戰爭（1840–1842）是中國近代屈辱史的開端。英國以林則徐虎門銷煙為藉口發動了侵略戰爭，清軍慘敗，被迫簽訂了《南京條約》（割讓香港島、開放五口通商、賠款2100萬銀元、協定關稅），中國的主權和領土完整遭到嚴重損害。此後，列強掀起了瓜分中國的狂潮：第二次鴉片戰爭（1856–1860）、中法戰爭（1884–1885）、甲午戰爭（1894–1895）和八國聯軍侵華（1900）接踵而至，中國一步步淪為半殖民地半封建社會。太平天國運動（1851–1864，洪秀全領導，定都南京稱天京）是中國歷史上規模最大的農民戰爭之一，傷亡人數可能高達2000–3000萬。洋務運動（1861–1895，曾國藩、李鴻章、張之洞等人推動，口號「師夷長技以制夷」）和戊戌變法（1898年，康有為、梁啟超推動）相繼失敗，說明在不觸動封建制度根本的前提下進行改革無法救中國。1911年10月10日武昌起義成功，各省紛紛響應。1912年2月12日，隆裕太后代宣統帝溥儀頒布退位詔書，延續兩千多年的封建帝制宣告終結。"}]}]}]},{"id":"china-modern","title":"中國近代史","category":"history","description":"從鴉片戰爭到改革開放，中國從封閉走向現代化的艱辛歷程","icon":"🏛️","sections":[{"id":"cm-opium-war","title":"鴉片戰爭與不平等條約體系（1840–1860）","content":"1840年英國以林則徐銷毀鴉片為藉口發動了第一次鴉片戰爭。清軍在武器裝備、戰術思想和動員能力上都遠遠落後於英軍。1842年簽訂的《南京條約》開啟了近代不平等條約的先例：割讓香港島、開放廣州、廈門、福州、寧波、上海五口通商、賠款2100萬銀元、協定關稅、領事裁判權。1844年，美國和法國又分別迫使清政府簽訂了《望廈條約》和《黃埔條約》，獲得了更多特權。1856–1860年的第二次鴉片戰爭（又稱亞羅號戰爭），英法聯軍攻入北京並洗劫和焚燒了圓明園（1860年10月），清政府被迫簽訂《天津條約》（1858年）和《北京條約》（1860年），進一步開放內河和內陸通商口岸，允許外國公使常駐北京，割讓九龍半島南部給英國。"},{"id":"cm-self-strengthening","title":"自強運動的失敗（1861–1895）","content":"洋務運動（又稱自強運動）是清政府在內憂外患下的自救嘗試，口號為「自強求富」。前期以軍事工業為重點：曾國藩和李鴻章創辦了安慶內軍械所（1861年，中國第一家近代軍工廠）和江南製造總局（1865年，中國最大的近代軍工企業）；左宗棠創辦了福州船政局（1866年，遠東最大的造船廠）。後期擴展到民用工業：輪船招商局（1872年）、開平礦務局（1878年）、上海機器織布局等。洋務派還建立了新式陸海軍，其中以北洋水師（1888年成軍）最為重要——擁有兩艘鐵甲艦（定遠、鎮遠）和數十艘巡洋艦及輔助艦隻。然而在甲午戰爭（1894–1895）中，北洋水師在黃海海戰和威海衛之戰中全軍覆沒，陸軍也在朝鮮和遼東戰場慘敗。《馬關條約》（1895年）的屈辱程度遠超此前任何條約：割讓台灣和澎湖列島給日本、賠款白銀2.3億兩、允許日本在華開設工廠。洋務運動的破產證明了「中學為體、西學為用」的改良路線無法挽救封建制度。"},{"id":"cm-revolution-era","title":"革命與共和（1895–1927）","content":"甲午戰敗後，康有為和梁啟超領導了戊戌變法（1898年6月11日至9月21日，僅103天），試圖通過君主立憲實現制度變革，但被慈禧太后發動戊戌政變鎮壓（戊戌六君子——譚嗣同、林旭、楊銳、劉光第、楊深秀、康廣仁被殺）。與此同時，孫中山在日本成立興中會（1894年，後改組為同盟會，1905年），提出「驅除韃虜，恢復中華，創立民國，平均地權」的革命綱領和三民主義（民族、民權、民生）。1911年10月10日，武昌起義打響了辛亥革命的第一槍，各省紛紛響應。1912年1月1日，孫中山在南京就任中華民國臨時大總統，亞洲第一個民主共和國就此誕生。然而革命果實很快被袁世凱竊取——1912年2月15日袁世凱被選為臨時大總統，1915年袁更冒天下之大不韙稱帝（僅83天即被迫取消）。袁死後中國陷入了軍閥割據的混亂局面。1915年，陳獨秀創辦《青年雜誌》（後改名《新青年》），高舉「民主」與「科學」兩面旗幟，掀起了新文化運動。魯迅的《狂人日記》（1918年，中國第一部現代白話小說）對封建禮教進行了深刻批判。1919年五四運動中，學生和工人聯合行動，反對巴黎和會將德國在山東的權益轉讓給日本，促進了馬克思主義在中國的傳播。1921年中國共產黨在上海成立。1924–1927年的國民革命（北伐戰爭）推翻了北洋軍閥，但1927年蔣介石發動「四一二」政變，國共合作破裂，中國進入了十年內戰時期（1927–1937）。"},{"id":"cm-anti-japanese","title":"抗日戰爭（1937–1945）","content":"1937年7月7日盧溝橋事變（七七事變）爆發，標誌著日本全面侵華戰爭的開始。中國軍民進行了艱苦卓絕的八年抗戰。1937年8–11月的淞滬會戰是抗戰中規模最大、最慘烈的戰役之一——中國投入約70萬兵力，粉碎了日本「三個月滅亡中國」的狂妄計劃。1937年12月13日南京陷落後，日軍進行了慘無人道的大屠殺，約30萬軍民遇害（南京大屠殺）。1938年的台兒莊大捷是抗戰初期中國軍隊取得的重大勝利。遷都重慶後，國民政府以西南大後方為基地堅持抗戰。1941年12月珍珠港事件後中國正式對日、德、義宣戰，抗日戰爭成為世界反法西斯戰爭的重要組成部分。1945年8月6日和9日美國在廣島和長崎投下原子彈，8月8日蘇聯對日宣戰出兵東北，8月15日日本天皇宣布無條件投降。中國人民為戰爭勝利付出了巨大的犧牲——約3500萬軍民傷亡、經濟損失無法估量——但也以巨大的民族犧牲贏得了世界各國的尊重，中國成為聯合國安理會五個常任理事國之一。"},{"id":"cm-civil-war-to-reform","title":"內戰與新政權（1945–1949）","content":"抗戰勝利後國共矛盾迅速激化，1946年全面內戰爆發。經過遼瀋戰役（1948年9–11月）、淮海戰役（1948年11月–1949年1月）和平津戰役（1948年11月–1949年1月）三大戰略決戰，國民黨主力部隊基本被消滅。1949年4月，解放軍發動渡江戰役，佔領南京。1949年10月1日，毛澤東在北京天安門城樓上宣布中華人民共和國成立。國民政府遷至台灣，兩岸從此分治至今。新政權初期進行了土地改革運動，徹底改變了延續兩千年的封建土地制度。"},{"id":"cm-reform-opening","title":"改革開放時期（1978至今）","content":"1978年12月中共十一屆三中全會確立了改革開放的基本國策，標誌著中國歷史的重大轉折。","subsections":[{"id":"cm-reform-early","title":"早期改革（1978–1992）","content":"農村改革率先突破：安徽省鳳陽縣小崗村的18位農民在1978年秘密簽訂「生死狀」，實行「包產到戶」，揭開了農村改革的序幕。家庭聯產承包責任制迅速推廣到全國，極大地釋放了農村生產力。城市改革以擴大企業自主權和發展鄉鎮企業為重點。1980年設立深圳、珠海、汕頭、廈門四個經濟特區，「時間就是金錢，效率就是生命」的深圳口號成為改革精神的象徵。1984年進一步開放14個沿海城市，1990年開發開放上海浦東新區，逐步形成了「經濟特區—沿海開放城市—沿海經濟開放區—內地」的全方位開放格局。"},{"id":"cm-reform-later","title":"深化改革與全球化（1992至今）","content":"1992年鄧小平南巡講話突破了計劃與市場的爭論，確立了社會主義市場經濟的改革方向。2001年中國加入世界貿易組織（WTO），從此深度融入全球經濟體系。此後中國經濟實現了長達二十多年的高速增長（年均約9–10%），2010年超越日本成為世界第二大經濟體。基礎設施建設取得驚人成就——高速鐵路網絡里程全球第一（超過4萬公里）、港口吞吐量全球領先。超過8億人口擺脫了絕對貧困（世界銀行標準）。當前中國經濟正處於從高速增長向高質量發展轉型的關鍵階段，面臨人口老齡化、房地產市場調整、核心技術自主創新和複雜的地緣政治環境等多重挑戰和機遇。"}]}]},{"id":"world-ancient","title":"世界古代文明","category":"history","description":"人類文明的搖籃——美索不達米亞、古埃及、古希臘、古羅馬等偉大文明的興衰","icon":"🏛️","sections":[{"id":"wa-mesopotamia","title":"美索不達米亞文明","content":"美索不達米亞（意為「兩河之間的土地」）位於底格里斯河和幼發拉底河流域（今伊拉克一帶），是人類已知最早的文明發源地之一。約公元前3500年，蘇美爾人在這裡建立了世界上最早的城市。","subsections":[{"id":"wa-sumer","title":"蘇美爾文明","content":"蘇美爾人建立了烏爾、烏魯克、拉格什等城邦。楔形文字是人類最早的書寫系統之一，將蘆葦筆壓入濕泥板留下楔形痕跡，主要用於記錄商業交易、法律條文和文學作品。蘇美爾人還發明了六十進位制——60可以被2、3、4、5、6、10、12、15、20、30整除，至今仍用於計量時間（60秒=1分鐘、60分鐘=1小時）和角度（360度）。《吉爾伽美什史詩》是人類最古老的文學作品之一，講述了烏魯克國王吉爾伽美什追尋永生的冒險故事，其中包含了大洪水的敘述（與聖經諾亞方舟故事有驚人的相似之處）。蘇美爾人建造了金字塔式的神廟——塔廟（Ziggurat），據信是人與神溝通的場所。"},{"id":"wa-babylon","title":"巴比倫與亞述","content":"漢謨拉比（約前1792–前1750在位）統一了美索不達米亞，建立了古巴比倫王國。其最著名的遺產是《漢謨拉比法典》——刻在一塊高2.25米的黑色玄武岩石柱上，包含282條法律條文，以嚴格的「同態復仇」原則（「以眼還眼，以牙還牙」）著稱。法典內容涵蓋刑法、民法、婚姻法和商業法等，是世界上保存最完整的早期成文法典之一。新巴比倫王國時期（前626–前539），尼布甲尼撒二世建造了傳說中的「空中花園」——據說是他為懷念故鄉山巒的米底妻子而建造的階梯式花園，被古希臘人列為世界七大奇蹟之一。亞述帝國（約前900–前612）則以殘暴的軍事征服聞名，建立了世界上最早的專業化常備軍之一，但其首都尼尼微的圖書館（亞述巴尼拔圖書館）保存了大量楔形文字泥板，為後世研究美索不達米亞文明提供了寶貴資料。"}]},{"id":"wa-egypt","title":"古埃及文明","content":"古埃及文明沿尼羅河流域發展了三千多年。尼羅河每年的定期泛濫帶來了肥沃的黑色淤泥，使埃及成為地中海世界的穀倉。","subsections":[{"id":"wa-eg-pyramids","title":"金字塔時代","content":"古王國時期（約前2686–前2181）是金字塔建築的黃金時代。法老左塞爾的階梯金字塔（位於薩卡拉，由建築師伊姆霍特普設計）是埃及最早的巨型石造建築。第四王朝的法老胡夫（希臘名為奇奧普斯）建造了吉薩大金字塔——原高146.5米（現約138.8米），底座每邊長約230米，總共使用了約230萬塊石頭，每塊平均重約2.5噸，據希羅多德記載動用了10萬勞工、花了20年時間建造。金字塔的精確程度令人難以置信——底座各邊長度的誤差小於25厘米，南北誤差僅約0.05度。古埃及人相信法老死後會成為神，金字塔是幫助法老升天的通道。獅身人面像（斯芬克斯，長約73米、高約20米）守護著吉薩金字塔群，可能是哈夫拉法老的面容。"},{"id":"wa-eg-new-kingdom","title":"新王國的輝煌與圖坦卡蒙","content":"新王國時期（約前1550–前1070），埃及成為橫跨西亞和北非的強大帝國。第十八王朝的法老哈特謝普蘇特（約前1479–前1458在位）是古埃及少數的女性法老，以男裝和假鬍鬚的形象出現在雕像中經常用假鬍鬚和男性裝束來呈現自己，在位期間大力發展貿易。圖特摩斯三世被稱為「古埃及的拿破崙」，進行了17次軍事遠征，將埃及的疆域擴展到最大。第十九王朝的拉美西斯二世（在位前1279–前1213）是埃及統治時間最長的法老之一（約66年），他與赫梯帝國在卡疊什戰役（約前1274年）打成平手後，簽訂了人類歷史上現存最早的和平條約（埃及-赫梯和平條約，其複製品懸掛在紐約聯合國總部）。然而，最令後人驚嘆的發現來自一位名不見經傳的少年法老——圖坦卡蒙。他的陵墓（帝王谷KV62號墓）於1922年由英國考古學家霍華德·卡特發現，是極少數未被盜掘的埃及王陵。墓中出土了超過5000件陪葬品，其中包括那件精美絕倫的黃金面具——重約11公斤的純金，鑲嵌青金石和彩色玻璃，成為古埃及文明的永恆象徵。"}]},{"id":"wa-greek","title":"古希臘文明","content":"古希臘文明是西方文明的搖籃。民主政治、哲學思辨、科學探索、戲劇藝術和奧林匹克競技——這些塑造了現代世界的基本元素都源自古希臘。","subsections":[{"id":"wa-gr-polis","title":"城邦時代","content":"古希臘沒有形成統一的國家，而是由數百個城邦（Polis）組成。雅典和斯巴達是兩個最具代表性的城邦。雅典被譽為民主的發源地——公元前508年克利斯提尼改革建立了公民大會、五百人議事會和陪審法庭等民主制度，所有成年男性公民都可以參與政治決策。伯里克利時代（前461–前429）是雅典民主的黃金時期，帕德嫩神廟（供奉雅典娜女神）於此期間建成，被認為是多立克式建築的巔峰之作。蘇格拉底（前470–前399）在雅典街頭以反詰法（又稱「蘇格拉底法」）不斷追問路人關於正義、勇氣、美德等問題——「我只知道自己一無所知」是他的名言。公元前399年他被雅典法庭以「不敬神」和「敗壞青年」的罪名判處死刑，飲下毒芹汁從容赴死。柏拉圖（前427–前347）和亞里士多德（前384–前322）——蘇格拉底的學生的學生——的著作奠定了整個西方哲學和科學的基礎。斯巴達則是一個極端的軍事化社會：男性公民從7歲起就要離開家庭，進入集體訓練（Agōgē），接受嚴酷的體能、戰鬥和忍耐力訓練，直到60歲才能退役。"},{"id":"wa-gr-wars","title":"波希戰爭與伯羅奔尼撒戰爭","content":"波希戰爭（前499–前449）：波斯帝國（當時世界最大的帝國）三次入侵希臘，但被希臘城邦聯軍擊退。公元前490年的馬拉松戰役中雅典以少勝多（據說希臘士兵菲迪皮德斯從馬拉松跑到雅典報捷後力竭而亡——馬拉松長跑由此得名）。公元前480年的溫泉關戰役中，斯巴達國王列奧尼達率300名斯巴達戰士（及約7000名盟軍）抵擋波斯大軍三天，最終全員戰死，其事蹟成為勇氣和犧牲的永恆象徵。同年發生的薩拉米斯海戰中，雅典海軍以少勝多，徹底扭轉了戰局。伯羅奔尼撒戰爭（前431–前404）：雅典和斯巴達為爭奪希臘霸權而進行的長達27年的戰爭，最終斯巴達在波斯支持下取勝，但這場戰爭極大地消耗了希臘各城邦的力量，為後來馬其頓王國的崛起創造了條件。歷史學家修昔底德記錄了這場戰爭，其《伯羅奔尼撒戰爭史》是歷史寫作的經典範例。"},{"id":"wa-gr-alexander","title":"亞歷山大大帝與希臘化時代","content":"馬其頓國王亞歷山大大帝（前356–前323），亞里士多德的學生，20歲繼位後僅用十年時間便征服了當時已知世界的大部分地區。公元前334年他率軍渡過赫勒斯滂海峽（今達達尼爾海峽），先後征服小亞細亞、敘利亞、埃及（在尼羅河口建立了亞歷山大城，後成為地中海世界最大的城市之一）、波斯帝國（高加米拉戰役，前331年），並繼續東進到印度河流域（海達斯佩斯河戰役，前326年，擊敗印度國王波羅斯）。亞歷山大在33歲時因熱病在巴比倫去世，他建立的帝國迅速分裂為幾個希臘化王國：托勒密王朝（埃及）、塞琉古王朝（西亞）、安提柯王朝（馬其頓和希臘）。希臘化時代（約前323–前30）促進了希臘文化與東方文化的大規模融合——亞歷山大城的圖書館是古代世界最大的知識中心（據說藏書達40–70萬卷），歐幾里得在此寫成了《幾何原本》，阿基米德在此學習。羅塞塔石碑（前196年，同時刻有古埃及象形文字、世俗體文字和希臘文，成為破解古埃及文字的關鍵）也是希臘化時代的產物。"}]},{"id":"wa-rome","title":"古羅馬文明","content":"古羅馬從台伯河畔的一個小城邦發展成為統治整個地中海世界的龐大帝國，其法律、語言、建築和制度影響了整個西方文明至今。","subsections":[{"id":"wa-rm-republic","title":"羅馬共和國（前509–前27）","content":"公元前509年羅馬人驅逐了最後一位國王，建立了共和政體。共和國的權力核心是元老院，由貴族（Patricians）組成，兩名執政官（Consul）由選舉產生，任期一年。平民（Plebeians）經過長期的抗爭（「撤離運動」），逐步獲得了政治權利——設立了保民官（Tribune），擁有否決權以保護平民利益。羅馬通過三次布匿戰爭（前264–前146）擊敗了其在地中海西部的最大競爭對手迦太基——第二次布匿戰爭中，迦太基統帥漢尼拔率軍（包括戰象）翻越阿爾卑斯山入侵義大利，連續擊敗羅馬軍隊（坎尼會戰，前216年，羅馬損失約5萬人），但最終被羅馬將領大西庇阿在扎馬戰役（前202年）中擊敗。第三次布匿戰爭中羅馬徹底摧毀了迦太基城，「迦太基必須毀滅」（Carthago delenda est）——老加圖的這句名言成為了羅馬無情軍事擴張的象徵。然而，隨著疆域擴大，羅馬共和制度面臨著嚴重的內部危機：貧富懸殊加劇（大量奴隸勞動使小農破產，土地集中在少數貴族手中）、政治腐敗、奴隸起義（斯巴達克斯起義，前73–前71，是古代世界最大規模的奴隸起義）。公元前60年凱撒、龐培和克拉蘇組成「前三頭同盟」（First Triumvirate），瓜分了羅馬的權力。凱撒在高盧戰爭（前58–前50）中征服了整個高盧（今法國及週邊地區），並以《高盧戰記》記錄了這場戰爭（其著名的開篇句「高盧全境分為三部分」）。公元前49年凱撒率軍渡過盧比孔河進入義大利（「骰子已經擲下」——Alea iacta est），內戰爆發。凱撒擊敗龐培後成為終身獨裁官，但於公元前44年3月15日（Ides of March）在元老院被布魯圖斯等貴族刺殺（據說凱撒臨終前對布魯圖斯說「你也在其中嗎，我的孩子？」——Et tu, Brute?）。"},{"id":"wa-rm-empire","title":"羅馬帝國（前27–476）","content":"凱撒的養子（也是其外甥孫）屋大維在擊敗了安東尼和埃及女王克麗奧佩脫拉（亞克興海戰，前31年）後，成為羅馬唯一的統治者。公元前27年元老院授予他「奧古斯都」（崇高者）的稱號，羅馬從共和國轉變為元首制下的帝國。奧古斯都的統治開啟了長達約200年的「羅馬和平」（Pax Romana）——地中海世界享受了前所未有的穩定和繁榮。帝國在圖拉真皇帝時期（98–117年在位）達到最大版圖，從不列顛到美索不達米亞、從萊茵河到撒哈拉。羅馬人修建了總長約8萬公里的道路網（「條條大路通羅馬」），建設了宏偉的引水渠（如法國加爾水道橋）、競技場（羅馬競技場，可容納約5萬觀眾）和公共浴場。羅馬法是羅馬對人類文明最重要的貢獻之一——《十二銅表法》（前450年）是羅馬成文法的開端，《查士丁尼法典》（529–534年，由東羅馬皇帝查士丁尼一世組織編纂）則集羅馬法之大成，成為後世歐洲大陸法系的基礎。公元1世紀，基督教在羅馬帝國的猶太行省誕生。基督徒因拒絕崇拜羅馬皇帝而遭受了數個世紀的迫害（最著名的是尼祿皇帝時期——傳說羅馬大火（64年）後他歸咎於基督徒並對其進行殘忍殺害）。但基督教仍然以驚人的速度傳播開來。313年君士坦丁大帝頒布米蘭敕令，給予基督教合法地位。380年狄奧多西一世宣布基督教為羅馬帝國國教。395年帝國正式分裂為東西兩部分。476年，西羅馬帝國末代皇帝羅慕路斯·奧古斯都被日耳曼僱傭軍首領奧多亞塞廢黜，西羅馬帝國滅亡——這一年被傳統上視為中世紀的開端。東羅馬帝國（拜占庭帝國）則繼續存在了將近一千年，直到1453年被奧斯曼帝國所滅。"}]}]},{"id":"world-modern","title":"世界近代史","category":"history","description":"從大航海時代到全球化時代——塑造現代世界的重大歷史事件與思想潮流","icon":"🌍","sections":[{"id":"wm-age-of-discovery","title":"大航海時代（15–17世紀）","content":"15世紀，奧斯曼帝國控制了東西方之間的傳統貿易路線，歐洲各國開始尋找通往東方的新航路。技術進步（卡拉維爾帆船、星盤、指南針）使遠洋航行成為可能。1415年葡萄牙佔領休達（北非），開始了歐洲海外殖民的先河。1488年迪亞士繞過好望角。1492年熱那亞人哥倫布在西班牙王室資助下向西航行，意外發現了美洲大陸（他至死仍認為自己到達的是亞洲的印度，因此將當地居民稱為「印第安人」）。1498年達·伽馬繞過好望角到達印度，開闢了歐洲直達亞洲的海上航線。1519–1522年麥哲倫船隊完成了人類歷史上的首次環球航行（麥哲倫本人於1521年在菲律賓被殺，但船隊中的「維多利亞號」在埃爾卡諾的指揮下最終於1522年返回西班牙）。大航海時代深刻改變了世界格局：歐洲國家建立了龐大的海外殖民帝國，哥倫布交換（新舊大陸之間的物種和疾病交換）改變了全球的農業和飲食結構（馬鈴薯、玉米、番茄、煙草傳入舊世界，小麥、馬匹、牛及天花、麻疹等疾病傳入新世界），但也導致了美洲原住民人口的災難性銳減（據估計，1492–1650年間美洲原住民人口減少了約90%），大西洋奴隸貿易（約1500–1866年間約有1200萬非洲人被強行運往美洲）成為人類歷史上最大的強迫遷移之一。"},{"id":"wm-scientific-revolution","title":"科學革命（16–17世紀）","content":"科學革命是人類認知方式的一次根本性轉變——從依賴古代權威（特別是亞里士多德）轉向基於實驗和數學分析的現代科學方法。1543年哥白尼發表了《天體運行論》，提出了日心說——太陽而非地球是宇宙的中心——挑戰了延續千年的托勒密地心體系。第谷·布拉赫積累了大量精確的天文觀測數據，其助手開普勒分析這些數據後提出了行星運動三定律——行星圍繞太陽運行的軌道是橢圓形而非正圓形。伽利略將望遠鏡對準天空（1609年），發現了木星的衛星、金星的相位變化和月球表面的坑洞，這些發現直接支持了哥白尼的日心說。他的《關於兩大世界體系的對話》（1632年）導致他被羅馬教會審判並軟禁終身。牛頓（1643–1727）集科學革命之大成，於1687年發表了《自然哲學的數學原理》，提出了運動三大定律和萬有引力定律，用同一套數學方程解釋了從落體到行星軌道的所有運動——這是人類智慧的巔峰成就之一。科學革命的方法論——通過實驗、觀察和數學推理來發現自然規律——從此成為現代科學的基石。"},{"id":"wm-enlightenment","title":"啟蒙運動（17–18世紀）","content":"啟蒙運動是17–18世紀在歐洲興起的思想解放運動。啟蒙思想家們高舉「理性」的旗幟，批判宗教迷信和專制王權，倡導自由、平等和進步的理念。約翰·洛克（1632–1704）提出了社會契約論和自然權利學說（生命、自由和財產），主張政府權力來自被統治者的同意，如果政府侵犯人民權利，人民有權推翻它——這些思想對美國獨立宣言產生了直接影響。孟德斯鳩（1689–1755）在《論法的精神》（1748年）中提出了三權分立（立法權、行政權、司法權互相制衡）的理論，成為現代憲政制度的核心理念。伏爾泰（1694–1778）是啟蒙運動最活躍的鬥士，以犀利的筆鋒批判教會和專制制度，提倡宗教寬容和言論自由。盧梭（1712–1778）在《社會契約論》（1762年）中以「人生而自由，但無往不在枷鎖之中」的名句開篇，提出了「公意」（General Will）和人民主權的概念。亞當·斯密（1723–1790）在《國富論》（1776年）中提出了自由市場的理論——「看不見的手」會引導個人的自利行為促進社會整體利益——奠定了現代經濟學的基礎。啟蒙運動為美國獨立戰爭和法國大革命提供了思想武器，深刻改變了人類對政治權力、個人權利和社會正義的理解。"},{"id":"wm-industrial","title":"工業革命（18–19世紀）","content":"工業革命是人類歷史上最重要的經濟社會變革之一，從此機器生產取代了手工勞動，人類社會從農業文明邁入工業文明。第一次工業革命（約1760–1840年）始於英國——紡織工業率先實現機械化（哈格里夫斯發明了珍妮紡紗機，1764年；阿克萊特建立了水力紡紗廠，1771年）。詹姆斯·瓦特改良了蒸汽機（1769年專利），使蒸汽機從礦井抽水的專用設備變成了通用的動力源，成為工業革命的標誌性發明。鐵路（斯托克頓—達靈頓鐵路，1825年，史蒂芬生的「火箭號」機車）和蒸汽輪船的出現徹底改變了交通運輸。工廠制度使大量農村人口湧入城市，城市化進程加速——曼徹斯特從1773年的約2.4萬人增長到1851年的約35萬人。第二次工業革命（約1870–1914年）以電力的廣泛應用（愛迪生發明實用化的白熾燈，1879年；特斯拉推動了交流電系統）、內燃機（戴姆勒和本茨）和化學工業的發展為標誌。福特汽車公司採用流水線生產方式（1913年）使T型車的生產時間從12小時縮短到約93分鐘，價格大幅下降，汽車從此走入普通家庭。工業革命帶來了空前的物質財富增長，但也造成了嚴重的社會問題——工人階級的貧困和惡劣的工作條件催生了社會主義運動和工會組織。馬克思和恩格斯於1848年發表了《共產黨宣言》，對資本主義進行了系統性的批判。"},{"id":"wm-french-rev","title":"法國大革命與拿破崙時代（1789–1815）","content":"1789年7月14日巴黎人民攻佔巴士底獄（象徵專制王權的國家監獄），法國大革命爆發。革命的根源在於法國舊制度（Ancien Régime）的深層矛盾：第一等級（教士）和第二等級（貴族）享有免稅特權，而佔人口約98%的第三等級（農民、工人和資產階級）承受了幾乎全部的稅收負擔。1789年8月國民制憲議會通過了《人權和公民權利宣言》（人權宣言），宣告「人生來自由、權利平等」、「主權本質上屬於國民」和私有財產神聖不可侵犯的原則。1793年國王路易十六被送上斷頭台。激進的雅各賓派在羅伯斯庇爾的領導下實行了恐怖統治（1793–1794），約1.7萬人在革命法庭上被判處死刑，直到1794年7月熱月政變推翻了羅伯斯庇爾。1799年11月拿破崙·波拿巴發動霧月政變，掌握了政權，1804年更是加冕稱帝（從教皇手中奪過皇冠自行戴上，這一著名場景象徵著世俗權力對教會權威的超越）。拿破崙法典（1804年）整理了革命以來的法律成果，確立了法律面前人人平等、私有財產保護和世俗婚姻等原則，成為此後歐洲大陸多國民法典的範本。拿破崙戰爭（1803–1815）席捲了整個歐洲，他的大軍（Grande Armée）一度橫掃歐陸，但1812年的俄羅斯遠征（進入莫斯科時發現的是一座幾乎被撤離和焚毀的空城）和1813年的萊比錫戰役（民族會戰）徹底擊碎了他的帝國夢。1815年滑鐵盧戰役後拿破崙被流放到南大西洋的聖赫勒拿島，最終於1821年去世。法國大革命傳播了自由、民主和民族主義的理念，儘管王朝在1815年維也納會議後短暫復辟，但革命精神已經根植於歐洲和世界的政治土壤之中。"},{"id":"wm-world-wars","title":"兩次世界大戰（1914–1945）","content":"20世紀上半葉，人類經歷了兩次世界大戰，是整個人類歷史上規模最大、傷亡最慘重的武裝衝突。","subsections":[{"id":"wm-ww1","title":"第一次世界大戰（1914–1918）","content":"一戰的導火索是1914年6月28日奧匈帝國皇儲斐迪南大公在塞拉耶佛被塞爾維亞民族主義者普林西普刺殺。此前歐洲已通過複雜的同盟體系分化為兩大陣營：三國同盟（德國、奧匈帝國、義大利）和三國協約（英國、法國、俄羅斯）。德國實施施里芬計劃——經由中立的比利時迅速擊敗法國後再轉向俄羅斯——但在馬恩河戰役（1914年9月）中被法軍阻擊，從此西線陷入了長達四年的塹壕戰僵局。一戰是人類歷史上首次全球性的軍事衝突，也是工業化戰爭的恐怖展示——機關槍、毒氣（氯氣、芥子氣）、坦克（1916年索姆河戰役中首次使用）和飛機被大規模投入使用，造成了前所未有的傷亡。凡爾登戰役（1916年2–12月，法德之間長達10個月的消耗戰，雙方傷亡約70萬人）和索姆河戰役（1916年7–11月，英軍首日就傷亡約5.7萬人）是塹壕戰殘酷性的典型寫照。1917年4月美國以德國實施無限制潛艇戰為由參戰，同年俄國爆發二月革命和十月革命後退出戰爭。1918年11月11日德國簽署停戰協定，一戰結束。凡爾賽和約（1919年）將戰爭責任完全歸於德國，要求其割讓領土、限制軍備和支付巨額賠款（1320億金馬克），並重新劃定了歐洲地圖——奧匈帝國和奧斯曼帝國解體，波蘭復國，捷克斯洛伐克和南斯拉夫等新國家成立。這些嚴厲的懲罰條件在德國國內引發了強烈的仇恨和不滿，被納粹黨充分利用，為二戰埋下了禍根。一戰總共導致約900萬士兵和700萬平民死亡。"},{"id":"wm-ww2","title":"第二次世界大戰（1939–1945）","content":"二戰是人類歷史上傷亡最為慘重的戰爭。1933年希特勒上台後，德國逐步撕毀凡爾賽和約——重新武裝、進軍萊茵非軍事區、吞併奧地利（1938年德奧合併）和捷克斯洛伐克的蘇台德地區（1938年慕尼黑協定，英法採取綏靖政策）。1939年8月納粹德國和蘇聯簽訂了《莫洛托夫—里賓特洛甫條約》（互不侵犯條約及秘密附加協議瓜分波蘭）。1939年9月1日德國入侵波蘭，二戰全面爆發（英法於9月3日對德宣戰）。1940年德國以閃電戰迅速征服了丹麥、挪威、荷蘭、比利時和法國（六周之內法國投降），英國在邱吉爾的領導下孤軍抵抗（不列顛空戰，1940年7–10月，皇家空軍挫敗了德國空軍的進攻）。1941年6月22日德國發動巴巴羅薩行動入侵蘇聯——人類歷史上最大規模的陸地軍事行動（約300萬德軍及軸心國部隊參戰），初期德軍勢如破竹推進到莫斯科郊外，但蘇聯遼闊的國土、嚴酷的冬季和蘇聯軍民的頑強抵抗最終使德軍陷入了消耗戰的泥潭。1941年12月7日日本海軍偷襲珍珠港，美國正式參戰，太平洋戰爭爆發——日本的擴張在1942年6月的中途島海戰中被遏制，從此盟軍開始了漫長的跳島反攻。戰爭的轉折點：北非戰場——阿拉曼戰役（1942年10–11月，蒙哥馬利擊敗隆美爾）；東線——史達林格勒戰役（1942–1943年冬，約200萬人傷亡，德軍第六軍團全軍覆沒）；太平洋——中途島海戰。1944年6月6日，盟軍實施了諾曼第登陸（D-Day，霸王行動）——人類歷史上最大規模的兩棲登陸作戰（登陸日投入約15.6萬士兵），開闢了歐洲第二戰場。1945年4月30日希特勒在柏林自殺；5月8日德國無條件投降（歐戰勝利日）。1945年8月6日和9日，美國在日本的廣島和長崎投下原子彈（「小男孩」和「胖子」），造成約20萬人立即死亡。8月15日日本天皇宣布無條件投降（二戰結束）。二戰導致約7000–8500萬人死亡，其中蘇聯約2700萬、中國約1500–2000萬。納粹對猶太人的系統性種族滅絕（Holocaust大屠殺）造成了約600萬猶太人遇害。戰後成立了聯合國（1945年），並設立了紐倫堡審判（1945–1946）和東京審判（1946–1948）來追究戰爭罪行。"}]},{"id":"wm-cold-war","title":"冷戰時期（1947–1991）","content":"冷戰是二戰後以美國為首的資本主義陣營和以蘇聯為首的社會主義陣營之間長達44年的意識形態對抗。1946年邱吉爾在美國密蘇里州富爾頓發表「鐵幕演說」，宣稱「從波羅的海的斯德丁到亞得里亞海的的里雅斯特，一道鐵幕已經降落在歐洲大陸上」。1947年美國總統杜魯門提出杜魯門主義（承諾支持世界各國抵抗共產主義的顛覆），標誌著冷戰的正式開始。1948–1949年蘇聯封鎖西柏林（柏林的陸路通道），美國和盟國以柏林空運（約27.8萬架次飛行，空運約230萬噸物資）成功打破了封鎖。1949年北大西洋公約組織（NATO）成立，1955年華沙條約組織成立，歐洲在軍事上被一分為二。冷戰雖然沒有轉化為美蘇之間的直接大規模軍事衝突（主要因為核威懾——兩個超級大國各自擁有足以多次毀滅對方的核武庫），但通過代理人戰爭在全球各地展開了激烈較量：韓戰（1950–1953，朝鮮半島以三八線附近為界一分為二至今）、越南戰爭（1955–1975，美國深陷其中，最終北越統一全國）、蘇聯入侵阿富汗（1979–1989，被稱為「蘇聯的越南戰爭」，是導致蘇聯解體的因素之一）。1962年的古巴飛彈危機將世界推向了核戰爭的邊緣——蘇聯在古巴部署中程核飛彈，美國實施海上封鎖（肯尼迪總統），經過13天的緊張對峙後赫魯雪夫同意撤回飛彈。1985年戈巴契夫成為蘇聯領導人，推行改革（Perestroika，經濟體制改革）和公開性（Glasnost，政治言論開放）。1989年東歐劇變——波蘭團結工會運動、匈牙利開放邊境、柏林圍牆倒塌（1989年11月9日）。1991年12月26日蘇聯正式解體為15個獨立國家。冷戰的終結結束了二元對立的世界格局，但遺留的核武器、領土爭端和地緣矛盾至今仍在影響國際關係。"}]}]},{"id":"industry","title":"行業","icon":"🏭","color":"#A78BFA","description":"全球經濟產業體系詳解——從第一產業到第三產業的全面剖析","topics":[{"id":"agriculture","title":"農業、林業及漁業","category":"industry","description":"人類最古老的生產活動，全球數十億人生計的基礎","icon":"🌾","sections":[{"id":"agri-revolution","title":"農業革命與演進","content":"約一萬年前的新石器革命（農業革命）是人類歷史上最重要的轉折點之一——從狩獵採集到定居農耕的轉變使固定居住成為可能，進而催生了村莊、城市、分工、文字、國家和文明。農業革命在世界各地獨立發生：約前9500年在中東的「肥沃月灣」（Fertile Crescent——從尼羅河谷經黎凡特到兩河流域的弧形地帶，小麥、大麥、扁豆等作物和綿羊、山羊等家畜在此被馴化）、約前8000年在中國（長江流域馴化了水稻、黃河流域馴化了粟/小米）、約前7000年在中美洲（玉米、豆類和南瓜的馴化）和約前5000年在安第斯山脈（馬鈴薯的馴化——馬鈴薯後來傳入歐洲並成為工業革命時期工人階級的主要食物來源）。","subsections":[{"id":"agri-green-rev","title":"綠色革命與現代農業","content":"綠色革命（1943–1970年代）是一場以培育高產作物品種為核心的農業技術革新運動，由美國農學家諾曼·布勞格（Norman Borlaug，1914–2009）領導。他於1944年加入洛克菲勒基金會在墨西哥的農業研究項目，在那裡培育出了半矮稈高產小麥品種——傳統小麥稈高容易倒伏（尤其是施用氮肥後），矮稈品種則能承受更多肥料而產量大幅增長。墨西哥在1944年進口約一半的穀物，到1956年實現了小麥自給自足。1960年代布勞格將這些品種引入印度和巴基斯坦，在短短幾年間使兩國的小麥產量翻了兩番。1970年布勞格獲得了諾貝爾和平獎。與此同時在菲律賓國際水稻研究所（IRRI），以台灣農學家的研究為基礎培育出的IR8「奇蹟稻」品種（1966年發布）將某些地區的稻米產量提高了十倍。綠色革命無疑挽救了數億人免於飢荒（印度在1960年代初被認為即將面臨大規模饑荒，但綠色革命逆轉了這個預測），使「人口爆炸必然導致全球饑荒」的馬爾薩斯式悲觀預測未能成真。但代價也是巨大的：水資源過度消耗（印度旁遮普邦的地下水位以驚人的速度下降）、化肥和農藥污染、單一栽培導致的生物多樣性下降（傳統的地方品種大量消失）、小農在資本密集型的現代農業體系中日益被邊緣化。當前農業的前沿趨勢包括：精準農業（Precision Agriculture——利用GPS導航的自動駕駛拖拉機、無人機遙感監測作物健康狀況、土壤傳感器和可變速率施肥/灌溉技術來最大限度地提高產量並減少資源浪費）、基因編輯作物（CRISPR編輯的作物不需要像傳統基因改造（GMO）作物那樣引入外源基因——因此許多國家對基因編輯作物的監管比GMO更為寬鬆——如高油酸大豆、抗褐變蘑菇、高GABA番茄等已在日本和美國上市）、垂直農業（在受控的室內多層環境中以LED燈代替陽光、以水培或氣霧培代替土壤來種植蔬菜——產量是傳統農田的數十倍到數百倍、用水量減少90%以上、無需農藥、不受天氣影響——但也因巨大的能源消耗而受到質疑），以及植物基和細胞培養肉（以植物蛋白（大豆、豌豆等）為原料模仿動物肉的質地和風味——Impossible Foods和Beyond Meat已進入主流市場；細胞培養肉則是從動物身上提取少量細胞（無需宰殺動物），在生物反應器中培養生長成可食用的肌肉組織——2020年新加坡率先批准了培養雞肉的商業銷售）。"}]}]},{"id":"ict","title":"資訊及通訊科技（ICT）","category":"industry","description":"數位時代的基礎設施——從晶片到雲端、從互聯網到人工智能","icon":"📡","sections":[{"id":"ict-semiconductor","title":"半導體產業","content":"半導體（晶片/積體電路）是現代數字經濟的基石——智能手機、電腦、汽車、醫療設備、軍事系統、數據中心和AI伺服器都依賴於先進晶片。半導體產業鏈是全球化和高度專業化的典範。","subsections":[{"id":"ict-fab","title":"晶圓製造（晶圓代工）","content":"晶圓製造（Fabrication——Fab）是半導體產業鏈中技術門檻最高、資本投入最密集的環節——建造一座先進的3奈米節點晶圓廠的成本已超過200億美元。台積電（TSMC，1987年在台灣新竹科學園區成立，由張忠謀創立）是全球最大和技術最先進的純晶圓代工廠（Pure-Play Foundry——只為客戶製造晶片，不設計自有晶片品牌）。台積電在全球先進製程（7奈米及以下）市場中擁有約90%的市場份額（三星是其唯一的有力競爭對手）。這種高度集中的市場結構使得全球半導體供應鏈高度依賴於台灣（被稱為「矽盾」——台灣在全球科技供應鏈中的關鍵地位被廣泛認為是其地緣政治安全保障的重要因素之一）。晶片製造的極端精確度令人難以置信——3奈米製程意味著電晶體柵極寬度僅約幾十個原子大小（矽原子直徑約0.2奈米），需要使用極紫外光（EUV，波長約13.5奈米）的光刻技術和極其複雜的多層光罩精確對準。一片晶圓（直徑300毫米）需要經歷數百甚至上千道工序、耗時數月才能完成——任何微小的灰塵顆粒（直徑可能是晶片特徵尺寸的數百倍）都可能導致整片晶圓報廢（因此無塵室的潔淨度達到ISO Class 1標準——每立方米空氣中允許不超過10個直徑大於0.1微米的顆粒）。"}]},{"id":"ict-ai","title":"人工智能產業","content":"人工智能（AI）從1956年達特茅斯會議正式誕生以來，經歷了多次「AI寒冬」（因研究進展未達預期和資金枯竭）和技術突破的循環。2012年之後深度學習的爆發將AI從學術實驗室推向產業化和商業化。深度學習的三大驅動力：1）大規模數據（互聯網和智能手機時代積累了海量的標註數據——ImageNet（1400萬張圖片、2.2萬個類別）、Common Crawl（數十億個網頁）等）；2）算力（GPU——特別是NVIDIA的CUDA平台——的並行計算能力使訓練深層神經網絡成為可能；專用AI晶片（Google的TPU、NVIDIA的H100等）提供了前所未有的算力）；3）算法突破（卷積神經網絡CNN（1989年Yann LeCun提出，2012年AlexNet在ImageNet大賽中以大幅優勢奪冠）、生成對抗網絡GAN（2014年Ian Goodfellow，讓兩個神經網絡互相對抗——生成器製造假圖像，判別器區分真假——從而訓練出能夠創造極度逼真圖像的AI）、Transformer架構（2017年Vaswani等人發表的Attention Is All You Need論文——捨棄了傳統的循環或卷積結構，完全基於注意力機制，極大提高了並行計算效率和長距離依賴的捕捉能力）。基於Transformer的大語言模型（LLM）——GPT系列（2022年11月ChatGPT/ GPT-3.5的發布是AI歷史上的iPhone時刻）、Gemini（Google）、Claude（Anthropic）、通義千問（阿里巴巴）等——能夠進行自然語言對話、撰寫程式碼、翻譯、總結和推理（但「幻覺」——生成看似可信但事實上錯誤的內容——是其根本性缺陷之一）。AI的倫理和社會影響：算法偏見（訓練數據中的社會偏見被AI模型放大和固化——如招聘系統歧視女性候選人、面部識別對深色皮膚人群的準確率遠低於淺色皮膚）、深度偽造（Deepfake——生成以假亂真的虛假影片和音頻，可能被用於政治操縱和詐騙）、勞動力替代（AI可能對白領工作（律師助理、程式設計師、客服等）的影響可能類似於工業革命對藍領工作的影響——生產力提升但也帶來結構性失業的風險）。歐盟的AI法案（AI Act，2024年通過）是全球首部全面監管AI的法律，基於風險等級的分類管理——不可接受的風險應用（社會信用評分、政府主導的普遍監控、操縱性AI等）被禁止；高風險應用（醫療診斷、招聘、關鍵基礎設施等）必須滿足嚴格的透明性、準確性和人類監督要求。"}]},{"id":"energy","title":"能源業","category":"industry","description":"傳統能源與新能源——全球能源格局與低碳轉型","icon":"⚡","sections":[{"id":"energy-fossil","title":"化石能源時代","content":"化石燃料（煤、石油、天然氣）至今仍是全球主要的一次能源來源（約80%）。煤炭是儲量最豐富但碳排放強度最高的化石燃料——全球煤炭儲量最多的國家為美國（約23%）、俄羅斯和中國。石油是現代交通運輸的生命線（幾乎所有的汽車、飛機和船舶都依賴於石油產品）。中東擁有全球約48%的已探明石油儲量（沙烏地阿拉伯、伊拉克、伊朗、科威特和阿聯酋）。OPEC（石油輸出國組織，1960年成立於巴格達，總部設在維也納）和OPEC+（2016年後包括俄羅斯在內的非OPEC產油國）通過協調成員國的石油產量（增產或減產）來試圖影響國際油價——這是一種合法化的卡特爾行為（在大
